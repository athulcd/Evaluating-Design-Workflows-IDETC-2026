function_structure:
  subfunctions:
  - id: F1
    verb_noun: Position brake shoe and lining
    description: Securely hold the brake shoe and lining in correct alignment for
      riveting.
    input_flows:
    - IN_M1
    - IN_M2
    output_flows:
    - OUT_M1
    allocated_requirements:
    - R3
    - R4
    - R5
    - R6
  - id: F2
    verb_noun: Position rivet(s)
    description: Place rivet(s) into pre-drilled holes in the lining/shoe stack.
    input_flows:
    - IN_M3
    output_flows:
    - OUT_M3
    allocated_requirements:
    - R7
    - R6
  - id: F3
    verb_noun: Apply riveting force
    description: Generate and transmit sufficient force to form rivet heads and achieve
      closure.
    input_flows:
    - IN_E1
    output_flows:
    - OUT_E1
    allocated_requirements:
    - R8
    - R9
    - R17
  - id: F4
    verb_noun: Control force and stroke
    description: Ensure correct force magnitude and stroke to achieve target closure
      without over-stressing.
    input_flows:
    - IN_S1
    output_flows:
    - OUT_S1
    allocated_requirements:
    - R9
    - R17
  - id: F5
    verb_noun: Mount tool on worktop
    description: Secure tool to bench/worktop to provide stable operation and prevent
      movement.
    input_flows:
    - EI1
    output_flows:
    - OUT_EI1
    allocated_requirements:
    - R12
  - id: F6
    verb_noun: Guide operator actions
    description: Provide visual/physical cues for correct positioning, sequencing,
      and actuation.
    input_flows:
    - IN_S1
    output_flows:
    - OUT_S1
    allocated_requirements:
    - R11
    - R18
  - id: F7
    verb_noun: Form rivet heads
    description: Deform rivet shank to create closure heads on both sides of the joint.
    input_flows:
    - OUT_E1
    - OUT_M3
    output_flows:
    - OUT_M1
    allocated_requirements:
    - R1
    - R8
    - R9
  hierarchy:
  - parent: F0
    children:
    - F1
    - F2
    - F3
    - F4
    - F5
    - F6
    - F7
  connections:
  - from_function: F1
    to_function: F2
    flow_id: OUT_M1
  - from_function: F2
    to_function: F7
    flow_id: OUT_M3
  - from_function: F3
    to_function: F4
    flow_id: OUT_E1
  - from_function: F4
    to_function: F7
    flow_id: OUT_S1
  - from_function: F5
    to_function: F1
    flow_id: OUT_EI1
  - from_function: F6
    to_function: F1
    flow_id: OUT_S1
  - from_function: F6
    to_function: F2
    flow_id: OUT_S1
  - from_function: F6
    to_function: F3
    flow_id: OUT_S1
  - from_function: F7
    to_function: F0
    flow_id: OUT_M1
  completeness_checks:
    flow_conservation_notes: All material and energy flows are accounted for between
      subfunctions and the black box.
    missing_functions_suspected: []
  assumptions:
  - Rivet holes are pre-drilled; the tool does not perform drilling.
  - The tool is bench-mounted as per the case context.
  - Human actuation is the sole energy source.
  open_questions:
  - Confirm exact rivet head shape requirements beyond closure distance.
  traceability:
    derived_from_black_box: true
