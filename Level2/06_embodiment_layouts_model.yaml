embodiment_layouts:
  layout:
  - id: EL1
    module_breakdown:
    - module_id: M1
      name: Base and Workpiece Fixture
      responsibilities:
      - Provide stable mounting platform on worktop/vice
      - Securely clamp brake shoe and lining during riveting
      - Accommodate variable shoe width (80–400 mm) and thickness (6–8 mm)
      - Ensure repeatable positioning for multiple rivets
      allocated_functions:
      - F1 (Prepare and CLAMP workpiece)
      - F9 (ENSURE stability on table)
      - F3 (ALIGN work zone)
    - module_id: M2
      name: Rivet Insertion and Alignment Guide
      responsibilities:
      - Guide rivet insertion into pre-drilled holes
      - Maintain alignment between rivet, shoe, and lining
      - Prevent misplacement or damage to holes
      allocated_functions:
      - F2 (INSERT and POSITION rivet)
    - module_id: M3
      name: Force Amplification and Control Mechanism
      responsibilities:
      - Convert hand actuation force to required riveting force (>=500 N)
      - Provide adjustable stroke control for closure head (~4 mm)
      - Ensure consistent force application across strokes
      allocated_functions:
      - F4 (ACCEPT actuating force)
      - F5 (AMPLIFY force)
      - F6 (CONTROL stroke and force)
    - module_id: M4
      name: Rivet Forming Head Assembly
      responsibilities:
      - Apply forming force to create closure head
      - Work in conjunction with base to support preform head
      - Ensure proper rivet head geometry and joint integrity
      allocated_functions:
      - F7 (FORM rivet head)
    - module_id: M5
      name: Safety and Ergonomics Interface
      responsibilities:
      - Prevent pinch/crush hazards during operation
      - Provide safe hand/foot actuation interface
      - Ensure operator comfort and control
      allocated_functions:
      - F10 (ENSURE safety)
      - F4 (ACCEPT actuating force)
    - module_id: M6
      name: Verification and Feedback System
      responsibilities:
      - Provide visual/physical confirmation of proper rivet closure
      - Enable operator to verify quality before proceeding
      allocated_functions:
      - F11 (VERIFY closed rivets)
    interfaces:
    - id: IF1
      between:
      - M1
      - M2
      type: mechanical
      description: Mechanical interface for rivet alignment guide mounting to base
        fixture
      constraints:
      - Must allow adjustment for different shoe widths
      - Must maintain precise alignment tolerances
      - Must withstand forming forces without deflection
    - id: IF2
      between:
      - M2
      - M4
      type: mechanical
      description: Interface between rivet guide and forming head for force transmission
      constraints:
      - Must transfer full riveting force (500 N) without slippage
      - Must maintain alignment during force application
      - Must allow clearance for rivet insertion
    - id: IF3
      between:
      - M3
      - M4
      type: mechanical
      description: Force transmission from amplification mechanism to forming head
      constraints:
      - Must handle amplified forces (500 N minimum)
      - Must provide smooth force transfer without backlash
      - Must accommodate adjustable stroke mechanism
    - id: IF4
      between:
      - M1
      - M5
      type: human
      description: Operator interface for actuation (hand lever)
      constraints:
      - Maximum hand force: 200 N
      - Ergonomic grip design for workshop use
      - Safe clearance from moving parts
    - id: IF5
      between:
      - M1
      - M6
      type: signal
      description: Visual/physical feedback for rivet closure verification
      constraints:
      - Clear indication when rivet is properly formed
      - Accessible to operator during normal operation
      - Durable in workshop environment
    - id: IF6
      between:
      - M3
      - M5
      type: mechanical
      description: Connection between force amplification mechanism and operator interface
      constraints:
      - Must transmit operator force efficiently
      - Must provide mechanical advantage (lever ratio TBD)
      - Must include safety stops and guards
    key_design_parameters:
    - id: KDP1
      name: Lever mechanical advantage ratio
      unit: dimensionless
      target_or_range: 2.5:1 to 3.5:1
      linked_requirements:
      - R8 (500 N force capability)
      - R17 (hand force <= 200 N)
    - id: KDP2
      name: Adjustable stroke range
      unit: mm
      target_or_range: 2-6 mm adjustable
      linked_requirements:
      - R9 (4 mm closure target)
      - R2, R3, R4, R5 (variable geometry accommodation)
    - id: KDP3
      name: Base fixture adjustment range
      unit: mm
      target_or_range: 80-400 mm width, 6-45 mm thickness
      linked_requirements:
      - R2 (shoe width 80-400 mm)
      - R3 (shoe thickness 6-8 mm)
      - R5 (max total thickness 45 mm)
    - id: KDP4
      name: Overall tool mass
      unit: kg
      target_or_range: <= 15 kg
      linked_requirements:
      - R14 (good transportability)
      - R5 (portability)
    - id: KDP5
      name: Maximum dimension (L x W x H)
      unit: mm
      target_or_range: <= 600 x 400 x 300 mm
      linked_requirements:
      - R14 (portability)
      - R12 (workshop bench operation)
    risks_and_mitigations:
    - id: RM1
      risk: Insufficient force amplification leading to operator fatigue or incomplete
        rivet closure
      mitigation: Detailed force analysis and prototype testing of lever mechanism;
        include force gauge for verification
    - id: RM2
      risk: Adjustable stop mechanism drift causing inconsistent closure dimensions
      mitigation: Implement robust locking mechanism with positive engagement; include
        visual indicators for setting verification
    - id: RM3
      risk: Workpiece slippage during riveting causing damage or safety hazards
      mitigation: Design positive workpiece retention features; include anti-slip
        surfaces and redundant clamping
    - id: RM4
      risk: Tool instability on worktop leading to inaccurate riveting or safety issues
      mitigation: Design wide stable base with non-slip feet; include mounting holes
        for permanent bench attachment
    - id: RM5
      risk: High manufacturing cost exceeding SwFr 400 target
      mitigation: Value engineering of components; use standard off-the-shelf parts
        where possible; optimize material selection
  assumptions:
  - The selected concept CV3 (lever press with adjustable stop) is the basis for this
    embodiment layout
  - Workshop environment includes typical contaminants (dust, oil) requiring robust
    design
  - Tool will be primarily hand-operated as per R17 constraints
  - Standard DIN 7338 rivets will be used as referenced in the case
  - Brake shoe material is aluminum alloy as noted in specifications
  - Pre-drilled holes exist in both shoe and lining per case assumptions
  open_questions:
  - Confirm exact lever ratio and mechanical advantage calculations for the amplification
    mechanism
  - Determine specific materials and manufacturing processes to meet cost target of
    SwFr 400
  - Validate adjustable stop mechanism design for durability and precision
  - Specify exact safety guard requirements and pinch point elimination strategies
  - Confirm integration method with workshop vice or worktop mounting
  traceability:
    selected_concept_id: CV3
