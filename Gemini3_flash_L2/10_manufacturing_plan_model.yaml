manufacturing_plan:
  module_plans:
  - module_id: M1
    material_candidates:
    - Structural Steel (e.g., S235JR or S355)
    - Cast Iron (for vibration damping and stiffness)
    process_candidates:
    - Welding (fabricated plate construction)
    - Machining (milling of mounting surfaces)
    - Sand Casting (if production volume justifies)
    rationale: 'The base must provide structural stiffness to support the 500 N riveting
      force (R8) and ensure stability on a wooden worktop (R12). A welded steel construction
      is likely the most cost-effective for workshop-scale production (R20).

      '
    critical_characteristics:
    - Flatness of mounting interface (IF1)
    - Stiffness to minimize frame compliance (LC1, KDP2)
    risks:
    - Frame deflection leading to inconsistent rivet closure (RM1)
  - module_id: M2
    material_candidates:
    - Aluminum Alloy (for weight/portability)
    - Medium Carbon Steel
    process_candidates:
    - CNC Milling
    - Assembly (bolted components)
    rationale: 'Must accommodate a wide range of brake shoe diameters (250-400 mm)
      and widths (80-400 mm) per R2 and R3. Machined steel or aluminum provides the
      necessary precision for alignment (F3).

      '
    critical_characteristics:
    - Adjustability range for stack thickness up to 45 mm (R5)
    - Alignment accuracy with the riveting heads (M6)
    risks:
    - Workpiece slippage during forming (WP1_1)
  - module_id: M4
    material_candidates:
    - Steel Tube or Solid Bar
    - Plastic/Rubber (for grip)
    process_candidates:
    - Bending
    - Welding
    - Injection Molding (for grip)
    rationale: 'The handle must withstand operator forces up to 200 N (hand) or 400
      N (foot) per R17. Ergonomics are key for one-man operation (R11).

      '
    critical_characteristics:
    - Lever arm length to achieve required mechanical advantage (KDP1)
    - Surface finish/grip for operator comfort
    risks:
    - Ergonomic strain if handle geometry is poor
  - module_id: M5
    material_candidates:
    - High-strength Alloy Steel (e.g., 42CrMo4)
    process_candidates:
    - Machining (Turning/Milling)
    - Heat Treatment (Hardening and Tempering)
    rationale: 'This linkage amplifies the input force to the required 500 N (R8).
      It is subject to high cyclic loads (LC1) and must maintain integrity over a
      5-year service life (R13).

      '
    critical_characteristics:
    - Pivot pin tolerances and wear resistance
    - Structural integrity under maximum actuation force (LC2)
    risks:
    - Pinch hazards at linkage points (RM2)
    - Fatigue failure of pivot pins
  - module_id: M6
    material_candidates:
    - Cold-work Tool Steel (e.g., 1.2379 / D2)
    process_candidates:
    - Precision Turning
    - Grinding
    - Vacuum Hardening
    rationale: 'These heads directly form the rivet (F7). They must resist wear and
      deformation under the 500 N forming force (R8) to ensure consistent head closure
      (R9). This is safety-critical for brake performance (O1).

      '
    critical_characteristics:
    - Surface hardness (HRC 58-62)
    - Geometry of the forming cup/die (R7, R9)
    risks:
    - Misalignment damaging the rivet or brake lining (RM1)
    - Rapid wear leading to poor joint quality (EC2)
  - module_id: M7
    material_candidates:
    - Hardened Steel
    process_candidates:
    - Thread Cutting/Rolling
    - Machining
    rationale: 'Provides the adjustable hard stop (WP6_2) to control the ~4 mm closure
      distance (R9). Precision is required to meet the target closure consistently.

      '
    critical_characteristics:
    - Thread pitch for fine adjustment (resolution <= 0.1 mm per sizing)
    - Locking mechanism stability (RM3)
    risks:
    - Adjustment drift during high-frequency use (70 rivets/day, R10)
  assumptions:
  - The tool is produced in small to medium batches suitable for workshop equipment
    suppliers.
  - Standard fasteners and bearings will be used where possible to meet the SwFr 400
    cost target (R20).
  - Rivet heads (M6) are interchangeable to support different rivet shank diameters
    (3-5 mm, R7).
  open_questions:
  - What is the specific hardness of the DIN 7338 rivets to refine tool steel selection
    for M6?
  - Is a specific surface coating required for M1 to resist workshop contaminants
    like oil and dust (R12)?
  - Are there standard mounting hole patterns for workshop benches that M1 should
    follow?
