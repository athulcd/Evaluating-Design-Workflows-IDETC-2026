task_clarification:
  problem_statement: 'Design a simple, compact, and ergonomic rivet setting tool for
    a car repair workshop to rivet linings onto internal expanding drum brake shoes.
    The tool must be hand or foot-operated, generate a riveting force of approximately
    500 N, and accommodate copper rivets (3-5 mm shank diameter) per DIN 7338. It
    should handle brake shoes (250-400 mm inside diameter, up to 2 kg, 100 mm max
    width) and linings (up to 200 g, 15 mm max assembled thickness) with 10-16 rivets
    per shoe, ensuring a minimum 10 mm clearance from the rivet center to the brake
    shoe rib. The tool must be reliable, maintenance-free, easy to transport, and
    storable, with a 5-year service life. Manufacturing cost must be under 500 CHF
    per unit (target 400 CHF), and delivery must be within 3-4 months.

    '
  system_boundary:
    included:
    - Hand or foot-operated rivet setting mechanism
    - Riveting force generation (500 N)
    - Copper rivet handling (DIN 7338, 3-5 mm shank)
    - Brake shoe and lining accommodation (250-400 mm ID, 2 kg, 100 mm width, 15 mm
      thickness)
    - Ergonomic operation (≤200 N hand, ≤400 N foot, standard working height)
    - Compact and transportable design
    - 5-year service life reliability
    excluded:
    - Rivet supply and preparation (annealed state provided)
    - Brake shoe and lining cleaning (supplied cleaned)
    - Final assembly of brake shoes (tool only sets rivets)
  objectives:
  - id: O1
    description: Develop a reliable and maintenance-free rivet setting tool
    rationale: Ensures long-term usability and reduces downtime in the workshop
    measurable_proxy: Tool failure rate over 5 years
  - id: O2
    description: Minimize manufacturing cost per unit
    rationale: Cost constraint of under 500 CHF (target 400 CHF) must be met
    measurable_proxy: Manufacturing cost per unit
  - id: O3
    description: Ensure ergonomic operation
    rationale: Required operating force limits (200 N hand, 400 N foot) and standard
      working height must be met
    measurable_proxy: Maximum operating force and working height compliance
  - id: O4
    description: Achieve compact and transportable design
    rationale: Tool must be easy to store and transport in a workshop environment
    measurable_proxy: Tool dimensions and weight
  constraints:
  - id: C1
    description: Manufacturing cost per unit must be under 500 CHF (target 400 CHF)
    type: cost
    measurable_proxy: Manufacturing cost per unit
  - id: C2
    description: Delivery timeframe is 3 months (maximum 4 months)
    type: schedule
    measurable_proxy: Project completion date
  - id: C3
    description: Operating force must not exceed 200 N (hand) or 400 N (foot)
    type: safety
    measurable_proxy: Maximum operating force
  - id: C4
    description: Tool must handle brake shoes with 250-400 mm inside diameter
    type: interface
    measurable_proxy: Minimum and maximum brake shoe inside diameter accommodated
  - id: C5
    description: Tool must accommodate copper rivets (3-5 mm shank diameter) per DIN
      7338
    type: interface
    measurable_proxy: Rivet shank diameter range supported
  - id: C6
    description: Tool must generate a riveting force of approximately 500 N
    type: physical
    measurable_proxy: Maximum riveting force generated
  - id: C7
    description: Tool must have a 5-year service life
    type: reliability
    measurable_proxy: Tool operational lifespan
  stakeholders:
  - Car repair workshop (end user)
  - Consulting agency designer (developer)
  - In-house manufacturing team (producer)
  - Potential future users (secondary market)
  operating_conditions:
  - Workshop environment with wooden worktop
  - One-man operation by car mechanic
  - Workload of approximately 70 rivets per day
  - Ergonomic working height compliance
  evaluation_criteria:
  - id: EC1
    description: Manufacturing cost per unit
    metric: CHF
    target_or_direction: ≤500 (target 400)
  - id: EC2
    description: Maximum operating force
    metric: N
    target_or_direction: ≤200 (hand) or ≤400 (foot)
  - id: EC3
    description: Tool dimensions
    metric: mm (length × width × height)
    target_or_direction: Compact and storable
  - id: EC4
    description: Tool weight
    metric: kg
    target_or_direction: Lightweight for transport
  - id: EC5
    description: Riveting force generated
    metric: N
    target_or_direction: ≈500
  - id: EC6
    description: Tool reliability (failure rate)
    metric: Failures per 1000 hours
    target_or_direction: Low (5-year lifespan)
  - id: EC7
    description: Project completion time
    metric: months
    target_or_direction: ≤3 (max 4)
  assumptions:
  - The repair workshop's machining facilities are capable of producing the tool as
    designed
  - Adequate funding is available for development and production
  - The tool will be used primarily in a workshop environment with a wooden worktop
  - The workload of 70 rivets per day is consistent and representative
  open_questions:
  - What specific ergonomic guidelines (e.g., working height standards) must be followed?
  - Are there any additional safety requirements or certifications needed for the
    tool?
  - What is the exact definition of "maintenance-free" in this context?
  - Are there any specific storage or transport requirements beyond compactness?
  - What is the expected variability in the brake shoe and lining dimensions beyond
    the stated maximums?
  - Are there any specific material or surface finish requirements for the tool?
  - What is the expected variability in the riveting force required for different
    rivet sizes or materials?
  traceability:
    derived_from:
    - raw_task_statement
