task_clarification:
  objectives:
  - Develop a simple rivet setting tool for a large car repair workshop
  - Produce 5 initial units with potential for future sales
  - Design for in-house production using the repair workshop's machining facilities
  success_criteria:
  - Manufacturing cost per unit must be under 500 CHF, with a target maximum of 400
    CHF
  - Delivery timeframe: '3 months (maximum allowable: 4 months)'
  - Tool must handle internal drum brakes with inside diameter 250-400 mm
  - Tool must generate riveting force of approximately 500 N
  - Tool must achieve working stroke of 3-4 mm for proper rivet closure
  - Tool must accommodate minimum clearance of 10 mm from rivet center to brake shoe
    rib
  - Tool must handle copper rivets (DIN 7338) with shank diameter 3-5 mm
  - Tool must be reliable, maintenance-free, easy to transport, and compact for storage
  - Tool must have 5-year service life
  - Tool must comply with ergonomic guidelines (200 N max for hand-operated, 400 N
    max for foot-operated)
  constraints:
  - Manufacturing cost per unit: '< 500 CHF (target: 400 CHF)'
  - Delivery timeframe: '3 months (max: 4 months)'
  - One-man operation by car mechanic
  - Mounted/used on wooden worktop
  - Workload: ~70 rivets per day
  - Brake shoes: aluminum alloy, max 2 kg, max 100 mm width, pre-drilled holes
  - Brake linings: special friction material, max 200 g, pre-pressed and drilled
  - Assembled shoe + lining max thickness: 15 mm
  - Each shoe requires 10-16 rivets
  - Copper rivets (DIN 7338), annealed, shank diameter 3-5 mm
  - Riveting force: ~500 N
  - Working stroke: ~3-4 mm
  - Minimum clearance: 10 mm from rivet center to brake shoe rib
  assumptions:
  - The repair workshop's machining facilities have the necessary equipment and expertise
    for in-house production
  - The designer from the consulting agency has access to all required technical specifications
    and dimensions
  - The tool will be used exclusively for riveting linings onto conventional internal
    expanding drum brake shoes
  - The 70 rivets per day workload is a consistent average, not a peak demand
  open_questions:
  - What specific ergonomic guidelines must be followed for the working height?
  - Are there any specific safety requirements or certifications needed for the tool?
  - What is the exact definition of "compact enough for good storage" in terms of
    dimensions?
  - Are there any specific preferences for hand-operated vs. foot-operated tool?
  - What is the expected variability in the 70 rivets per day workload?
requirements_list:
- id: R1
  type: functional
  description: The tool must be capable of setting copper rivets (DIN 7338) with shank
    diameter 3-5 mm
