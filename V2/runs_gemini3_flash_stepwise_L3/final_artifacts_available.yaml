verification_plan:
  verification_plan:
    requirement_verification:
    - requirement_id: R1
      method: demonstration
      procedure_summary: "Perform riveting of 10 sample sets of brake linings onto\
        \ brake shoes using the tool. \nInspect the resulting joints for tightness\
        \ and lining integrity.\n"
      conditions: Standard workshop environment; tool mounted to bench.
      metric: Success rate of crack-free, tight joints.
      acceptance_criteria: 100% success; no cracks in lining; no movement in rivet
        joint.
      linked_components:
      - M2
      - M6
      - B6
      - B7
    - requirement_id: R2
      method: inspection
      procedure_summary: "Verify the workholding fixture (M2) and frame throat depth\
        \ (M1) against brake shoes \nwith internal diameters of 250 mm and 400 mm.\n"
      conditions: Physical fit check with boundary samples.
      metric: Fit/Clearance (mm)
      acceptance_criteria: All shoes within the 250-400 mm range fit securely and
        align with the riveting axis.
      linked_components:
      - M1
      - M2
      - B2
    - requirement_id: R3
      method: inspection
      procedure_summary: 'Verify the support plate (B2) width against brake shoes
        with widths of 80 mm and 400 mm.

        '
      conditions: Physical fit check.
      metric: Support width (mm)
      acceptance_criteria: Support plate accommodates the full 80-400 mm width range
        without interference.
      linked_components:
      - M2
      - B2
    - requirement_id: R4
      method: inspection
      procedure_summary: 'Verify the clamping/support mechanism for shoe thicknesses
        of 6 mm and 8 mm.

        '
      conditions: Physical fit check.
      metric: Thickness capacity (mm)
      acceptance_criteria: Secure clamping and alignment for the 6-8 mm thickness
        range.
      linked_components:
      - M2
      - B2
    - requirement_id: R5
      method: inspection
      procedure_summary: "Verify the total stack capacity of the tool by inserting\
        \ a 45 mm thick test block \nbetween the riveting heads.\n"
      conditions: Tool at maximum opening.
      metric: Maximum opening distance (mm)
      acceptance_criteria: Opening >= 45 mm.
      linked_components:
      - M1
      - M7
      - B8
    - requirement_id: R6
      method: inspection
      procedure_summary: "Measure the distance from the center of the rivet guide\
        \ (B3) to the nearest \nobstruction on the support plate (B2).\n"
      conditions: Tool assembly inspection.
      metric: Edge distance (mm)
      acceptance_criteria: Distance >= 4 mm.
      linked_components:
      - M2
      - M3
      - B2
      - B3
    - requirement_id: R7
      method: inspection
      procedure_summary: "Verify that the rivet guide bushing (B3) and heads (B6,\
        \ B7) accommodate \nrivet shank diameters of 3 mm and 5 mm.\n"
      conditions: Fit check with DIN 7338 rivets.
      metric: Diameter compatibility (mm)
      acceptance_criteria: Smooth fit for both 3 mm and 5 mm rivets.
      linked_components:
      - M3
      - M6
      - B3
      - B6
    - requirement_id: R8
      method: test
      procedure_summary: "Place a calibrated load cell between the riveting heads\
        \ (B6, B7). \nApply maximum actuation force to the lever (B4).\n"
      conditions: Static load test.
      metric: Output force (N)
      acceptance_criteria: Force >= 500 N.
      linked_components:
      - M5
      - M6
      - B5
      - B7
    - requirement_id: R9
      method: test
      procedure_summary: "Rivet a sample joint and measure the formed head height\
        \ using the \nclosure verification gauge (B11).\n"
      conditions: Tool adjusted to target stroke.
      metric: Head closure height (mm)
      acceptance_criteria: 4
