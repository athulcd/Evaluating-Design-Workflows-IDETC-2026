task_clarification:
  task_clarification:
    problem_statement: 'Design a hand-operated rivet-setting tool for riveting brake
      linings onto brake shoes for internal drum brakes. The tool shall enable workshop
      riveting with adequate quality and productivity, using typical workshop resources,
      without damage to components and with safe operation.

      '
    system_boundary:
      included:
      - Tooling to position brake shoe + lining and set rivets (forming/closure heads)
      - Mechanism to apply riveting force and control stroke/force
      - Means to position and support the workpiece(s) in the tool
      - Means to position rivet and/or guide rivet insertion
      - Means to mount/support tool on worktop (e.g., vice, base, clamp)
      - Human-powered actuation (hand/foot)
      excluded:
      - Manufacture of brake shoes, linings, and rivets
      - Automated production-line machinery
      - Brake system testing beyond rivet joint quality
    stakeholders:
    - Workshop mechanic / car mechanic (single operator)
    - Workshop owner (cost, throughput)
    - End user indirectly (brake safety)
    operating_conditions:
    - Workshop environment; typical contaminants (dust, oil) likely
    - Tool used on a worktop/bench (document notes wood worktop)
    objectives:
    - id: O1
      description: Reliable riveting of brake lining to brake shoe (quality joint)
      rationale: Primary technical function; safety-critical for brakes
      measurable_proxy: Rivet head closure and joint integrity within acceptance criteria
    - id: O2
      description: One-person operation with acceptable ergonomic effort
      rationale: Stated one-man operation; hand/foot force limits
      measurable_proxy: Actuation force within stated maxima
    - id: O3
      description: 'Workshop-suitable: portable, robust, low maintenance'
      rationale: Service life, transport, reliability targets
      measurable_proxy: Durability/service life targets; minimal maintenance
    - id: O4
      description: Meet cost and delivery targets for a workshop tool
      rationale: Manufacturing cost and planning requirements stated
      measurable_proxy: Manufacturing cost <= target; delivery schedule
    evaluation_criteria:
    - id: EC1
      description: Speed of riveting
      metric: Cycle time per rivet / rivets per day
      target_or_direction: Higher throughput preferred
    - id: EC2
      description: Quality of riveting
      metric: Head closure dimension; joint integrity
      target_or_direction: Meets acceptance with low defects
    - id: EC3
      description: Stability and time of operation
      metric: Setup time; stability on bench
      target_or_direction: Stable and fast to set up
    - id: EC4
      description: Ease of servicing
      metric: Access, replaceability, maintenance frequency
      target_or_direction: Easier preferred
    - id: EC5
      description: Storage/transportability
      metric: Mass/volume; portability
      target_or_direction: More portable preferred
    - id: EC6
      description: Reliability
      metric: Service life; failure rate
      target_or_direction: Higher preferred
    - id: EC7
      description: Safety
      metric: Pinch/crush hazards; safe operation
      target_or_direction: No hazards; compliant operation
    - id: EC8
      description: Expenditure/cost
      metric: Manufacturing cost; part count; assembly effort
      target_or_direction: Lower preferred
    assumptions:
    - Primary application is internal drum brakes as shown in the document (internal
      drum brake sketch).
    - The tool is bench-mounted and manually actuated, consistent with the case description.
    open_questions:
    - ''
    traceability:
      derived_from:
      - Case introduction and problem assignment (pp. 1-3)
      - Design specification sheets (pp. 4-5)
      - Concept evaluation criteria table (p. 14)
requirements_list:
  requirements_list:
    requirements:
    - id: R1
      statement: Rivet brake lining onto brake shoe for internal drum brakes (workshop
        operation).
      type: functional
      priority: MUST
      metric: Successful rivet set without damage
      target: All specified brake shoe/lining sizes
      verification: demonstration
      source: Design specification (pp. 4-5)
    - id: R2
      statement: Brake drum internal diameter range shall be 250-400 mm (application
        context).
      type: interface
      priority: MUST
      metric: Supported brake shoe sizes
      target: D = 250-400 mm
      verification: inspection
      source: Design specification sheet 1/2 (p. 4)
    - id: R3
      statement: Brake shoe width range shall be 80-400 mm.
      type: interface
      priority: MUST
      metric: Supported width
      target: B = 80-400 mm
      verification: inspection
      source: Design specification sheet 1/2 (p. 4)
    - id: R4
      statement: Brake shoe thickness range shall be 6-8 mm.
      type: interface
      priority: MUST
      metric: Supported shoe thickness
      target: 6-8 mm
      verification: inspection
      source: Design specification sheet 1/2 (p. 4)
    - id: R5
      statement: Maximum total thickness of worn parts shall be <= 45 mm (as stated).
      type: interface
      priority: MUST
      metric: Stack thickness capacity
      target: <= 45 mm
      verification: inspection
      source: Data list (p. 3; scan partially legible)
    - id: R6
      statement: Minimum distance from rivet to edge shall be >= 4 mm.
      type: manufacturing
      priority: MUST
      metric: Edge distance
      target: '>= 4 mm'
      verification: inspection
      source: Data list (p. 3; legible)
    - id: R7
      statement: Rivet shank diameter shall be 3-5 mm.
      type: interface
      priority: MUST
      metric: Rivet compatibility
      target: d = 3-5 mm
      verification: inspection
      source: Data list (p. 3; legible)
    - id: R8
      statement: Riveting force capability shall be at least 500 N (experiment reference).
      type: performance
      priority: MUST
      metric: Max forming force
      target: '>= 500 N'
      verification: test
      source: Design specification sheet 2/2 (p. 5)
    - id: R9
      statement: Rivet head closure target shall be about 4 mm.
      type: performance
      priority: MUST
      metric: Head closure dimension
      target: ~ 4 mm
      verification: test
      source: Design specification sheet 2/2 (p. 5)
    - id: R10
      statement: 'Productivity: capability up to 70 rivets/day.'
      type: performance
      priority: WISH
      metric: Rivets/day
      target: Up to 70 per day
      verification: demonstration
      source: Design specification sheet 2/2 (p. 5)
    - id: R11
      statement: One-man operation (car mechanic) shall be possible.
      type: ergonomics
      priority: MUST
      metric: Single operator usability
      target: 'Yes'
      verification: demonstration
      source: Design specification sheet 2/2 (p. 5)
    - id: R12
      statement: 'Environment: indoor workshop; tool operable on a worktop (wood).'
      type: environment
      priority: MUST
      metric: Bench operation compatibility
      target: Stable on worktop
      verification: demonstration
      source: Design specification sheet 2/2 (p. 5)
    - id: R13
      statement: Service life shall be about 5 years.
      type: reliability
      priority: WISH
      metric: Service life
      target: 5 years
      verification: analysis
      source: Design specification sheet 2/2 (p. 5)
    - id: R14
      statement: Good transportability (portable).
      type: ergonomics
      priority: WISH
      metric: Mass/volume; portability
      target: Portable
      verification: demonstration
      source: Design specification sheet 2/2 (p. 5)
    - id: R15
      statement: Reliable operation.
      type: reliability
      priority: MUST
      metric: Failure-free riveting under nominal use
      target: No critical failures during verification
      verification: test
      source: Design specification sheet 2/2 (p. 5)
    - id: R16
      statement: Maintenance-free as far as possible.
      type: reliability
      priority: WISH
      metric: Maintenance interval
      target: Minimized
      verification: analysis
      source: Design specification sheet 2/2 (p. 5)
    - id: R17
      statement: 'Ergonomics: hand force <= 200 N OR foot force <= 400 N.'
      type: ergonomics
      priority: MUST
      metric: Actuation force
      target: Hand <= 200 N; Foot <= 400 N
      verification: test
      source: Design specification sheet 2/2 (p. 5)
    - id: R18
      statement: 'Safety: avoid accidents; no special accidents in operation.'
      type: safety
      priority: MUST
      metric: Hazard assessment
      target: No pinch/crush hazards in intended use
      verification: inspection
      source: Design specification sheet 2/2 (p. 5)
    - id: R19
      statement: 'Delivery planning: delivery deadline about 3 months (4 max).'
      type: schedule
      priority: WISH
      metric: Lead time
      target: 3 months (<= 4 months)
      verification: analysis
      source: Design specification sheet 2/2 (p. 5)
    - id: R20
      statement: Manufacturing cost shall be <= SwFr 400 (max).
      type: cost
      priority: WISH
      metric: Manufacturing cost
      target: <= SwFr 400
      verification: analysis
      source: Design specification sheet 2/2 (p. 5)
    assumptions:
    - ''
    open_questions:
    - ''
    traceability:
      derived_from:
      - task_clarification
      - Design specification sheets (pp. 4-5)
black_box:
  black_box:
    overall_function: Rivet brake lining to brake shoe
    flows:
      inputs:
      - id: IN_M1
        type: material
        name: Brake shoe
        description: Internal drum brake shoe (Al-alloy noted in spec)
      - id: IN_M2
        type: material
        name: Brake lining
        description: Special friction lining, pre-drilled holes
      - id: IN_M3
        type: material
        name: Rivet(s)
        description: Rivets to DIN 7338 (as referenced)
      - id: IN_E1
        type: energy
        name: Human mechanical energy
        description: Hand or foot actuation energy
      - id: IN_S1
        type: signal
        name: Operator control
        description: Manual sequencing, positioning, and actuation control
      outputs:
      - id: OUT_M1
        type: material
        name: Riveted brake shoe assembly
        description: Brake shoe with lining riveted; rivet heads formed to target
          closure
      - id: OUT_S1
        type: signal
        name: Process confirmation
        description: Implicit verification/feedback that all rivets are closed and
          correct
    external_interactions:
    - id: EI1
      description: Bench/worktop interface (mounting, stability)
      related_requirements:
      - R12
    - id: EI2
      description: Operator safety/ergonomics interaction
      related_requirements:
      - R11
      - R17
      - R18
    assumptions:
    - Rivet holes are pre-drilled in the shoe/lining per spec; the tool focuses on
      setting rather than drilling.
    open_questions:
    - Is there an explicit requirement for rivet head shape beyond closure distance
      (e.g., diameter, flushness)?
    traceability:
      derived_from:
      - Black box diagram and text (p. 6)
      - Technical process diagram (p. 8)
function_structure:
  function_structure:
    overall_function:
      id: F0
      verb_noun: Rivet lining to shoe
      input_flows:
      - IN_M1
      - IN_M2
      - IN_M3
      - IN_E1
      - IN_S1
      output_flows:
      - OUT_M1
      - OUT_S1
      allocated_requirements:
      - R1
      - R11
      - R15
    subfunctions:
    - id: F1
      verb_noun: Prepare and CLAMP workpiece
      description: Support and clamp shoe+lining in the tool/fixture.
      input_flows:
      - IN_M1
      - IN_M2
      output_flows: []
      allocated_requirements:
      - R2
      - R3
      - R4
      - R5
      - R12
    - id: F2
      verb_noun: INSERT and POSITION rivet
      description: Insert rivet into aligned holes and position for forming.
      input_flows:
      - IN_M3
      output_flows: []
      allocated_requirements:
      - R6
      - R7
    - id: F3
      verb_noun: ALIGN work zone
      description: Align shoe/lining/rivet under forming heads; ensure repeatability
        across multiple rivets.
      input_flows: []
      output_flows: []
      allocated_requirements:
      - R10
      - R15
    - id: F4
      verb_noun: ACCEPT actuating force
      description: Accept hand/foot force input from operator.
      input_flows:
      - IN_E1
      output_flows: []
      allocated_requirements:
      - R11
      - R17
    - id: F5
      verb_noun: AMPLIFY force
      description: Amplify human input to required riveting force.
      input_flows:
      - IN_E1
      output_flows: []
      allocated_requirements:
      - R8
      - R17
    - id: F6
      verb_noun: CONTROL stroke and force
      description: Control working stroke/force; ensure closure head movement and
        limit end position.
      input_flows: []
      output_flows: []
      allocated_requirements:
      - R9
      - R15
    - id: F7
      verb_noun: FORM rivet head
      description: Perform deformation/forming to close rivet head to target closure.
      input_flows:
      - IN_M3
      output_flows:
      - OUT_M1
      allocated_requirements:
      - R1
      - R8
      - R9
    - id: F8
      verb_noun: ENABLE repositioning for next rivet
      description: Enable moving to next rivet location and repeating operation.
      input_flows: []
      output_flows: []
      allocated_requirements:
      - R10
      - R11
    - id: F9
      verb_noun: ENSURE stability on table
      description: Ensure tool stability / mounting on worktop or in vice.
      input_flows: []
      output_flows: []
      allocated_requirements:
      - R12
    - id: F10
      verb_noun: ENSURE safety
      description: Prevent pinch/crush hazards; safe clearances and guards.
      input_flows: []
      output_flows: []
      allocated_requirements:
      - R18
    - id: F11
      verb_noun: VERIFY closed rivets
      description: Provide means to check that all rivets are properly closed.
      input_flows: []
      output_flows:
      - OUT_S1
      allocated_requirements:
      - R15
    hierarchy:
    - parent: F0
      children:
      - F1
      - F2
      - F3
      - F4
      - F5
      - F6
      - F7
      - F8
      - F9
      - F10
      - F11
    completeness_checks:
      flow_conservation_notes: Material inputs IN_M1/IN_M2/IN_M3 produce OUT_M1; energy
        IN_E1 is consumed in F4/F5; signal OUT_S1 via F11.
      missing_functions_suspected:
      - Internal lubrication/cleaning function might be needed for reliable forming
        in a workshop environment.
    assumptions:
    - Subfunctions are synthesized from the machine functional structure diagram and
      the technical process (pp. 8-10).
    open_questions:
    - Confirm whether the original case separates 'position shoe/lining' vs 'position
      rivet' as distinct operator vs TS functions.
    traceability:
      derived_from:
      - Functional structure of operator (p. 8)
      - Functional structure of the machine system (p. 10)
working_principles:
  working_principles:
    principles:
    - id: WP5_1
      function_id: F5
      principle_name: Lever amplification
      physical_effect_or_mechanism: Mechanical advantage via lever arm and pivot
      key_parameters:
      - lever_ratio
      - pivot_bearing_friction
      - stroke
      advantages:
      - Low cost
      - Simple
      - Robust
      disadvantages:
      - Large swing space
      - Operator effort varies through stroke
      risks:
      - Pinch hazards at linkage
      - Deflection reducing closure accuracy
      impacted_requirements:
      - R8
      - R17
      - R18
    - id: WP5_2
      function_id: F5
      principle_name: Rack-and-pinion / screw-driven press
      physical_effect_or_mechanism: Rotational input converted to linear force via
        gear/screw
      key_parameters:
      - pitch
      - gear_ratio
      - self_locking
      advantages:
      - High force capability
      - Fine control
      disadvantages:
      - Slower
      - More parts
      risks:
      - Wear in screw threads
      - Higher cost
      impacted_requirements:
      - R8
      - R9
      - R10
      - R20
    - id: WP6_1
      function_id: F6
      principle_name: Hard stop for end position
      physical_effect_or_mechanism: Mechanical stop sets final closure distance
      key_parameters:
      - stop_position
      - stiffness
      - tolerance_stack
      advantages:
      - Repeatable closure
      - Simple verification
      disadvantages:
      - Sensitive to wear and tolerances
      risks:
      - Stop drift/wear changes closure
      impacted_requirements:
      - R9
      - R15
    - id: WP6_2
      function_id: F6
      principle_name: Adjustable stop (screw/nut)
      physical_effect_or_mechanism: Threaded adjuster sets stroke; locknut maintains
        setting
      key_parameters:
      - adjustment_range
      - lock_mechanism
      advantages:
      - Adaptable to different geometries
      - Field adjustable
      disadvantages:
      - Needs setup time
      - Can be misadjusted
      risks:
      - Operator error; loosened lock
      impacted_requirements:
      - R2
      - R3
      - R4
      - R5
      - R9
    - id: WP7_1
      function_id: F7
      principle_name: Preform + closure head riveting
      physical_effect_or_mechanism: 'Two-headed forming: one supports preform head,
        other forms closure head'
      key_parameters:
      - head_geometry
      - alignment
      - material_hardness
      advantages:
      - Standard riveting approach
      - Compatible with DIN rivets
      disadvantages:
      - Requires good alignment
      risks:
      - Misalignment damages holes or head shape
      impacted_requirements:
      - R1
      - R6
      - R7
      - R9
    - id: WP1_1
      function_id: F1
      principle_name: Vice-mounted fixture
      physical_effect_or_mechanism: Workholding via vice + fixture plates
      key_parameters:
      - fixture_adjustability
      - vice_capacity
      advantages:
      - Stable
      - Uses existing workshop equipment
      disadvantages:
      - Depends on vice availability
      risks:
      - Workpiece slippage if not keyed
      impacted_requirements:
      - R12
      - R15
    assumptions:
    - Working principles are drawn from the concept sketches and discussion of technical
      systems (pp. 12-15).
    open_questions:
    - Confirm if the case considered pneumatic/hydraulic amplification
