        name: Mechanical advantage
        unit: '-'
        target_or_range: '>= (500 N)/(200 N) = 2.5 for hand mode (higher recommended)'
        linked_requirements:
        - R8
        - R17
      - id: KDP2
        name: Closure stroke (head closure)
        unit: mm
        target_or_range: ~4 mm adjustable
        linked_requirements:
        - R9
      - id: KDP3
        name: Work envelope / throat depth
        unit: mm
        target_or_range: Sufficient for brake shoe sizes (R2 R5)
        linked_requirements:
        - R2
        - R3
        - R4
        - R5
      risks_and_mitigations:
      - id: RM1
        risk: Misalignment causing poor rivet head formation
        mitigation: Add guided head alignment, hardened bushings, and fixture datums
      - id: RM2
        risk: Pinch/crush hazard at linkage and head area
        mitigation: Guarding and safe clearances; two-hand safety not required but
          consider hand clearance zones
      - id: RM3
        risk: Adjustment drift changes closure
        mitigation: Locknuts, detents, reference scale; verification gauge
    assumptions:
    - Embodiment corresponds to the 'layout sketches' and 'dimensional layouts' shown
      later in the case (pp. 16-19).
    open_questions:
    - Confirm whether the chosen case layout uses a lever press, screw press, or mixed
      mechanism.
    traceability:
      selected_concept_id: CV3
preliminary_sizing:
  preliminary_sizing:
    load_cases:
    - id: LC1
      description: Rivet forming at maximum required force
      related_requirements:
      - R8
      - R9
    - id: LC2
      description: Operator applying maximum allowable actuation force
      related_requirements:
      - R17
    - id: LC3
      description: Off-axis loading due to mispositioned workpiece (fixture compliance)
      related_requirements:
      - R15
      - R18
    sizing_results:
    - parameter_id: KDP1
      governing_case: LC1
      equation_or_model: F_out = MA * F_in; require F_out >= 500 N with F_in <= 200
        N (hand) or 400 N (foot)
      assumed_values:
        F_out_required_N: 500
        F_in_hand_max_N: 200
        F_in_foot_max_N: 400
      result: MA_hand >= 2.5; MA_foot >= 1.25
      margin_or_factor_of_safety: Recommend MA_hand ~3-5 to allow losses and variability
    - parameter_id: KDP2
      governing_case: LC1
      equation_or_model: s_total = s_form + s_compliance; set stop such that closure
        ≈ 4 mm under load
      assumed_values:
        closure_target_mm: 4.0
        compliance_note: Unknown; depends on frame stiffness
      result: Provide adjustable stop with resolution <=0.1 mm and lock mechanism
      margin_or_factor_of_safety: Add frame stiffness to minimize compliance-induced
        error
    assumptions:
    - F_out_required is taken from the spec experiment note; actual riveting force
      may differ by rivet size/material.
    open_questions:
    - Confirm rivet material/hardness and required forming force across d=3-5 mm.
    - Confirm acceptable closure tolerance band around 4 mm.
manufacturing_plan:
  manufacturing_plan:
    module_plans:
    - module_id: M1
      material_candidates:
      - Mild steel plate/weldment
      - Cast iron base (if volume justifies)
      process_candidates:
      - Laser-cut + welded frame
      - Machined plate frame
      - Casting + machining (higher tooling)
      rationale: Stiff frame needed for repeatable closure; small-batch implies weldment/plate
        machining.
      critical_characteristics:
      - Frame stiffness at head alignment
      - Flatness of mounting surfaces
      risks:
      - Weld distortion
      - Insufficient stiffness
    - module_id: M2
      material_candidates:
      - Tool steel inserts + steel fixture body
      process_candidates:
      - Machining + hardened inserts
      - Surface hardening on contact faces
      rationale: Wear surfaces at workholding and datums; inserts allow economical
        replacement.
      critical_characteristics:
      - Datum alignment
      - Clamp repeatability
      - Hole alignment support
      risks:
      - Wear leading to misalignment
    - module_id: M6
      material_candidates:
      - Hardened tool steel (heads)
      process_candidates:
      - Precision turning/grinding
      - Heat treatment
      rationale: Rivet head forming requires hard, durable head geometries.
      critical_characteristics:
      - Head geometry
      - Concentricity/alignment
      risks:
      - Heat-treatment distortion
      - Chipping
    - module_id: M7
      material_candidates:
      - Steel adjuster screw + locknut
      process_candidates:
      - Threaded fastener machining or off-the-shelf screw + custom tip
      rationale: Adjustment for closure stroke; simple and robust.
      critical_characteristics:
      - Thread backlash
      - Lock integrity
      risks:
      - Loosening; drift
    assumptions:
    - Small-batch workshop manufacturability is emphasized in the case narrative.
    open_questions:
    - Confirm batch size and whether any casting is permissible.
