case_context:
  product_system: ''
  stakeholders: []
  operating_environment: ''
  constraints_known: []
  success_criteria_known: []
artifacts_available:
  task_clarification:
    task_clarification:
      problem_statement: 'Design a hand-operated rivet-setting tool for riveting brake
        linings onto brake shoes for internal drum brakes. The tool shall enable workshop
        riveting with adequate quality and productivity, using typical workshop resources,
        without damage to components and with safe operation.

        '
      system_boundary:
        included:
        - Tooling to position brake shoe + lining and set rivets (forming/closure
          heads)
        - Mechanism to apply riveting force and control stroke/force
        - Means to position and support the workpiece(s) in the tool
        - Means to position rivet and/or guide rivet insertion
        - Means to mount/support tool on worktop (e.g., vice, base, clamp)
        - Human-powered actuation (hand/foot)
        excluded:
        - Manufacture of brake shoes, linings, and rivets
        - Automated production-line machinery
        - Brake system testing beyond rivet joint quality
      stakeholders:
      - Workshop mechanic / car mechanic (single operator)
      - Workshop owner (cost, throughput)
      - End user indirectly (brake safety)
      operating_conditions:
      - Workshop environment; typical contaminants (dust, oil) likely
      - Tool used on a worktop/bench (document notes wood worktop)
      objectives:
      - id: O1
        description: Reliable riveting of brake lining to brake shoe (quality joint)
        rationale: Primary technical function; safety-critical for brakes
        measurable_proxy: Rivet head closure and joint integrity within acceptance
          criteria
      - id: O2
        description: One-person operation with acceptable ergonomic effort
        rationale: Stated one-man operation; hand/foot force limits
        measurable_proxy: Actuation force within stated maxima
      - id: O3
        description: 'Workshop-suitable: portable, robust, low maintenance'
        rationale: Service life, transport, reliability targets
        measurable_proxy: Durability/service life targets; minimal maintenance
      - id: O4
        description: Meet cost and delivery targets for a workshop tool
        rationale: Manufacturing cost and planning requirements stated
        measurable_proxy: Manufacturing cost <= target; delivery schedule
      evaluation_criteria:
      - id: EC1
        description: Speed of riveting
        metric: Cycle time per rivet / rivets per day
        target_or_direction: Higher throughput preferred
      - id: EC2
        description: Quality of riveting
        metric: Head closure dimension; joint integrity
        target_or_direction: Meets acceptance with low defects
      - id: EC3
        description: Stability and time of operation
        metric: Setup time; stability on bench
        target_or_direction: Stable and fast to set up
      - id: EC4
        description: Ease of servicing
        metric: Access, replaceability, maintenance frequency
        target_or_direction: Easier preferred
      - id: EC5
        description: Storage/transportability
        metric: Mass/volume; portability
        target_or_direction: More portable preferred
      - id: EC6
        description: Reliability
        metric: Service life; failure rate
        target_or_direction: Higher preferred
      - id: EC7
        description: Safety
        metric: Pinch/crush hazards; safe operation
        target_or_direction: No hazards; compliant operation
      - id: EC8
        description: Expenditure/cost
        metric: Manufacturing cost; part count; assembly effort
        target_or_direction: Lower preferred
      assumptions:
      - Primary application is internal drum brakes as shown in the document (internal
        drum brake sketch).
      - The tool is bench-mounted and manually actuated, consistent with the case
        description.
      open_questions:
      - ''
      traceability:
        derived_from:
        - Case introduction and problem assignment (pp. 1-3)
        - Design specification sheets (pp. 4-5)
        - Concept evaluation criteria table (p. 14)
  requirements_list:
    requirements_list:
      requirements:
      - id: R1
        statement: Rivet brake lining onto brake shoe for internal drum brakes (workshop
          operation).
        type: functional
        priority: MUST
        metric: Successful rivet set without damage
        target: All specified brake shoe/lining sizes
        verification: demonstration
        source: Design specification (pp. 4-5)
      - id: R2
        statement: Brake drum internal diameter range shall be 250-400 mm (application
          context).
        type: interface
        priority: MUST
        metric: Supported brake shoe sizes
        target: D = 250-400 mm
        verification: inspection
        source: Design specification sheet 1/2 (p. 4)
      - id: R3
        statement: Brake shoe width range shall be 80-400 mm.
        type: interface
        priority: MUST
        metric: Supported width
        target: B = 80-400 mm
        verification: inspection
        source: Design specification sheet 1/2 (p. 4)
      - id: R4
        statement: Brake shoe thickness range shall be 6-8 mm.
        type: interface
        priority: MUST
        metric: Supported shoe thickness
        target: 6-8 mm
        verification: inspection
        source: Design specification sheet 1/2 (p. 4)
      - id: R5
        statement: Maximum total thickness of worn parts shall be <= 45 mm (as stated).
        type: interface
        priority: MUST
        metric: Stack thickness capacity
        target: <= 45 mm
        verification: inspection
        source: Data list (p. 3; scan partially legible)
      - id: R6
        statement: Minimum distance from rivet to edge shall be >= 4 mm.
        type: manufacturing
        priority: MUST
        metric: Edge distance
        target: '>= 4 mm'
        verification: inspection
        source: Data list (p. 3; legible)
      - id: R7
        statement: Rivet shank diameter shall be 3-5 mm.
        type: interface
        priority: MUST
        metric: Rivet compatibility
        target: d = 3-5 mm
        verification: inspection
        source: Data list (p. 3; legible)
      - id: R8
        statement: Riveting force capability shall be at least 500 N (experiment reference).
        type: performance
        priority: MUST
        metric: Max forming force
        target: '>= 500 N'
        verification: test
        source: Design specification sheet 2/2 (p. 5)
      - id: R9
        statement: Rivet head closure target shall be about 4 mm.
        type: performance
        priority: MUST
        metric: Head closure dimension
        target: ~ 4 mm
        verification: test
        source: Design specification sheet 2/2 (p. 5)
      - id: R10
        statement: 'Productivity: capability up to 70 rivets/day.'
        type: performance
        priority: WISH
        metric: Rivets/day
        target: Up to 70 per day
        verification: demonstration
        source: Design specification sheet 2/2 (p. 5)
      - id: R11
        statement: One-man operation (car mechanic) shall be possible.
        type: ergonomics
        priority: MUST
        metric: Single operator usability
        target: 'Yes'
        verification: demonstration
        source: Design specification sheet 2/2 (p. 5)
      - id: R12
        statement: 'Environment: indoor workshop; tool operable on a worktop (wood).'
        type: environment
        priority: MUST
        metric: Bench operation compatibility
        target: Stable on worktop
        verification: demonstration
        source: Design specification sheet 2/2 (p. 5)
      - id: R13
        statement: Service life shall be about 5 years.
        type: reliability
        priority: WISH
        metric: Service life
        target: 5 years
        verification: analysis
        source: Design specification sheet 2/2 (p. 5)
      - id: R14
        statement: Good transportability (portable).
        type: ergonomics
        priority: WISH
        metric: Mass/volume; portability
        target: Portable
        verification: demonstration
        source: Design specification sheet 2/2 (p. 5)
      - id: R15
        statement: Reliable operation.
        type: reliability
        priority: MUST
        metric: Failure-free riveting under nominal use
        target: No critical failures during verification
        verification: test
        source: Design specification sheet 2/2 (p. 5)
      - id: R16
        statement: Maintenance-free as far as possible.
        type: reliability
        priority: WISH
        metric: Maintenance interval
        target: Minimized
        verification: analysis
        source: Design specification sheet 2/2 (p. 5)
      - id: R17
        statement: 'Ergonomics: hand force <= 200 N OR foot force <= 400 N.'
        type: ergonomics
        priority: MUST
        metric: Actuation force
        target: Hand <= 200 N; Foot <= 400 N
        verification: test
        source: Design specification sheet 2/2 (p. 5)
      - id: R18
        statement: 'Safety: avoid accidents; no special accidents in operation.'
        type: safety
        priority: MUST
        metric: Hazard assessment
        target: No pinch/crush hazards in intended use
        verification: inspection
        source: Design specification sheet 2/2 (p. 5)
      - id: R19
        statement: 'Delivery planning: delivery deadline about 3 months (4 max).'
        type: schedule
        priority: WISH
        metric: Lead time
        target: 3 months (<= 4 months)
        verification: analysis
        source: Design specification sheet 2/2 (p. 5)
      - id: R20
        statement: Manufacturing cost shall be <= SwFr 400 (max).
        type: cost
        priority: WISH
        metric: Manufacturing cost
        target: <= SwFr 400
        verification: analysis
        source: Design specification sheet 2/2 (p. 5)
      assumptions:
      - ''
      open_questions:
      - ''
      traceability:
        derived_from:
        - task_clarification
        - Design specification sheets (pp. 4-5)
  black_box:
    black_box:
      overall_function: 'Transform separate brake components (shoe, lining, rivets)
        and manual energy into a high-quality riveted brake assembly through controlled
        force application and positioning.

        '
      flows:
        inputs:
        - id: IN_MAT_1
          type: material
          name: Brake shoe
          description: 'Internal drum brake shoe with diameter 250-400 mm and width
            80-400 mm.

            '
        - id: IN_MAT_2
          type: material
          name: Brake lining
          description: 'Friction lining to be attached to the shoe.

            '
        - id: IN_MAT_3
          type: material
          name: Rivets
          description: 'Rivets with shank diameter 3-5 mm.

            '
        - id: IN_ENE_1
          type: energy
          name: Manual actuation force
          description: 'Human-powered input (Hand force <= 200 N or Foot force <=
            400 N).

            '
        - id: IN_SIG_1
          type: signal
          name: Positioning and alignment control
          description: 'Visual or tactile information used by the operator to align
            the rivet holes and the tool.

            '
        outputs:
        - id: OUT_MAT_1
          type: material
          name: Riveted brake assembly
          description: 'Brake shoe and lining joined by set rivets with a head closure
            of approximately 4 mm.

            '
        - id: OUT_ENE_1
          type: energy
          name: Dissipated energy
          description: 'Heat and sound generated during the deformation of the rivet
            and friction within the mechanism.

            '
        - id: OUT_SIG_1
          type: signal
          name: Riveting completion feedback
          description: 'Tactile or visual confirmation that the rivet has been fully
            set and the stroke is complete.

            '
      external_interactions:
      - id: EI1
        description: 'Mechanical interface with a workshop bench or worktop (typically
          wood) for stability during operation.

          '
        related_requirements:
        - R12
      - id: EI2
        description: 'Interaction with workshop environment contaminants such as dust
          and oil.

          '
        related_requirements:
        - R12
      - id: EI3
        description: 'Ergonomic and safety interface with the human operator (mechanic).

          '
        related_requirements:
        - R11
        - R17
        - R18
      assumptions:
      - Rivets are manually inserted into the holes by the operator before or during
        the tool's operation.
      - The tool remains stationary on the workbench during the riveting process.
      - The "signal" inputs and outputs are primarily mediated through the human operator's
        senses (sight and touch).
      open_questions:
      - Is there a requirement for a specific depth stop or visual indicator on the
        tool itself to signal completion?
      traceability:
        derived_from_requirements:
        - R1
        - R2
        - R3
        - R4
        - R7
        - R8
        - R9
        - R11
        - R12
        - R17
        - R18
  function_structure:
    function_structure:
      subfunctions:
      - id: F1
        verb_noun: Position Workpiece
        description: 'Position and hold the brake shoe and lining in the correct orientation
          for riveting, accommodating the specified diameter (250-400 mm) and width
          (80-400 mm) ranges.

          '
        input_flows:
        - IN_MAT_1
        - IN_MAT_2
        - IN_SIG_1
        output_flows:
        - FLOW_M_ALIGNED_WORKPIECE
        allocated_requirements:
        - R2
        - R3
        - R4
        - R5
      - id: F2
        verb_noun: Guide Rivet
        description: 'Guide the rivet into the pre-drilled holes and maintain its
          position relative to the workpiece and the forming tool during the stroke.

          '
        input_flows:
        - IN_MAT_3
        - IN_SIG_1
        output_flows:
        - FLOW_M_ALIGNED_RIVET
        allocated_requirements:
        - R7
      - id: F3
        verb_noun: Amplify Force
        description: 'Convert the operator''s manual input (hand force <= 200 N or
          foot force <= 400 N) into the higher force required for rivet deformation
          (>= 500 N) using mechanical advantage.

          '
        input_flows:
        - IN_ENE_1
        - FLOW_E_REACTION
        output_flows:
        - FLOW_E_AMPLIFIED
        allocated_requirements:
        - R8
        - R11
        - R17
      - id: F4
        verb_noun: Form Rivet
        description: 'Apply the amplified force to the rivet shank to form the closure
          head (approx. 4 mm), joining the brake lining securely to the shoe without
          damaging components.

          '
        input_flows:
        - FLOW_M_ALIGNED_WORKPIECE
        - FLOW_M_ALIGNED_RIVET
        - FLOW_E_AMPLIFIED
        - FLOW_E_REACTION
        output_flows:
        - OUT_MAT_1
        - OUT_ENE_1
        - FLOW_S_STROKE_END
        allocated_requirements:
        - R1
        - R8
        - R9
        - R18
      - id: F5
        verb_noun: Signal Completion
        description: 'Provide the operator with tactile or visual feedback that the
          riveting stroke has reached its required depth or that the rivet is fully
          set.

          '
        input_flows:
        - FLOW_S_STROKE_END
        output_flows:
        - OUT_SIG_1
        allocated_requirements:
        - R11
      - id: F6
        verb_noun: Support Tool
        description: 'Provide a stable base and interface with the workshop bench
          (wood worktop) to resist operating forces and ensure tool stability and
          portability.

          '
        input_flows: []
        output_flows:
        - FLOW_E_REACTION
        allocated_requirements:
        - R12
        - R14
      hierarchy:
      - parent: F0
        children:
        - F1
        - F2
        - F3
        - F4
        - F5
        - F6
      connections:
      - from_function: F1
        to_function: F4
        flow_id: FLOW_M_ALIGNED_WORKPIECE
      - from_function: F2
        to_function: F4
        flow_id: FLOW_M_ALIGNED_RIVET
      - from_function: F3
        to_function: F4
        flow_id: FLOW_E_AMPLIFIED
      - from_function: F4
        to_function: F5
        flow_id: FLOW_S_STROKE_END
      - from_function: F6
        to_function: F3
        flow_id: FLOW_E_REACTION
      - from_function: F6
        to_function: F4
        flow_id: FLOW_E_REACTION
      completeness_checks:
        flow_conservation_notes: 'The function structure maintains flow conservation
          by ensuring all external inputs (material, energy, signal) from the black
          box are processed through subfunctions to generate the required outputs.
          Internal flows (e.g., amplified force, aligned components, reaction forces)
          bridge the subfunctions to achieve the overall transformation.

          '
        missing_functions_suspected: []
      assumptions:
      - Manual rivet insertion by the operator is guided by the tool's positioning
        features (F2).
      - The tool remains stationary and securely mounted on the workbench during the
        riveting process (F6).
      open_questions:
      - Is a specific mechanical stop or visual indicator required to signal the completion
        of the rivet head formation, or is it purely operator-sensed?
      traceability:
        derived_from_black_box: true
  working_principles:
    working_principles:
      principles:
      - id: WP1
        function_id: F1
        principle_name: Adjustable Radius Support (Prism/V-block)
        physical_effect_or_mechanism: "Two adjustable support points or a V-shaped\
          \ block that centers the curved brake shoe relative to the riveting axis.\
          \ \nSliding mechanisms allow the supports to move inward or outward to accommodate\
          \ different diameters.\n"
        key_parameters:
        - Support span (distance between contact points)
        - Adjustment range (250-400 mm diameter)
        - Lateral guide width (up to 400 mm)
        advantages:
        - Highly versatile for various shoe sizes
        - Simple mechanical adjustment
        disadvantages:
        - Requires manual setup for each shoe size
        - Potential for misalignment if not locked properly
        risks:
        - Slippage of the shoe during high-force application if friction is low
        impacted_requirements:
        - R2
        - R3
        - R4
      - id: WP2
        function_id: F1
        principle_name: Interchangeable Radius Bolsters
        physical_effect_or_mechanism: "A set of fixed-radius support blocks (bolsters)\
          \ that match specific brake shoe curvatures. \nThe operator swaps the bolster\
          \ based on the shoe being serviced.\n"
        key_parameters:
        - Bolster radius
        - Mounting interface (quick-change)
        advantages:
        - Very stable and precise support
        - No adjustment errors once the correct part is selected
        disadvantages:
        - Requires storage for multiple bolsters
        - Higher manufacturing cost for the set
        risks:
        - Operator using the wrong bolster size, leading to shoe deformation
        impacted_requirements:
        - R2
        - R20
      - id: WP3
        function_id: F2
        principle_name: Spring-Loaded Centering Sleeve
        physical_effect_or_mechanism: "A hollow sleeve surrounding the riveting punch.\
          \ The sleeve is spring-biased to extend forward, \nholding the rivet and\
          \ lining in alignment with the shoe hole before the punch makes contact.\n"
        key_parameters:
        - Spring constant
        - Sleeve inner diameter (3-5 mm)
        advantages:
        - Hands-free holding of the rivet during the stroke
        - Improves safety by keeping fingers away from the pinch point
        disadvantages:
        - Adds complexity to the punch assembly
        - Potential for the sleeve to jam with workshop dust
        risks:
        - Spring fatigue over the 5-year service life
        impacted_requirements:
        - R7
        - R18
      - id: WP4
        function_id: F3
        principle_name: Toggle Lever (Knee-Joint) Mechanism
        physical_effect_or_mechanism: "A linkage system where two bars move toward\
          \ a straight-line (dead center) position. \nThe mechanical advantage approaches\
          \ infinity as the links align, providing maximum force at the end of the\
          \ stroke.\n"
        key_parameters:
        - Link lengths
        - Input lever arm length
        - Transmission angle
        advantages:
        - Ideal force profile for riveting (highest force at the end of deformation)
        - High amplification with compact size
        disadvantages:
        - Force drops off rapidly if the rivet is not positioned at the correct stroke
          height
        risks:
        - High internal stresses on pins and joints
        impacted_requirements:
        - R8
        - R17
      - id: WP5
        function_id: F3
        principle_name: Eccentric Cam Actuation
        physical_effect_or_mechanism: "A rotating cam with an offset profile that\
          \ pushes a follower (the punch). \nThe cam profile can be designed to provide\
          \ a specific force-displacement curve.\n"
        key_parameters:
        - Cam eccentricity
        - Cam profile geometry
        - Handle length
        advantages:
        - Very robust and simple (few moving parts)
        - Easy to achieve a smooth stroke
        disadvantages:
        - High friction at the cam-follower interface
        - Limited stroke length compared to levers
        risks:
        - Wear on the cam surface reducing the final riveting force
        impacted_requirements:
        - R8
        - R17
        - R13
      - id: WP6
        function_id: F4
        principle_name: Axial Compression (Steady Press)
        physical_effect_or_mechanism: "The rivet head is formed by purely axial pressure\
          \ between a shaped punch and a stationary anvil. \nThe material flows plastically\
          \ to fill the hole and form the closure head.\n"
        key_parameters:
        - Punch tip geometry (cup or flat)
        - Final stroke depth
        advantages:
        - Quiet operation
        - Consistent head shape
        disadvantages:
        - Requires very high peak forces (>= 500 N)
        risks:
        - Over-pressing can crack the brittle brake lining
        impacted_requirements:
        - R1
        - R9
      - id: WP7
        function_id: F5
        principle_name: Adjustable Mechanical Hard Stop
        physical_effect_or_mechanism: "A physical bolt or collar that limits the travel\
          \ of the lever or punch. \nThe operator feels a sudden increase in resistance\
          \ when the target depth is reached.\n"
        key_parameters:
        - Stop position (adjustable for 4 mm closure)
        advantages:
        - Highly reliable tactile feedback
        - Prevents over-riveting
        disadvantages:
        - Must be adjusted if rivet sizes or material thicknesses change
        risks:
        - Stop loosening over time due to repeated impacts
        impacted_requirements:
        - R9
        - R11
      - id: WP8
        function_id: F6
        principle_name: Vice-Clamping Shank
        physical_effect_or_mechanism: "The tool base features a square or rectangular\
          \ protrusion (shank) designed to be \nclamped into a standard workshop bench\
          \ vice.\n"
        key_parameters:
        - Shank dimensions
        - Material strength of the base
        advantages:
        - Extremely portable and easy to store
        - Uses existing workshop equipment for stability
        disadvantages:
        - Requires the workshop to have a vice
        risks:
        - Tool may tilt if the vice is not tightened sufficiently
        impacted_requirements:
        - R12
        - R14
      - id: WP9
        function_id: F6
        principle_name: Bolted Base Plate with C-Clamp Option
        physical_effect_or_mechanism: "A wide flat base with pre-drilled holes for\
          \ permanent mounting to a wooden bench, \nor shaped to allow temporary attachment\
          \ using standard C-clamps.\n"
        key_parameters:
        - Base plate footprint
        - Bolt hole pattern
        advantages:
        - Maximum stability for high-volume work
        disadvantages:
        - Less portable if bolted down
        - Takes up permanent bench space
        risks:
        - Damage to the wooden worktop if not mounted correctly
        impacted_requirements:
        - R12
        - R14
      assumptions:
      - The "manual energy" can be either hand or foot, but the principles focus on
        hand-lever mechanisms as they are more common for bench-top tools.
      - The rivets are made of a ductile material (e.g., aluminum or soft steel) suitable
        for cold forming at the specified forces.
      open_questions:
      - Does the 400 mm width requirement (R3) imply the tool needs a very deep throat
        (C-frame) to reach the center of the shoe?
      - Is the 500 N force (R8) the input force or the required output forming force?
        (Assumed output based on context).
  concept_variants:
    concept_variants:
      morphological_chart:
      - function_id: F1
        options:
        - WP1
        - WP2
      - function_id: F2
        options:
        - WP3
      - function_id: F3
        options:
        - WP4
        - WP5
      - function_id: F4
        options:
        - WP6
      - function_id: F5
        options:
        - WP7
      - function_id: F6
        options:
        - WP8
        - WP9
      concepts:
      - id: CV1
        selected_principles:
          F1: WP1
          F2: WP3
          F3: WP4
          F4: WP6
          F5: WP7
          F6: WP8
        architecture_description: "The \"Universal Workshop Lever\" is a portable,\
          \ C-frame riveting tool designed for maximum versatility. \nIt uses an adjustable\
          \ V-block support (WP1) to center various brake shoe diameters (250-400\
          \ mm). \nThe force is generated by a hand-operated toggle lever mechanism\
          \ (WP4), which provides a high mechanical \nadvantage at the end of the\
          \ stroke where rivet deformation is greatest. The tool is secured to the\
          \ \nworkshop bench using a square shank (WP8) clamped into a standard vice.\
          \ A spring-loaded sleeve (WP3) \nensures the rivet is aligned before the\
          \ axial punch (WP6) forms the head, and an adjustable hard stop (WP7) \n\
          signals the completion of the 4 mm closure.\n"
        expected_benefits:
        - High portability and easy storage due to the vice-clamping design (R14).
        - One-size-fits-all capability for the specified range of brake shoes (R2,
          R3).
        - Ergonomic operation with low hand force due to the toggle lever's force
          profile (R17).
        key_risks:
        - Setup time: The operator must manually adjust the V-block for different
            shoe sizes.
        - Stability: Depends entirely on the tightness of the workshop vice.
        requirement_coverage:
          satisfied:
          - R1
          - R2
          - R3
          - R7
          - R8
          - R11
          - R14
          - R17
          - R18
          partially_satisfied:
          - R10
          - R20
          not_satisfied: []
        assumptions:
        - A standard workshop vice is available at the operating site.
        - The toggle lever linkage is sized to fit within the SwFr 400 cost constraint.
      - id: CV2
        selected_principles:
          F1: WP2
          F2: WP3
          F3: WP5
          F4: WP6
          F5: WP7
          F6: WP9
        architecture_description: "The \"Heavy-Duty Bench Press\" is a stationary\
          \ tool optimized for high-quality, repetitive workshop use. \nIt features\
          \ a bolted base plate (WP9) for permanent mounting. Instead of adjustable\
          \ supports, it uses \ninterchangeable radius bolsters (WP2) that provide\
          \ a perfect match for specific shoe curvatures, \nminimizing component stress.\
          \ The actuation is driven by an eccentric cam (WP5), providing a smooth,\
          \ \ncontrolled stroke. The rivet is guided by a centering sleeve (WP3) and\
          \ formed via axial compression (WP6). \nThe stroke depth is precisely controlled\
