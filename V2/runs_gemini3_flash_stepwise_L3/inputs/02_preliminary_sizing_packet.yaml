        - CV2
        - CV3
  embodiment_layouts:
    embodiment_layouts:
      layout:
      - id: EL1
        module_breakdown:
        - module_id: M1
          name: Main Frame and Mounting Base
          responsibilities:
          - Provide structural rigidity for riveting forces (min 500 N)
          - Interface with workshop bench or vice
          - Support the lever pivot and riveting ram guide
          allocated_functions:
          - F9 (ENSURE stability on table)
          - F10 (ENSURE safety)
        - module_id: M2
          name: Actuation and Amplification Assembly
          responsibilities:
          - Accept manual input from operator (hand or foot)
          - Amplify input force to required riveting force via lever mechanism
          - Transfer motion to the riveting ram
          allocated_functions:
          - F4 (ACCEPT actuating force)
          - F5 (AMPLIFY force)
        - module_id: M3
          name: Riveting Head and Stroke Control
          responsibilities:
          - Form the rivet closure head
          - Provide adjustable hard stop for precise closure (approx. 4 mm)
          - Guide the linear motion of the forming tool
          allocated_functions:
          - F6 (CONTROL stroke and force)
          - F7 (FORM rivet head)
          - F3 (ALIGN work zone)
        - module_id: M4
          name: Workpiece Support Fixture
          responsibilities:
          - Support the brake shoe and lining assembly
          - Accommodate various shoe diameters (250-400 mm) and widths (80-400 mm)
          - Allow repositioning for multiple rivets
          allocated_functions:
          - F1 (Prepare and CLAMP workpiece)
          - F2 (INSERT and POSITION rivet)
          - F8 (ENABLE repositioning for next rivet)
        interfaces:
        - id: IF1
          between:
          - M1
          - M2
          type:
          - mechanical
          description: Lever pivot interface
          constraints:
          - Must withstand reaction forces from 500 N riveting load
          - Low friction bearing/bushing required for 5-year service life
        - id: IF2
          between:
          - M2
          - M3
          type:
          - mechanical
          description: Linkage between lever and riveting ram
          constraints:
          - Must convert angular lever motion to linear ram motion
          - Minimize side-loading on the ram guide
        - id: IF3
          between:
          - M3
          - M4
          type:
          - mechanical
          description: Working zone interface (Tooling to Workpiece)
          constraints:
          - Alignment between upper forming tool and lower support anvil
          - Clearance for 45 mm maximum stack thickness
        - id: IF4
          between:
          - M2
          - human
          type:
          - human
          description: Operator handle/pedal interface
          constraints:
          - Hand force <= 200 N or Foot force <= 400 N
          - Ergonomic grip/surface for workshop environment (oil/dust)
        key_design_parameters:
        - id: KDP1
          name: Lever Mechanical Advantage Ratio
          unit: ratio
          target_or_range: 2.5:1 to 3.5:1
          linked_requirements:
          - R8
          - R17
        - id: KDP2
          name: Throat Depth (Frame Clearance)
          unit: mm
          target_or_range: '> 200 mm'
          linked_requirements:
          - R3
        - id: KDP3
          name: Adjustable Stop Resolution
          unit: mm/turn
          target_or_range: 1.0 - 1.5 mm (Fine thread)
          linked_requirements:
          - R9
        - id: KDP4
          name: Vertical Working Opening
          unit: mm
          target_or_range: '>= 50 mm'
          linked_requirements:
          - R5
        risks_and_mitigations:
        - id: RM1
          risk: Frame deflection under 500 N load leads to inconsistent rivet closure.
          mitigation: Perform FEA on C-frame; use ribbed cast iron or heavy-gauge
            welded steel.
        - id: RM2
          risk: Pinch hazard between lever and frame during high-force stroke.
          mitigation: Design mechanical stops and provide protective shrouding or
            safe-clearance zones.
        - id: RM3
          risk: Adjustment drift of the stroke stop due to vibration/repeated impact.
          mitigation: Use a secondary lock-nut or detent mechanism on the adjustment
            screw.
      assumptions:
      - The "400 mm width" requirement (R3) refers to the total width of the shoe,
        but the riveting line is typically accessible from the side; throat depth
        may not need to be the full 400 mm.
      - Standard DIN 7338 rivets are used as the baseline for forming tool geometry.
      open_questions:
      - Is a foot-pedal option required as an interchangeable module, or is a single
        hand-lever sufficient?
      - Does the "wood worktop" (R12) require a specific clamping plate to prevent
        damage to the bench?
      traceability:
        selected_concept_id: CV3
  preliminary_sizing:
    preliminary_sizing:
      load_cases:
      - id: LC1
        description: "Maximum Riveting Force (Static): The tool must apply the required\
          \ forming force \nto the rivet while the operator applies the maximum allowable\
          \ manual force.\n"
        related_requirements:
        - R8
        - R17
      - id: LC2
        description: "Geometric Capacity (Clearance): The tool frame must accommodate\
          \ the largest \nspecified brake shoe dimensions and stack thicknesses without\
          \ interference.\n"
        related_requirements:
        - R3
        - R5
      - id: LC3
        description: "Cyclic Loading (Durability): The mechanism must withstand repeated\
          \ operation \nover the intended service life without excessive wear or fatigue\
          \ failure.\n"
        related_requirements:
        - R10
        - R13
      sizing_results:
      - parameter_id: KDP1
        governing_case: LC1
        equation_or_model: 'Mechanical Advantage (MA) = F_rivet / (F_hand * eta)

          where eta is the mechanical efficiency of the linkage.

          '
        assumed_values:
          F_rivet: 500 N
          F_hand_max: 200 N
          eta: 0.85
        result: MA >= 2.94
        margin_or_factor_of_safety: Target ratio 3.5:1 provides a safety margin of
          ~1.19 against operator fatigue.
      - parameter_id: KDP2
        governing_case: LC2
        equation_or_model: 'Throat Depth >= Shoe_Width_Max / 2 (assuming central riveting)

          '
        assumed_values:
          Shoe_Width_Max: 400 mm
        result: Throat Depth >= 200 mm
        margin_or_factor_of_safety: 1.0 (Minimum clearance)
      - parameter_id: KDP4
        governing_case: LC2
        equation_or_model: 'Vertical Opening = Max_Stack_Thickness + Tooling_Clearance

          '
        assumed_values:
          Max_Stack_Thickness: 45 mm
          Tooling_Clearance: 10 mm
        result: Vertical Opening >= 55 mm
        margin_or_factor_of_safety: 1.1 (to allow for easy insertion/removal)
      - parameter_id: B1
        governing_case: LC1
        equation_or_model: 'Frame Bending Stress (sigma) = (F_rivet * Throat_Depth
          * c) / I

          Must be < Yield Strength / SF

          '
        assumed_values:
          Material: Structural Steel (S235)
          Yield_Strength: 235 MPa
          SF: 2.0
        result: Required Section Modulus (I/c) >= 425 mm^3
        margin_or_factor_of_safety: 2.0 (Design Factor)
      - parameter_id: B2
        governing_case: LC1
        equation_or_model: 'Pivot Pin Shear Stress (tau) = (F_rivet + F_hand) / (2
          * Area_pin)

          For double shear.

          '
        assumed_values:
          F_total: 700 N
          Pin_Material: Steel (tau_allowable = 100 MPa)
        result: Pin Diameter >= 3 mm
        margin_or_factor_of_safety: '> 3.0 (Standard pin sizes like 8mm or 10mm will
          be used for bearing area)'
      assumptions:
      - Mechanical efficiency (eta) of 0.85 accounts for friction in the lever pivot
        and ram guide.
      - The 500 N riveting force (R8) is the peak force required at the end of the
        stroke.
      - The "400 mm width" (R3) implies the tool must reach the center of the shoe,
        requiring a 200 mm throat depth.
      - Service life (LC3) calculation: 70 rivets/day * 250 days/year * 5 years =
          87,500 cycles. This is well within the infinite life regime for steel if
          stresses are kept low.
      open_questions:
      - Does the 500 N force requirement (R8) apply to the largest rivet diameter
        (5 mm) or is it a general minimum?
      - Is the "wood worktop" (R12) capable of resisting the 500 N reaction force
        without local crushing, or is a spreader plate required?
      - What is the specific material of the DIN 7338 rivets? (Harder materials may
        require higher forces than 500 N).
