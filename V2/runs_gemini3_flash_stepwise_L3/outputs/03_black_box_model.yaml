black_box:
  overall_function: 'Transform separate brake components (shoe, lining, rivets) and
    manual energy into a high-quality riveted brake assembly through controlled force
    application and positioning.

    '
  flows:
    inputs:
    - id: IN_MAT_1
      type: material
      name: Brake shoe
      description: 'Internal drum brake shoe with diameter 250-400 mm and width 80-400
        mm.

        '
    - id: IN_MAT_2
      type: material
      name: Brake lining
      description: 'Friction lining to be attached to the shoe.

        '
    - id: IN_MAT_3
      type: material
      name: Rivets
      description: 'Rivets with shank diameter 3-5 mm.

        '
    - id: IN_ENE_1
      type: energy
      name: Manual actuation force
      description: 'Human-powered input (Hand force <= 200 N or Foot force <= 400
        N).

        '
    - id: IN_SIG_1
      type: signal
      name: Positioning and alignment control
      description: 'Visual or tactile information used by the operator to align the
        rivet holes and the tool.

        '
    outputs:
    - id: OUT_MAT_1
      type: material
      name: Riveted brake assembly
      description: 'Brake shoe and lining joined by set rivets with a head closure
        of approximately 4 mm.

        '
    - id: OUT_ENE_1
      type: energy
      name: Dissipated energy
      description: 'Heat and sound generated during the deformation of the rivet and
        friction within the mechanism.

        '
    - id: OUT_SIG_1
      type: signal
      name: Riveting completion feedback
      description: 'Tactile or visual confirmation that the rivet has been fully set
        and the stroke is complete.

        '
  external_interactions:
  - id: EI1
    description: 'Mechanical interface with a workshop bench or worktop (typically
      wood) for stability during operation.

      '
    related_requirements:
    - R12
  - id: EI2
    description: 'Interaction with workshop environment contaminants such as dust
      and oil.

      '
    related_requirements:
    - R12
  - id: EI3
    description: 'Ergonomic and safety interface with the human operator (mechanic).

      '
    related_requirements:
    - R11
    - R17
    - R18
  assumptions:
  - Rivets are manually inserted into the holes by the operator before or during the
    tool's operation.
  - The tool remains stationary on the workbench during the riveting process.
  - The "signal" inputs and outputs are primarily mediated through the human operator's
    senses (sight and touch).
  open_questions:
  - Is there a requirement for a specific depth stop or visual indicator on the tool
    itself to signal completion?
  traceability:
    derived_from_requirements:
    - R1
    - R2
    - R3
    - R4
    - R7
    - R8
    - R9
    - R11
    - R12
    - R17
    - R18
