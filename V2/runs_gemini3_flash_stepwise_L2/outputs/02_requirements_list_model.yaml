requirements_list:
  requirements:
  - id: R1
    statement: 'The tool must reliably set rivets to join brake linings to brake shoes
      for internal drum brakes, ensuring a high-quality joint.

      '
    type: functional
    priority: MUST
    metric: Joint integrity and rivet head closure
    target: Meets acceptance criteria for brake safety
    verification: test
    source: O1, EC2
  - id: R2
    statement: 'The tool must provide mechanisms to position and support the brake
      shoe and lining during the riveting process.

      '
    type: functional
    priority: MUST
    metric: Alignment accuracy
    target: Correct positioning of components without slippage
    verification: inspection
    source: system_boundary
  - id: R3
    statement: 'The tool must guide the rivet insertion and/or position the rivet
      correctly relative to the workpiece.

      '
    type: functional
    priority: MUST
    metric: Rivet centering
    target: Rivet aligned with pre-drilled holes
    verification: demonstration
    source: system_boundary
  - id: R4
    statement: 'The tool must be operable by a single person (one-man operation).

      '
    type: ergonomics
    priority: MUST
    metric: Number of operators
    target: 1
    verification: demonstration
    source: O2
  - id: R5
    statement: 'The actuation force required (hand or foot) must remain within ergonomic
      limits for a workshop mechanic.

      '
    type: performance
    priority: MUST
    metric: Actuation force (N)
    target: Within standard ergonomic maxima for manual operation
    verification: analysis
    source: O2
  - id: R6
    statement: 'The tool must be mountable on a standard workshop worktop using a
      vice, base, or clamp.

      '
    type: interface
    priority: MUST
    metric: Mounting compatibility
    target: Secure attachment to wood worktop or vice
    verification: inspection
    source: system_boundary, operating_conditions
  - id: R7
    statement: 'The operation must not cause damage (scratches, deformation) to the
      brake shoes or linings.

      '
    type: safety
    priority: MUST
    metric: Component damage rate
    target: 0%
    verification: inspection
    source: problem_statement
  - id: R8
    statement: 'The tool design must eliminate pinch or crush hazards for the operator
      during the riveting stroke.

      '
    type: safety
    priority: MUST
    metric: Safety hazard identification
    target: Zero identified hazards
    verification: inspection
    source: EC7
  - id: R9
    statement: 'The manufacturing cost of the tool must not exceed the defined target.

      '
    type: cost
    priority: MUST
    metric: Production cost
    target: <= Target cost
    verification: analysis
    source: O4, EC8
  - id: R10
    statement: 'The tool must be delivered according to the workshop''s schedule requirements.

      '
    type: schedule
    priority: MUST
    metric: Delivery date
    target: On-time delivery
    verification: analysis
    source: O4
  - id: R11
    statement: 'The tool should maximize riveting speed to improve workshop throughput.

      '
    type: performance
    priority: WISH
    metric: Cycle time per rivet
    target: Minimize
    verification: test
    source: EC1
  - id: R12
    statement: 'The tool should be robust and durable for long-term workshop use with
      minimal maintenance.

      '
    type: performance
    priority: WISH
    metric: Service life / Failure rate
    target: Maximize
    verification: analysis
    source: O3, EC6
  - id: R13
    statement: 'The tool should be portable and easy to store when not in use.

      '
    type: ergonomics
    priority: WISH
    metric: Mass and volume
    target: Minimize
    verification: inspection
    source: O3, EC5
  - id: R14
    statement: 'The tool should be easy to service, with accessible parts for replacement.

      '
    type: other
    priority: WISH
    metric: Maintenance time
    target: Minimize
    verification: analysis
    source: EC4
  assumptions:
  - The tool is intended for manual actuation (hand or foot) only, not pneumatic or
    hydraulic power.
  - The primary work surface is a wooden workshop bench.
  - Standard rivets for internal drum brakes are used.
  open_questions:
  - What are the specific numerical values for the "stated maxima" of actuation force?
  - What is the specific "target cost" for manufacturing?
  - What are the exact dimensions of the brake shoes and linings to be accommodated?
  traceability:
    derived_from_objectives:
    - O1
    - O2
    - O3
    - O4
    derived_from_constraints:
    - EC1
    - EC2
    - EC3
    - EC4
    - EC5
    - EC6
    - EC7
    - EC8
