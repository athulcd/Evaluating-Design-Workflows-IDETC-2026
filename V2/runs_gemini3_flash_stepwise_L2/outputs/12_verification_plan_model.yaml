verification_plan:
  requirement_verification:
  - requirement_id: R1
    method: demonstration
    procedure_summary: 'Perform riveting operations on a representative sample set
      of brake shoes and linings covering the minimum and maximum size ranges specified
      in R2-R5.

      '
    conditions: 'Standard workshop environment using typical manual actuation.

      '
    metric: 'Visual and tactile inspection of the joint integrity.

      '
    acceptance_criteria: 'Successful rivet set without damage to the lining or shoe;
      joint is tight and secure.

      '
    linked_components:
    - B3
    - B5
  - requirement_id: R2
    method: inspection
    procedure_summary: 'Measure the physical clearance and adjustment range of the
      workholding fixture (M2) and the frame throat depth (M1).

      '
    conditions: 'Ambient workshop conditions.

      '
    metric: 'Millimeters (mm)

      '
    acceptance_criteria: 'Fixture accommodates brake drum internal diameters from
      250 mm to 400 mm.

      '
    linked_components:
    - B1
    - B5
  - requirement_id: R3
    method: inspection
    procedure_summary: 'Measure the maximum width capacity of the workholding fixture
      and support surfaces.

      '
    conditions: 'Ambient workshop conditions.

      '
    metric: 'Millimeters (mm)

      '
    acceptance_criteria: 'Fixture accommodates brake shoe widths from 80 mm to 400
      mm.

      '
    linked_components:
    - B5
  - requirement_id: R4
    method: inspection
    procedure_summary: 'Measure the clamping range and gap of the fixture for the
      shoe thickness.

      '
    conditions: 'Ambient workshop conditions.

      '
    metric: 'Millimeters (mm)

      '
    acceptance_criteria: 'Fixture accommodates shoe thicknesses between 6 mm and 8
      mm.

      '
    linked_components:
    - B5
  - requirement_id: R5
    method: inspection
    procedure_summary: 'Measure the maximum opening between the riveting heads at
      full retraction.

      '
    conditions: 'Ambient workshop conditions.

      '
    metric: 'Millimeters (mm)

      '
    acceptance_criteria: 'Maximum stack thickness capacity >= 45 mm.

      '
    linked_components:
    - B1
    - B3
  - requirement_id: R6
    method: inspection
    procedure_summary: 'Verify the positioning stops on the workholding fixture relative
      to the rivet head center.

      '
    conditions: 'Ambient workshop conditions.

      '
    metric: 'Millimeters (mm)

      '
    acceptance_criteria: 'Minimum distance from rivet center to edge >= 4 mm.

      '
    linked_components:
    - B5
  - requirement_id: R7
    method: inspection
    procedure_summary: 'Measure the diameters of the rivet head set (B3) and any guide
      bushings.

      '
    conditions: 'Ambient workshop conditions.

      '
    metric: 'Millimeters (mm)

      '
    acceptance_criteria: 'Compatible with rivet shank diameters of 3 mm to 5 mm.

      '
    linked_components:
    - B3
  - requirement_id: R8
    method: test
    procedure_summary: 'Place a calibrated load cell between the riveting heads and
      apply the maximum allowable operator input force to the lever.

      '
    conditions: 'Tool mounted securely to a bench.

      '
    metric: 'Newtons (N)

      '
    acceptance_criteria: 'Riveting force capability >= 500 N.

      '
    linked_components:
    - B1
    - B2
    - B3
  - requirement_id: R9
    method: test
    procedure_summary: 'Rivet a series of test samples and measure the final head
      closure dimension using calibrated calipers.

      '
    conditions: 'Adjustable stroke stop (B4) set to the target position.

      '
    metric: 'Millimeters (mm)

      '
    acceptance_criteria: 'Rivet head closure dimension is approximately 4 mm (within
      +/- 0.2 mm).

      '
    linked_components:
    - B3
    - B4
  - requirement_id: R11
    method: demonstration
    procedure_summary: 'A single operator shall perform the complete sequence: setup,
      workpiece positioning, rivet insertion, actuation, and repositioning.

      '
    conditions: 'Standard workshop bench setup.

      '
    metric: 'Pass/Fail (Single operator capability)

      '
    acceptance_criteria: 'All tasks performed by one person without external assistance
      or excessive strain.

      '
    linked_components:
    - M4
    - M2
  - requirement_id: R12
    method: demonstration
    procedure_summary: 'Mount the tool to a standard wooden workshop bench using the
      intended interface (vice or bolts) and perform riveting.

      '
    conditions: 'Workshop environment with typical contaminants (dust/oil).

      '
    metric: 'Stability observation / Displacement under load.

      '
    acceptance_criteria: 'Tool remains stable and securely attached during full-force
      operation.

      '
    linked_components:
    - B1
  - requirement_id: R15
    method: test
    procedure_summary: 'Perform a repetitive riveting test (e.g., 100 cycles) and
      inspect for component deformation, wear, or adjustment drift.

      '
    conditions: 'Continuous manual operation.

      '
    metric: 'Failure count / Dimensional drift (mm).

      '
    acceptance_criteria: 'No critical failures; closure dimension remains within the
      specified tolerance band.

      '
    linked_components:
    - B1
    - B3
    - B4
  - requirement_id: R17
    method: test
    procedure_summary: 'Measure the input force applied at the handle/pedal required
      to generate the 500 N output force using a force gauge.

      '
    conditions: 'Standard operating posture.

      '
    metric: 'Newtons (N)

      '
    acceptance_criteria: 'Hand force <= 200 N OR foot force <= 400 N.

      '
    linked_components:
    - B2
  - requirement_id: R18
    method: inspection
    procedure_summary: 'Conduct a safety walkthrough and hazard assessment of the
      prototype, checking for pinch points, sharp edges, and stability.

      '
    conditions: 'Full range of motion of all moving parts.

      '
    metric: 'Number of unmitigated hazards.

      '
    acceptance_criteria: 'Zero unmitigated pinch or crush hazards in the operator''s
      primary interaction zones.

      '
    linked_components:
    - M8
  coverage_gaps:
  - 'R13 (Service life) and R16 (Maintenance-free) cannot be fully verified through
    short-term testing; these rely on accelerated life testing or theoretical wear
    analysis which are not currently detailed.

    '
  - 'R10 (Productivity) is highly dependent on operator proficiency and is only verified
    via demonstration rather than a statistical time-study.

    '
  - 'R20 (Manufacturing cost) requires a final audit of procurement and labor costs
    post-prototype.

    '
  assumptions:
  - 'Rivet materials used for testing are consistent with DIN 7338 standards as referenced
    in the requirements.

    '
  - 'The workshop bench used for R12 is of standard industrial height and stiffness.

    '
  - 'The operator performing demonstrations has basic mechanical training typical
    of a car mechanic.

    '
  open_questions:
  - 'What is the specific allowable tolerance band for the 4 mm head closure (R9)?

    '
  - 'Are there specific environmental durability requirements (e.g., corrosion resistance)
    to validate the 5-year service life (R13)?

    '
  - Does the "no special accidents" requirement (R18) imply a need for formal CE marking
    or similar regulatory compliance?
