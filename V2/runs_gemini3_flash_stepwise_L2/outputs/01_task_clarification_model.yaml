task_clarification:
  problem_statement: 'Design a simple, manual rivet setting tool for a car repair
    workshop to attach friction linings to internal expanding drum brake shoes. The
    tool must be manufacturable in-house using existing machining facilities, with
    a production run of 5 units and a target cost of 400-500 CHF per unit. It must
    handle drum diameters from 250 to 400 mm and set DIN 7338 copper rivets (3-5 mm
    shank) with a force of 500 N, while remaining ergonomic for a single operator
    and compact for storage.

    '
  system_boundary:
    included:
    - Rivet setting mechanism (punch and die)
    - Force amplification system (levers or linkages)
    - Workpiece support and positioning interface
    - Mounting interface for wooden worktop
    - Operator interface (hand lever or foot pedal)
    excluded:
    - Manufacturing of copper rivets
    - Pre-drilling of brake shoes and linings
    - Cleaning of workpieces
    - The wooden worktop itself
  objectives:
  - id: O1
    description: 'Ensure high reliability and maintenance-free operation over a 5-year
      service life.

      '
    rationale: 'The tool is used in a professional workshop environment where downtime
      must be minimized.

      '
    measurable_proxy: 'Number of maintenance interventions required per year.

      '
  - id: O2
    description: 'Optimize for compact storage and ease of transport.

      '
    rationale: 'The workshop requires the tool to be stored when not in use and potentially
      moved between workstations.

      '
    measurable_proxy: 'Total volume (cm^3) and weight (kg) of the tool.

      '
  - id: O3
    description: 'Minimize manufacturing costs toward the 400 CHF target.

      '
    rationale: 'To ensure economic viability for in-house production and potential
      future sales.

      '
    measurable_proxy: 'Total cost of materials and machining hours per unit.

      '
  constraints:
  - id: C1
    description: 'Manufacturing cost must not exceed 500 CHF per unit.

      '
    type: cost
    measurable_proxy: 'CHF per unit.

      '
  - id: C2
    description: 'Design delivery timeframe is 3 to 4 months.

      '
    type: schedule
    measurable_proxy: 'Weeks from project start.

      '
  - id: C3
    description: 'Tool must generate a riveting force of approximately 500 N.

      '
    type: physical
    measurable_proxy: 'Newtons (N).

      '
  - id: C4
    description: 'Working stroke for rivet closure must be 3 to 4 mm.

      '
    type: physical
    measurable_proxy: 'Millimeters (mm).

      '
  - id: C5
    description: 'Operating force must not exceed 200 N for hand-operation or 400
      N for foot-operation.

      '
    type: safety
    measurable_proxy: 'Newtons (N).

      '
  - id: C6
    description: 'Must accommodate drum brake shoes with 250-400 mm inside diameter
      and 100 mm width.

      '
    type: interface
    measurable_proxy: 'Millimeters (mm).

      '
  - id: C7
    description: 'Must handle copper rivets DIN 7338 with shank diameters of 3 to
      5 mm.

      '
    type: regulatory
    measurable_proxy: 'DIN standard compliance.

      '
  - id: C8
    description: 'Minimum clearance of 10 mm from rivet center to the shoe rib.

      '
    type: physical
    measurable_proxy: 'Millimeters (mm).

      '
  stakeholders:
  - Car repair workshop management
  - Car mechanics (operators)
  - Consulting agency designer
  - Potential future external buyers
  operating_conditions:
  - 'Workshop environment with standard ambient temperatures.

    '
  - 'Mounted on a wooden worktop.

    '
  - 'Workload of approximately 70 rivets per day.

    '
  - 'One-man operation.

    '
  evaluation_criteria:
  - id: EC1
    description: 'Total manufacturing cost per unit.

      '
    metric: 'CHF

      '
    target_or_direction: '< 400 CHF

      '
  - id: EC2
    description: 'Peak force required from the operator.

      '
    metric: 'Newtons (N)

      '
    target_or_direction: 'Minimize (within ergonomic limits)

      '
  - id: EC3
    description: 'Tool footprint and storage volume.

      '
    metric: 'mm^2 / mm^3

      '
    target_or_direction: 'Minimize

      '
  - id: EC4
    description: 'Ease of workpiece positioning (time per rivet).

      '
    metric: 'Seconds

      '
    target_or_direction: 'Minimize

      '
  assumptions:
  - 'The "well-equipped machining facilities" include standard lathes, milling machines,
    and drilling equipment.

    '
  - 'The wooden worktop is sufficiently rigid to withstand the reaction forces of
    the riveting process.

    '
  - 'Standard ergonomic guidelines for working height refer to approximately 900 mm
    from the floor.

    '
  open_questions:
  - 'Is a foot-pedal or a hand-lever preferred by the workshop mechanics?

    '
  - 'What are the specific mounting requirements for the wooden worktop (e.g., permanent
    bolting or temporary clamping)?

    '
  - 'Are there specific weight limits for the tool to be considered "easy to transport"?

    '
  - 'What is the specific material composition of the "special friction material"
    to assess potential brittleness during riveting?

    '
  traceability:
    derived_from:
    - raw_task_statement
