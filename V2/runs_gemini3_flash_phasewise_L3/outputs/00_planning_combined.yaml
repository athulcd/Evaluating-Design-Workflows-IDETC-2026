task_clarification:
  objectives:
  - OBJ_1: 'Design a simple, reliable rivet setting tool for attaching linings to
      internal expanding drum brake shoes.

      '
  - OBJ_2: 'Enable in-house production of 5 units using the workshop''s well-equipped
      machining facilities.

      '
  - OBJ_3: 'Ensure the tool is optimized for a one-man operation by a car mechanic
      in a workshop environment.

      '
  constraints:
  - C_1: 'Manufacturing cost per unit must be under 500 CHF, with a specific target
      maximum of 400 CHF.

      '
  - C_2: 'Design delivery timeframe is 3 months, with a maximum allowable limit of
      4 months.

      '
  - C_3: 'Operating force must not exceed 200 N for hand-operated tools or 400 N for
      foot-operated tools.

      '
  - C_4: 'The tool must generate a riveting force of approximately 500 N and a working
      stroke of 3 to 4 mm.

      '
  - C_5: 'The tool must accommodate brake shoes with inside diameters from 250 to
      400 mm and widths up to 100 mm.

      '
  - C_6: 'The tool must handle a total workpiece thickness (shoe + lining) of up to
      15 mm and maintain a 10 mm rib clearance.

      '
  - C_7: 'The tool must be compatible with DIN 7338 annealed copper rivets with shank
      diameters of 3 to 5 mm.

      '
  evaluation_criteria:
  - EC_1: 'Manufacturing cost efficiency (closeness to the 400 CHF target).

      '
  - EC_2: 'Ergonomic quality, including operating force and compliance with standard
      working height guidelines.

      '
  - EC_3: 'Compactness and ease of transport/storage.

      '
  - EC_4: 'Reliability and maintenance-free operation over a 5-year service life.

      '
  assumptions:
  - A_1: 'The workshop''s machining facilities include standard equipment such as
      lathes, milling machines, and drills.

      '
  - A_2: 'The wooden worktop mentioned is of standard height and provides a stable
      mounting surface.

      '
  - A_3: 'Raw materials for the tool construction (e.g., steel stock) are readily
      available for in-house manufacturing.

      '
  open_questions:
  - Q_1: 'Are there specific dimensions or weight limits defined for "easy transport"
      and "compact storage"?

      '
  - Q_2: 'Is there a preference between a hand-operated or foot-operated mechanism
      for this specific workshop?

      '
  - Q_3: 'What is the specific thickness and material of the wooden worktop to determine
      mounting hardware?

      '
