raw_task_statement: The project involves developing a simple rivet setting tool for
  a large car repair workshop. The immediate demand is for 5 units, with potential
  future sales to other users. A designer from a consulting agency has been tasked
  with the layout, keeping in mind that the tools will be produced in-house using
  the repair workshop's well-equipped machining facilities. Adequate funding is available,
  but the manufacturing cost per unit must be kept under 500 Swiss Francs, with a
  specific target maximum of 400 Swiss Francs. The expected delivery timeframe for
  the design is 3 months, with a maximum allowable of 4 months. The tool's primary
  function is to rivet linings onto conventional internal expanding drum brake shoes.
  It is intended for a one-man operation by a car mechanic and will be mounted or
  used on a wooden worktop. The anticipated workload is approximately 70 rivets per
  day. From an ergonomic standpoint, the required operating force must not exceed
  200 N for a hand-operated tool or 400 N for a foot-operated tool, and the working
  height must comply with standard ergonomic guidelines. The equipment is expected
  to have a service life of five years and must be reliable, maintenance-free, easy
  to transport, and compact enough for good storage. Detailed dimensions and material
  properties for the workpieces have been established. The tool must handle internal
  drum brakes with an inside diameter ranging from 250 to 400 mm. The brake shoes
  are made of an aluminum alloy, weigh up to 2 kg, have a maximum width of 100 mm,
  and are supplied cleaned with pre-drilled holes. The brake linings are made of a
  special friction material, weigh up to 200 g, and come from-pressed and drilled.
  When assembled, the maximum total thickness of the shoe and lining parts is 15 mm,
  and each shoe requires 10-16 rivets. The tool must also accommodate a minimum clearance
  of 10 mm from the center of the rivet to the rib of the brake shoe. The hardware
  involves setting copper rivets that comply with DIN standard 7338. These rivets
  are provided in an annealed state and have a shank diameter of 3 to 5 mm. To successfully
  execute the technical process, the tool must generate a riveting force of approximately
  500 N. Furthermore, achieving a proper closure of the rivet requires a working stroke
  of approximately 3 to 4 mm.
