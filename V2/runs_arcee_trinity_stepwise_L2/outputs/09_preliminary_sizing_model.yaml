preliminary_sizing:
  load_cases:
  - id: LC1
    description: Maximum riveting force and stroke control during rivet forming
    related_requirements:
    - R8
    - R9
    - R17
    - R18
  sizing_results:
  - parameter_id: KDP1
    governing_case: LC1
    equation_or_model: 'F_required = F_rivet_min / MA

      where:

      F_rivet_min = 500 N (minimum required riveting force)

      MA = mechanical advantage of lever system

      F_operator_max = 200 N (hand force limit)

      Therefore: MA >= F_rivet_min / F_operator_max = 500/200 = 2.5'
    assumed_values:
      F_rivet_min: 500 N
      F_operator_max: 200 N
    result: MA >= 2.5 (recommended 3-4 for safety margin)
    margin_or_factor_of_safety: 1.2-1.6 (recommended)
  - parameter_id: KDP2
    governing_case: LC1
    equation_or_model: 's_closure = s_rivet_target + s_margin

      where:

      s_rivet_target = 4 mm (target closure head)

      s_margin = 0.5-1 mm (tolerance for wear/adjustment)

      Therefore: s_closure = 4.5-5 mm'
    assumed_values:
      s_rivet_target: 4 mm
      s_margin: 0.5-1 mm
    result: 4.5-5 mm adjustable range
    margin_or_factor_of_safety: 1.1-1.25
  - parameter_id: KDP3
    governing_case: LC1
    equation_or_model: 'L_throat = max(D_max, B_max) + clearance

      where:

      D_max = 400 mm (max brake drum diameter)

      B_max = 400 mm (max shoe width)

      clearance = 50-100 mm (for tool geometry and operator access)

      Therefore: L_throat = 450-500 mm'
    assumed_values:
      D_max: 400 mm
      B_max: 400 mm
      clearance: 50-100 mm
    result: 450-500 mm throat depth
    margin_or_factor_of_safety: 1.1-1.2
  assumptions:
  - Riveting force requirement of 500 N is the minimum; actual peak force may be higher
    depending on rivet material and geometry.
  - Hand force limit of 200 N is assumed for ergonomic sizing; foot actuation would
    allow higher forces but is not selected in CV3.
  - Closure head target of 4 mm is nominal; actual required stroke may vary with rivet
    type and material.
  - Work envelope sizing assumes worst-case brake shoe dimensions (400 mm diameter/width)
    plus clearance for tool geometry.
  - No explicit dynamic or impact loading is considered; sizing is based on quasi-static
    force requirements.
  open_questions:
  - What is the actual peak riveting force required for the specific rivet types and
    materials used in brake lining applications?
  - Are there any dynamic or impact loading considerations during the riveting stroke
    that would affect structural sizing?
  - Is there a requirement for rivet head shape/diameter beyond the closure distance
    that would affect the forming head geometry?
