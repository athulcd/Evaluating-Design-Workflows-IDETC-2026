artifacts_available:
  task_clarification:
    task_clarification:
      problem_statement: 'Design a hand-operated rivet-setting tool for riveting brake
        linings onto brake shoes for internal drum brakes. The tool shall enable workshop
        riveting with adequate quality and productivity, using typical workshop resources,
        without damage to components and with safe operation.

        '
      system_boundary:
        included:
        - Tooling to position brake shoe + lining and set rivets (forming/closure
          heads)
        - Mechanism to apply riveting force and control stroke/force
        - Means to position and support the workpiece(s) in the tool
        - Means to position rivet and/or guide rivet insertion
        - Means to mount/support tool on worktop (e.g., vice, base, clamp)
        - Human-powered actuation (hand/foot)
        excluded:
        - Manufacture of brake shoes, linings, and rivets
        - Automated production-line machinery
        - Brake system testing beyond rivet joint quality
      stakeholders:
      - Workshop mechanic / car mechanic (single operator)
      - Workshop owner (cost, throughput)
      - End user indirectly (brake safety)
      operating_conditions:
      - Workshop environment; typical contaminants (dust, oil) likely
      - Tool used on a worktop/bench (document notes wood worktop)
      objectives:
      - id: O1
        description: Reliable riveting of brake lining to brake shoe (quality joint)
        rationale: Primary technical function; safety-critical for brakes
        measurable_proxy: Rivet head closure and joint integrity within acceptance
          criteria
      - id: O2
        description: One-person operation with acceptable ergonomic effort
        rationale: Stated one-man operation; hand/foot force limits
        measurable_proxy: Actuation force within stated maxima
      - id: O3
        description: 'Workshop-suitable: portable, robust, low maintenance'
        rationale: Service life, transport, reliability targets
        measurable_proxy: Durability/service life targets; minimal maintenance
      - id: O4
        description: Meet cost and delivery targets for a workshop tool
        rationale: Manufacturing cost and planning requirements stated
        measurable_proxy: Manufacturing cost <= target; delivery schedule
      evaluation_criteria:
      - id: EC1
        description: Speed of riveting
        metric: Cycle time per rivet / rivets per day
        target_or_direction: Higher throughput preferred
      - id: EC2
        description: Quality of riveting
        metric: Head closure dimension; joint integrity
        target_or_direction: Meets acceptance with low defects
      - id: EC3
        description: Stability and time of operation
        metric: Setup time; stability on bench
        target_or_direction: Stable and fast to set up
      - id: EC4
        description: Ease of servicing
        metric: Access, replaceability, maintenance frequency
        target_or_direction: Easier preferred
      - id: EC5
        description: Storage/transportability
        metric: Mass/volume; portability
        target_or_direction: More portable preferred
      - id: EC6
        description: Reliability
        metric: Service life; failure rate
        target_or_direction: Higher preferred
      - id: EC7
        description: Safety
        metric: Pinch/crush hazards; safe operation
        target_or_direction: No hazards; compliant operation
      - id: EC8
        description: Expenditure/cost
        metric: Manufacturing cost; part count; assembly effort
        target_or_direction: Lower preferred
      assumptions:
      - Primary application is internal drum brakes as shown in the document (internal
        drum brake sketch).
      - The tool is bench-mounted and manually actuated, consistent with the case
        description.
      open_questions:
      - ''
      traceability:
        derived_from:
        - Case introduction and problem assignment (pp. 1-3)
        - Design specification sheets (pp. 4-5)
        - Concept evaluation criteria table (p. 14)
  requirements_list:
    requirements_list:
      requirements:
      - id: R1
        statement: Rivet brake lining onto brake shoe for internal drum brakes (workshop
          operation).
        type: functional
        priority: MUST
        metric: Successful rivet set without damage
        target: All specified brake shoe/lining sizes
        verification: demonstration
        source: Design specification (pp. 4-5)
      - id: R2
        statement: Brake drum internal diameter range shall be 250-400 mm (application
          context).
        type: interface
        priority: MUST
        metric: Supported brake shoe sizes
        target: D = 250-400 mm
        verification: inspection
        source: Design specification sheet 1/2 (p. 4)
      - id: R3
        statement: Brake shoe width range shall be 80-400 mm.
        type: interface
        priority: MUST
        metric: Supported width
        target: B = 80-400 mm
        verification: inspection
