        flow_id: WP2
      - from_function: F3
        to_function: F4
        flow_id: WP3
      - from_function: F4
        to_function: F6
        flow_id: WP4
      - from_function: F4
        to_function: F7
        flow_id: WP4
      - from_function: F5
        to_function: F1
        flow_id: WP5
      - from_function: F5
        to_function: F3
