        type: reliability
        priority: MUST
        metric: Mean time between failures (MTBF)
        target: '> 5 years'
        verification: analysis
        source: C6
      - id: R10
        statement: The tool must be compact and easily transportable.
        type: performance
        priority: MUST
        metric: Weight and volume
        target: < 10 kg, < 0.05 m³
        verification: inspection
        source: O2
      - id: R11
        statement: The tool must be suitable for mounting on a wooden worktop.
        type: interface
        priority: MUST
        metric: N/A
        target: N/A
        verification: inspection
        source: task_clarification
      - id: R12
        statement: The tool must be designed for one-man operation.
        type: ergonomics
        priority: MUST
        metric: N/A
        target: N/A
        verification: inspection
        source: task_clarification
      - id: R13
        statement: The tool must be manufactured at a cost of under 500 CHF per unit
          (target 400 CHF).
        type: cost
        priority: MUST
        metric: Swiss Francs (CHF)
        target: ≤ 500 (target 400)
        verification: analysis
        source: C1
      - id: R14
        statement: The design must be completed within 3-4 months.
        type: schedule
        priority: MUST
        metric: Months
        target: ≤ 4 (target 3)
        verification: inspection
        source: C2
      - id: R15
        statement: The tool must be capable of setting 3-5 mm copper rivets (DIN 7338).
        type: interface
        priority: MUST
        metric: Millimeters (mm)
        target: 3-5
        verification: inspection
        source: task_clarification
      - id: R16
        statement: The tool must handle 10-16 rivets per brake shoe.
        type: performance
        priority: MUST
        metric: Number of rivets
        target: 10-16
        verification: inspection
        source: task_clarification
      - id: R17
        statement: The tool must be suitable for daily workloads of approximately
          70 rivets.
        type: performance
        priority: MUST
        metric: Number of rivets per day
        target: 70
        verification: analysis
