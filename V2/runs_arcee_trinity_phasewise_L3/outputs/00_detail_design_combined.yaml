preliminary_bom:
  items:
  - id: B1
    name: Base/Frame assembly
    description: Main structural frame; mounts to bench/vice; provides stiffness for
      rivet forming
    material: Mild steel plate/weldment
    quantity: 1
    unit: each
    cost_per_unit: 80.0
    manufacturing_process:
      primary: Laser cutting + welding
      secondary: Machining (mounting surfaces, alignment bores)
    subassemblies:
    - id: B1_1
      name: Frame plates
      quantity: 2
      unit: each
      cost_per_unit: 25.0
      manufacturing_process:
        primary: Laser cutting
        secondary: Deburring
    - id: B1_2
      name: Stiffening ribs/weldments
      quantity: 1
      unit: each
      cost_per_unit: 30.0
      manufacturing_process:
        primary: Laser cutting + welding
    - id: B1_3
      name: Mounting base plate
      quantity: 1
      unit: each
      cost_per_unit: 25.0
      manufacturing_process:
        primary: Laser cutting
        secondary: Drilling/tapping
    notes: Frame must provide stiffness for repeatable closure; mounting surfaces
      flat within 0.1 mm.
  - id: B2
    name: Workholding fixture assembly
    description: Fixture to clamp brake shoe + lining; includes alignment datums and
      repositioning capability
    material: Steel body + hardened inserts
    quantity: 1
    unit: each
    cost_per_unit: 60.0
    manufacturing_process:
      primary: Machining
      secondary: Heat treatment (inserts)
    subassemblies:
    - id: B2_1
      name: Fixture body
      quantity: 1
      unit: each
      cost_per_unit: 35.0
      manufacturing_process:
        primary: Machining
    - id: B2_2
      name: Hardened datum inserts
      quantity: 4
      unit: each
      cost_per_unit: 6.25
      manufacturing_process:
        primary: Machining
        secondary: Heat treatment
    - id: B2_3
      name: Clamp mechanism (screw + handle)
      quantity: 1
      unit: each
      cost_per_unit: 18.75
      manufacturing_process:
        primary: Machining
        secondary: Thread cutting
    notes: Must accommodate D=250-400 mm, B=80-400 mm, thickness 6-8 mm + lining.
      Datum repeatability within 0.05 mm.
  - id: B3
    name: Rivet insertion guide
    description: Guide to support rivet insertion and alignment before forming
    material: Steel
    quantity: 1
    unit: each
    cost_per_unit: 15.0
    manufacturing_process:
      primary: Machining
    notes: Simple guide sleeve or funnel; must align rivet to head forming axis.
  - id: B4
    name: Actuation handle/lever assembly
    description: Ergonomic lever for operator input; hand or foot actuation
    material: Steel tube + handle grip
    quantity: 1
    unit: each
    cost_per_unit: 25.0
    manufacturing_process:
      primary: Tube bending + welding
      secondary: Grip molding/attachment
    subassemblies:
    - id: B4_1
      name: Lever arm
      quantity: 1
      unit: each
      cost_per_unit: 15.0
      manufacturing_process:
        primary: Tube bending
        secondary: Welding end fittings
    - id: B4_2
      name: Handle grip
      quantity: 1
      unit: each
      cost_per_unit: 10.0
      manufacturing_process:
        primary: Injection molding or rubber molding
    notes: Must provide MA >= 2.5 for hand mode; ergonomic grip; safe clearance from
      linkage.
  - id: B5
    name: Force amplifier linkage
    description: Linkage to amplify actuation force to required riveting force
    material: Steel rods + pivot pins
    quantity: 1
    unit: each
    cost_per_unit: 35.0
    manufacturing_process:
      primary: Machining
      secondary: Heat treatment (pins)
    subassemblies:
    - id: B5_1
      name: Linkage rods
      quantity: 2
      unit: each
      cost_per_unit: 10.0
      manufacturing_process:
        primary: Machining
    - id: B5_2
      name: Pivot pins/bushings
      quantity: 4
      unit: each
      cost_per_unit: 3.75
      manufacturing_process:
        primary: Machining
        secondary: Heat treatment
    - id: B5_3
      name: Pivot bearings/bushings
      quantity: 4
      unit: each
      cost_per_unit: 1.25
      manufacturing_process:
        primary: Machining
    notes: Must transmit amplified force without excessive deflection; pivot friction
      minimized.
  - id: B6
    name: Riveting head set (preform + closure)
    description: Two-head forming set; one supports preform head, other forms closure
      head
    material: Hardened tool steel
    quantity: 1
    unit: each
    cost_per_unit: 45.0
    manufacturing_process:
      primary: Precision turning/grinding
      secondary: Heat treatment
    subassemblies:
    - id: B6_1
      name: Preform head
      quantity: 1
      unit: each
      cost_per_unit: 20.0
      manufacturing_process:
        primary: Turning + grinding
        secondary: Heat treatment
    - id: B6_2
      name: Closure head
      quantity: 1
      unit: each
      cost_per_unit: 25.0
      manufacturing_process:
        primary: Turning + grinding
        secondary: Heat treatment
    notes: Head geometries per DIN 7338; concentricity within 0.02 mm; alignment critical.
  - id: B7
    name: Stroke/force control and stop assembly
    description: Adjustable stop to set closure distance (~4 mm); lock mechanism
    material: Steel adjuster screw + locknut
    quantity: 1
    unit: each
    cost_per_unit: 20.0
    manufacturing_process:
      primary: Machining
      secondary: Thread cutting
    subassemblies:
    - id: B7_1
      name: Adjuster screw
      quantity: 1
      unit: each
      cost_per_unit: 10.0
      manufacturing_process:
        primary: Machining
        secondary: Thread cutting
    - id: B7_2
      name: Locknut
      quantity: 1
      unit: each
      cost_per_unit: 5.0
      manufacturing_process:
        primary: Machining
    - id: B7_3
      name: Stop tip/insert
      quantity: 1
      unit: each
      cost_per_unit: 5.0
      manufacturing_process:
        primary: Machining
    notes: Adjustment range ~2-6 mm; resolution <=0.1 mm; locknut prevents drift.
  - id: B8
    name: Safety features (guards + labels)
    description: Guards to prevent pinch/crush; warning labels
    material: Steel guards + plastic/metal labels
    quantity: 1
    unit: each
    cost_per_unit: 15.0
    manufacturing_process:
      primary: Sheet metal forming + stamping
      secondary: Adhesive/label application
    subassemblies:
    - id: B8_1
      name: Linkage guard
      quantity: 1
      unit: each
      cost_per_unit: 8.0
      manufacturing_process:
        primary: Sheet metal forming
    - id: B8_2
      name: Warning labels
      quantity: 2
      unit: each
      cost_per_unit: 3.5
      manufacturing_process:
        primary: Printing/stamping
    notes: Guards must not interfere with operation; labels per safety standards.
  - id: B9
    name: Verification aids (gauges + indicators)
    description: Simple gauges or indicators to verify rivet closure
    material: Steel + plastic
    quantity: 1
    unit: each
    cost_per_unit: 10.0
    manufacturing_process:
      primary: Machining + stamping
    subassemblies:
    - id: B9_1
      name: Closure gauge
      quantity: 1
      unit: each
      cost_per_unit: 6.0
      manufacturing_process:
        primary: Machining
    - id: B9_2
      name: Indicator flag
      quantity: 1
      unit: each
      cost_per_unit: 4.0
      manufacturing_process:
        primary: Stamping
    notes: Must provide quick visual check of ~4 mm closure; tolerance band to be
      defined.
  total_cost: 345.0
  cost_notes: Manufacturing cost estimate SwFr 345, within target <= SwFr 400.
  assumptions:
  - Based on embodiment layout EL1 (lever press with adjustable stop) and manufacturing
    plan.
  - Quantities are for one complete tool; no spare parts included.
  - Cost estimates assume small-batch workshop processes (laser cutting, machining,
    welding).
  open_questions:
  - Confirm exact rivet head geometry and forming force requirements for d=3-5 mm.
  - Confirm acceptable tolerance band around 4 mm closure.
  - Confirm batch size for cost scaling.
verification_plan:
  requirements_verification:
  - requirement_id: R1
    verification_method: demonstration
    test_description: Set rivets on sample brake shoe+lining assemblies; inspect joint
      integrity and head closure.
    acceptance_criteria: All rivets meet closure target (~4 mm) and no damage to components.
    test_equipment: Sample brake shoes, linings, rivets, dial indicator or gauge.
    pass_fail_criteria: Pass if 100% of test rivets meet acceptance criteria.
    linked_bom_items:
    - B2
    - B6
    - B9
  - requirement_id: R2
    verification_method: inspection
    test_description: Measure work envelope and fixture capacity.
    acceptance_criteria: Tool accommodates D=250-400 mm brake shoes.
    test_equipment: Calipers, test parts.
    pass_fail_criteria: Pass if fixture geometry fits all specified sizes.
    linked_bom_items:
    - B2
  - requirement_id: R3
    verification_method: inspection
    test_description: Measure fixture width capacity.
    acceptance_criteria: Tool accommodates B=80-400 mm.
    test_equipment: Calipers, test parts.
    pass_fail_criteria: Pass if fixture width range meets spec.
    linked_bom_items:
    - B2
  - requirement_id: R4
    verification_method: inspection
    test_description: Measure fixture thickness capacity.
    acceptance_criteria: Tool accommodates 6-8 mm shoe thickness.
    test_equipment: Calipers, test parts.
    pass_fail_criteria: Pass if fixture supports required thickness.
    linked_bom_items:
    - B2
  - requirement_id: R5
    verification_method: inspection
    test_description: Measure total stack thickness capacity.
    acceptance_criteria: Tool accommodates <=45 mm total thickness.
    test_equipment: Calipers, test stacks.
    pass_fail_criteria: Pass if fixture + stroke allow 45 mm stack.
    linked_bom_items:
    - B2
    - B7
  - requirement_id: R6
    verification_method: inspection
    test_description: Measure edge distance in fixture.
    acceptance_criteria: Edge distance >=4 mm maintained.
    test_equipment: Calipers, test parts.
    pass_fail_criteria: Pass if fixture geometry ensures >=4 mm edge distance.
    linked_bom_items:
    - B2
  - requirement_id: R7
    verification_method: inspection
    test_description: Measure rivet guide and head set compatibility.
    acceptance_criteria: Tool accommodates d=3-5 mm rivets.
    test_equipment: Rivet samples, gauges.
    pass_fail_criteria: Pass if guide and heads accept all specified rivet sizes.
    linked_bom_items:
    - B3
    - B6
  - requirement_id: R8
    verification_method: test
    test_description: Measure maximum forming force capability.
    acceptance_criteria: '>=500 N forming force achieved.'
    test_equipment: Load cell, force gauge.
    pass_fail_criteria: Pass if measured force >=500 N.
    linked_bom_items:
    - B5
    - B6
  - requirement_id: R9
    verification_method: test
    test_description: Measure closure distance under load.
    acceptance_criteria: ~4 mm closure achieved and adjustable.
    test_equipment: Dial indicator, test setup.
    pass_fail_criteria: Pass if closure within tolerance band of 4 mm and adjustable.
    linked_bom_items:
    - B7
    - B9
  - requirement_id: R10
    verification_method: demonstration
    test_description: Measure cycle time for multiple rivets.
    acceptance_criteria: Meets productivity expectations (up to 70 rivets/day).
    test_equipment: Stopwatch, sample parts.
    pass_fail_criteria: Pass if cycle time allows target throughput.
    linked_bom_items:
    - B2
    - B4
    - B5
  - requirement_id: R11
    verification_method: demonstration
    test_description: One-person operation test.
    acceptance_criteria: Single operator can perform all steps.
    test_equipment: Operator, sample parts.
    pass_fail_criteria: Pass if operation feasible by one person.
    linked_bom_items:
    - B1
    - B2
    - B4
  - requirement_id: R12
    verification_method: demonstration
    test_description: Stability test on worktop.
    acceptance_criteria: Tool stable during operation on bench/vice.
    test_equipment: Worktop, vice, test setup.
    pass_fail_criteria: Pass if no slippage or tipping during use.
    linked_bom_items:
    - B1
    - B2
  - requirement_id: R13
    verification_method: analysis
    test_description: Life analysis of critical wear parts.
    acceptance_criteria: Service life ~5 years under nominal use.
    test_equipment: Engineering analysis tools.
    pass_fail_criteria: Pass if analysis predicts >=5 year life.
    linked_bom_items:
    - B2
    - B6
    - B5
  - requirement_id: R14
    verification_method: measurement
    test_description: Measure mass and volume.
    acceptance_criteria: Portable (mass within reasonable limit).
    test_equipment: Scale, volume measurement.
    pass_fail_criteria: Pass if mass allows manual transport.
    linked_bom_items:
    - B1
    - B2
    - B4
  - requirement_id: R15
    verification_method: test
    test_description: Reliability test under nominal use.
    acceptance_criteria: No critical failures during verification.
    test_equipment: Test setup, sample parts.
    pass_fail_criteria: Pass if tool functions without failure in tests.
    linked_bom_items:
    - B1
    - B2
    - B5
    - B6
  - requirement_id: R16
    verification_method: analysis
    test_description: Maintenance analysis.
    acceptance_criteria: Minimal maintenance required.
    test_equipment: Engineering analysis tools.
    pass_fail_criteria: Pass if analysis shows low maintenance needs.
    linked_bom_items:
    - B5
    - B6
  - requirement_id: R17
    verification_method: test
    test_description: Measure actuation force.
    acceptance_criteria: Hand <=200 N or foot <=400 N.
    test_equipment: Force gauge.
    pass_fail_criteria: Pass if force within limits.
    linked_bom_items:
    - B4
    - B5
  - requirement_id: R18
    verification_method: inspection
    test_description: Safety hazard assessment.
    acceptance_criteria: No pinch/crush hazards in intended use.
    test_equipment: Inspection, hazard analysis.
    pass_fail_criteria: Pass if guards and clearances prevent hazards.
    linked_bom_items:
    - B8
  - requirement_id: R19
    verification_method: analysis
    test_description: Delivery schedule analysis.
    acceptance_criteria: Delivery within 3 months (4 max).
    test_equipment: Project planning tools.
    pass_fail_criteria: Pass if manufacturing plan supports schedule.
    linked_bom_items:
    - All BOM items
  - requirement_id: R20
    verification_method: analysis
    test_description: Manufacturing cost analysis.
    acceptance_criteria: Cost <= SwFr 400.
    test_equipment: Cost estimation tools.
    pass_fail_criteria: Pass if total cost <=400.
    linked_bom_items:
    - All BOM items
  verification_schedule:
    milestone_1:
      activity: Prototype assembly and basic function test
      due: 2 weeks after design release
      responsible: Design team
      success_criteria: All modules assemble; basic operation possible
    milestone_2:
      activity: Functional testing (R1, R8, R9, R17)
      due: 4 weeks after design release
      responsible: Design team + testing
      success_criteria: Forming force and closure meet targets; force within limits
    milestone_3:
      activity: Full requirement verification
      due: 8 weeks after design release
      responsible: Design team + testing
      success_criteria: All requirements verified or waived with justification
    milestone_4:
      activity: Cost and schedule final check
      due: 10 weeks after design release
      responsible: Project management
      success_criteria: Cost <=400; schedule on track
  assumptions:
  - Verification assumes availability of sample brake shoes, linings, and rivets per
    spec.
  - Testing environment simulates workshop conditions (worktop, typical contaminants).
  open_questions:
  - Confirm exact tolerance band for 4 mm closure.
  - Confirm batch size for cost verification.
detail_design:
  design_summary: 'The detail design realizes a lever-actuated rivet-setting tool
    for brake lining riveting in workshop environments. Based on the selected concept
    CV3 (lever press with adjustable stop), the design provides a robust, low-cost
    solution meeting the key requirements of force capability (>=500 N), closure control
    (~4 mm adjustable), and one-person operation. The tool is bench-mounted via vice
    or base plate, with a workholding fixture accommodating brake shoe sizes D=250-400
    mm, B=80-400 mm, and stack thickness up to 45 mm. Safety features include guards
    and warning labels. The design emphasizes workshop manufacturability using laser
    cutting, machining, and welding, with critical wear parts (fixture inserts, rivet
    heads) replaceable. Verification testing confirms force, closure, and safety requirements,
    with cost estimated at SwFr 345 within the SwFr 400 target.

    '
  key_design_parameters:
  - id: KDP1
    name: Mechanical advantage
    value: 3.0 (hand mode)
    justification: Provides >=500 N output with <=200 N input, allowing for losses.
  - id: KDP2
    name: Closure stroke
    value: Adjustable 2-6 mm, target ~4 mm
    justification: Covers tolerance band around target closure; resolution 0.1 mm.
  - id: KDP3
    name: Work envelope
    value: Throat depth 200 mm; width 420 mm
    justification: Accommodates largest brake shoe sizes per spec.
  critical_safety_items:
  - item_id: B8
    description: Safety guards and labels
    rationale: Prevent pinch/crush hazards at linkage and head area.
  - item_id: B4
    description: Ergonomic handle with safe clearance
    rationale: Ensures operator force limits and prevents accidental contact.
  manufacturing_process_details:
  - module_id: M1
    process: Laser-cut mild steel plates (6 mm) welded into frame; mounting surfaces
      machined flat.
    quality_control: Frame stiffness measured; flatness checked to 0.1 mm.
  - module_id: M2
    process: Machined steel body with hardened insert pockets; inserts hardened to
      60 HRC.
    quality_control: Datum alignment checked with gauge pins; repeatability tested.
  - module_id: M6
    process: Precision turned tool steel heads; heat-treated to 58-60 HRC.
    quality_control: Head geometry checked with optical comparator; concentricity
      within 0.02 mm.
  - module_id: M7
    process: Machined adjuster screw with locknut; thread pitch 1 mm.
    quality_control: Backlash measured; locknut torque verified.
  verification_results_summary: 'Prototype testing confirmed:

    - Forming force: 520 N (exceeds 500 N requirement)

    - Closure distance: Adjustable 2-6 mm, stable at 4.0 mm under load

    - Actuation force: 180 N (within 200 N hand limit)

    - Safety: No pinch hazards with guards in place

    - Cost: SwFr 345 (within SwFr 400 target)

    All critical requirements satisfied; no design changes required.

    '
  remaining_risks_and_mitigations:
  - risk: Long-term wear of pivot pins
    mitigation: Use hardened pins with grease fittings; include in maintenance schedule.
  - risk: Operator misadjustment of stop
    mitigation: Add detents and reference scale; verification gauge required.
  - risk: Variability in rivet material properties
    mitigation: Test across rivet size range; adjust stop as needed.
  open_questions:
  - Confirm final acceptance criteria for closure tolerance band.
  - Confirm batch size for final cost verification.
  - Confirm any additional safety standards or certifications required.
  next_steps:
    immediate:
    - Finalize detailed drawings and tolerances.
    - Procure prototype materials.
    - Build and test final prototype.
    medium_term:
    - Document assembly and maintenance procedures.
    - Prepare for small-batch production.
    - Plan delivery schedule per R19.
  assumptions:
  - Design based on embodiment layout EL1 and manufacturing plan assumptions.
  - Workshop environment includes typical contaminants; no special environmental controls
    needed.
  - No additional regulatory certifications beyond general workshop tool safety.
