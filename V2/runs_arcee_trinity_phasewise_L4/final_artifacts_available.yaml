    description: Main tool assembly procedure
    steps:
    - Mount base to worktop using M8 bolts, torque to 25 Nm
    - Install lever pivot bushing in base, press-fit to 0.05 mm interference
    - Mount lever on pivot, verify smooth rotation
    - Install toggle pivot pins in base, press-fit to 0.02 mm interference
    - Assemble toggle mechanism, verify kinematic operation
    - Connect lever to toggle using M6 bolts, torque to 15 Nm
    - Install plunger pivot pin in toggle, press-fit to 0.02 mm interference
    - Mount plunger on pivot, verify smooth operation
    - Install brake shoe clamp on base using M6 bolts, torque to 12 Nm
    - Mount rivet guide on clamp using M4 screws, torque to 5 Nm
    - Verify all moving parts operate smoothly
    - Check overall dimensions and alignment
    - Perform function test with sample rivets and brake shoes
