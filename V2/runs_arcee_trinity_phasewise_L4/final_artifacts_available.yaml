verification_plan:
- id: VP_ForceVerification
  description: Force verification test
  requirement: R2
  method: Force measurement using load cell during operation
  success_criteria: 500 N ±50 N
  test_procedure:
  - Install load cell at plunger tip
  - Apply maximum lever force
  - Measure output force
  - Verify against requirements
  equipment: Load cell, data acquisition system
  pass_fail_criteria: Force within 450-550 N
- id: VP_StrokeVerification
  description: Working stroke verification
  requirement: R3
  method: Linear displacement measurement
  success_criteria: 3-4 mm stroke
  test_procedure:
  - Mark starting position
  - Operate lever through full range
  - Measure displacement
  - Verify against requirements
  equipment: Dial indicator, mounting fixture
  pass_fail_criteria: Stroke within 2.5-4.5 mm
- id: VP_ErgonomicVerification
  description: Ergonomic verification
  requirement: R12
  method: Force measurement and ergonomic assessment
  success_criteria: ≤200 N operating force
  test_procedure:
  - Measure force required to operate lever
  - Assess user comfort and fatigue
  - Verify against ergonomic standards
  equipment: Force gauge, ergonomic assessment tools
  pass_fail_criteria: Operating force ≤200 N
- id: VP_DurabilityVerification
  description: Durability verification
  requirement: R14
  method: Accelerated life testing
  success_criteria: 1000 cycles without failure
  test_procedure:
  - Mount tool on test stand
  - Cycle tool 1000 times at rated load
  - Inspect for wear and damage
  - Verify continued operation
  equipment: Test stand, cycling mechanism
  pass_fail_criteria: No structural failure after 1000 cycles
- id: VP_ClampVerification
  description: Brake shoe clamp verification
  requirement: R5, R6
  method: Dimensional and force testing
  success_criteria: Secure clamping of specified brake shoes
  test_procedure:
  - Test with brake shoes of various sizes
  - Verify minimum 10 mm clearance
  - Measure clamp force
  - Verify secure holding
  equipment: Sample brake shoes, force gauge
  pass_fail_criteria: Successful clamping of all test specimens
- id: VP_AssemblyVerification
  description: Assembly verification
  requirement: R19
  method: Dimensional and functional inspection
  success_criteria: Proper assembly and function
  test_procedure:
  - Verify all dimensions
  - Check alignment of moving parts
  - Test complete functionality
  - Verify mounting on worktop
  equipment: Calipers, alignment tools
  pass_fail_criteria: All critical dimensions within tolerance
