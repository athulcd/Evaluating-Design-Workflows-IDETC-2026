working_principles:
- id: WP1
  description: Manual lever mechanism
  function: F3
  principle: Mechanical advantage through lever system
  advantages:
  - Simple and reliable
  - Low cost
  - Easy to manufacture
  disadvantages:
  - Limited force amplification
  - Requires physical effort
- id: WP2
  description: Hydraulic system
  function: F3
  principle: Pascal's law for force multiplication
  advantages:
  - High force amplification
  - Smooth operation
  disadvantages:
  - More complex
  - Potential for leaks
  - Higher cost
- id: WP3
  description: Pneumatic system
  function: F3
  principle: Compressed air for force generation
  advantages:
  - Clean operation
  - Good force control
  disadvantages:
  - Requires air supply
  - Noise
- id: WP4
  description: Toggle mechanism
  function: F4
  principle: Kinematic inversion for force amplification
  advantages:
  - High force at end of stroke
  - Simple mechanism
  disadvantages:
  - Limited stroke length
  - Can be jerky
- id: WP5
  description: Direct compression
  function: F4
  principle: Direct application of force
  advantages:
  - Simple
  - Reliable
  disadvantages:
  - Limited force
  - No force amplification
- id: WP6
  description: Clamping mechanism
  function: F2
  principle: Mechanical clamping for secure positioning
  advantages:
  - Secure holding
  - Adjustable
  disadvantages:
  - Can be complex
  - May require adjustment
- id: WP7
  description: Vise-like grip
  function: F2
  principle: Parallel jaw clamping
  advantages:
  - Simple
  - Reliable
  disadvantages:
  - Limited adjustability
- id: WP8
  description: Gravity-fed magazine
  function: F1
  principle: Gravity for automatic feeding
  advantages:
  - Automatic feeding
  - Simple
  disadvantages:
  - Limited to vertical orientation
  - May jam
- id: WP9
  description: Manual loading
  function: F1
  principle: Manual placement of rivets
  advantages:
  - Simple
  - Reliable
  disadvantages:
  - Slower operation
  - Requires attention
