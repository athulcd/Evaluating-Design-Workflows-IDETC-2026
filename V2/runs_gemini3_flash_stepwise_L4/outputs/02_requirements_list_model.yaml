requirements_list:
  requirements:
  - id: R1
    statement: 'The tool shall provide a riveting force of approximately 500 N at
      the rivet head to ensure proper closure of the friction lining.

      '
    type: performance
    priority: MUST
    metric: Riveting force (N)
    target: '500'
    verification: test
    source: C3
  - id: R2
    statement: 'The tool shall provide a working stroke of 3 to 4 mm for the rivet
      closure process.

      '
    type: functional
    priority: MUST
    metric: Stroke length (mm)
    target: 3-4
    verification: analysis
    source: C4
  - id: R3
    statement: 'The tool shall accommodate internal drum brake shoes with diameters
      ranging from 250 mm to 400 mm and a maximum width of 100 mm.

      '
    type: interface
    priority: MUST
    metric: Diameter (mm), Width (mm)
    target: 250-400 (dia), 100 (width)
    verification: demonstration
    source: C6
  - id: R4
    statement: 'The tool design shall allow for a minimum clearance of 10 mm from
      the rivet center to the shoe rib.

      '
    type: functional
    priority: MUST
    metric: Clearance distance (mm)
    target: '10'
    verification: analysis
    source: C7
  - id: R5
    statement: 'The tool shall be compatible with DIN 7338 copper rivets with shank
      diameters between 3 mm and 5 mm.

      '
    type: regulatory
    priority: MUST
    metric: Rivet standard and diameter (mm)
    target: DIN 7338, 3-5 mm
    verification: inspection
    source: C8
  - id: R6
    statement: 'The tool shall accommodate a maximum assembly thickness (brake shoe
      plus friction lining) of 15 mm.

      '
    type: functional
    priority: MUST
    metric: Assembly thickness (mm)
    target: '15'
    verification: analysis
    source: C9
  - id: R7
    statement: 'The operator actuation force shall not exceed 200 N for hand-operated
      mechanisms or 400 N for foot-operated mechanisms.

      '
    type: ergonomics
    priority: MUST
    metric: Actuation force (N)
    target: <200 (hand) / <400 (foot)
    verification: test
    source: C5, O2
  - id: R8
    statement: 'The total manufacturing cost per unit, including materials and machining,
      shall not exceed 500 CHF.

      '
    type: cost
    priority: MUST
    metric: Manufacturing cost (CHF)
    target: <500
    verification: analysis
    source: C1, O1
  - id: R9
    statement: 'The manufacturing cost per unit should be minimized towards a target
      of 400 CHF.

      '
    type: cost
    priority: WISH
    metric: Manufacturing cost (CHF)
    target: '400'
    verification: analysis
    source: O1
  - id: R10
    statement: 'The tool shall be designed for a service life of five years in a workshop
      environment with a workload of 70 rivets per day.

      '
    type: performance
    priority: MUST
    metric: Service life (years)
    target: '5'
    verification: analysis
    source: O3
  - id: R11
    statement: 'The design of the tool must be completed and delivered within a timeframe
      of 3 to 4 months.

      '
    type: schedule
    priority: MUST
    metric: Time (months)
    target: 3-4
    verification: inspection
    source: C2
  - id: R12
    statement: 'The tool shall support safe one-man operation without requiring additional
      assistance for positioning or riveting.

      '
    type: ergonomics
    priority: MUST
    metric: Number of operators
    target: '1'
    verification: demonstration
    source: O2
  - id: R13
    statement: 'The tool should be compact and lightweight to facilitate transport
      and storage within the workshop.

      '
    type: ergonomics
    priority: WISH
    metric: Mass (kg) and Volume (cm^3)
    target: Minimize
    verification: inspection
    source: O4
  - id: R14
    statement: 'The tool shall include a mounting base suitable for attachment to
      a wooden worktop.

      '
    type: interface
    priority: MUST
    metric: Presence of mounting interface
    target: Functional base
    verification: inspection
    source: task_clarification.system_boundary
  assumptions:
  - The well-equipped machining facilities include standard tools such as lathes,
    milling machines, and drills.
  - Standard ergonomic guidelines refer to typical workbench heights (approx. 850-950
    mm) and comfortable reach zones.
  - Materials for the tool construction are readily available or can be sourced within
    the budget.
  - The tool is purely mechanical (manual) as no external power sources (pneumatic/hydraulic)
    were specified.
  open_questions:
  - What is the specific mounting interface required for the wooden worktop (e.g.,
    bolt hole pattern or G-clamps)?
  - Is there a specific preference between hand-operated or foot-operated actuation?
  - What is the maximum allowable weight to qualify as "easy to transport"?
  - Are there specific storage dimensions or a designated storage area the tool must
    fit into?
  traceability:
    derived_from_objectives:
    - O1
    - O2
    - O3
    - O4
    derived_from_constraints:
    - C1
    - C2
    - C3
    - C4
    - C5
    - C6
    - C7
    - C8
    - C9
