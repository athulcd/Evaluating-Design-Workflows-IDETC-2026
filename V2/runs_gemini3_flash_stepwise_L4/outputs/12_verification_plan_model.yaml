verification_plan:
  requirement_verification:
  - requirement_id: R1
    method: test
    procedure_summary: "Install a calibrated load cell between the riveting punch\
      \ (B4) and the die (B5). \nApply the maximum allowable operator force (200 N)\
      \ to the hand lever (B1) and \nrecord the peak compressive force generated at\
      \ the point of toggle linkage (B2) closure.\n"
    conditions: Tool mounted securely to a test bench; linkage adjusted to near-lock
      position.
    metric: Peak force (N)
    acceptance_criteria: '>= 500 N'
    linked_components:
    - M1
    - M2
    - M4
    - B2
    - B4
    - B5
    - B10
  - requirement_id: R2
    method: test
    procedure_summary: "Mount a dial indicator to the tool frame (B10) with the probe\
      \ resting on the \ntop of the punch carrier. Measure the total vertical travel\
      \ of the punch (B4) \nfrom the fully open position to the point where the mechanical\
      \ hard stop (B6) is engaged.\n"
    conditions: No workpiece present; linkage pivots lubricated.
    metric: Stroke length (mm)
    acceptance_criteria: 3.0 - 4.0 mm
    linked_components:
    - M1
    - M2
    - B2
    - B6
  - requirement_id: R3
    method: demonstration
    procedure_summary: "Adjust the sliding support block (B7) to its minimum and maximum\
      \ radial positions \non the guide rail (B8). Place a 250 mm diameter brake shoe\
      \ and a 400 mm diameter \nbrake shoe (100 mm width) on the support and verify\
      \ that the pre-drilled rivet \nholes align with the punch axis.\n"
    conditions: Workshop environment; standard brake shoe samples provided.
    metric: Diameter range (mm) and Width (mm)
    acceptance_criteria: Accommodates 250 mm and 400 mm diameters; supports 100 mm
      width.
    linked_components:
    - M3
    - B7
    - B8
  - requirement_id: R4
    method: analysis
    procedure_summary: "Using the CAD model or physical prototype, measure the minimum\
      \ horizontal \ndistance from the center of the punch (B4) to the nearest vertical\
      \ surface \nof the sliding support block (B7) or frame (B10) that could interfere\
      \ with the shoe rib.\n"
    conditions: Support block adjusted for a 250 mm shoe (worst-case clearance).
    metric: Clearance distance (mm)
    acceptance_criteria: '>= 10 mm'
    linked_components:
    - M3
    - B7
  - requirement_id: R5
    method: inspection
    procedure_summary: "Verify the geometry of the recessed die (B5) against DIN 7338\
      \ specifications \nfor 3 mm and 5 mm copper rivets. Perform test riveting on\
      \ sample plates \nusing both rivet sizes to ensure proper head formation and\
      \ fit.\n"
    conditions: Use standard DIN 7338 copper rivets.
    metric: Fit and Form
    acceptance_criteria: Rivet head sits flush in die; formed head is concentric and
      crack-free.
    linked_components:
    - M2
    - B4
    - B5
  - requirement_id: R6
    method: demonstration
    procedure_summary: "Place a test assembly consisting of a steel plate and friction\
      \ material \nwith a combined thickness of 15 mm onto the support module (M3).\
      \ \nVerify that the punch (B4) can be retracted sufficiently to allow \ninsertion\
      \ and removal of the assembly without interference.\n"
    conditions: Tool in fully open position.
    metric: Assembly thickness (mm)
    acceptance_criteria: '>= 15 mm clearance in open state.'
    linked_components:
    - M2
    - M3
    - B7
  - requirement_id: R7
    method: test
    procedure_summary: "Attach a digital force gauge to the hand grip area of the\
      \ lever (B1). \nMeasure the force required to complete a riveting cycle on a\
      \ 5 mm \ncopper rivet (worst case).\n"
    conditions: Tool mounted at standard workbench height (approx. 900 mm).
    metric: Actuation force (N)
    acceptance_criteria: < 200 N
    linked_components:
    - M1
    - B1
  - requirement_id: R8
    method: analysis
    procedure_summary: "Compile a final cost report including material invoices for\
      \ all BOM items \n(B1-B11) and internal labor logs for machining and assembly\
      \ hours \nprovided by the workshop.\n"
    conditions: Based on small-batch production (e.g., 5-10 units).
    metric: Total manufacturing cost (CHF)
    acceptance_criteria: < 500 CHF
    linked_components: []
  - requirement_id: R10
    method: analysis
    procedure_summary: "Perform a fatigue and wear analysis for the pivot pins (B3)\
      \ and \nforming tools (B4, B5). Calculate the bearing stress and shear \ncycles\
      \ based on 70 rivets/day over 250 working days/year for 5 years.\n"
    conditions: Assumes regular lubrication of pivots as per maintenance manual.
    metric: Service life (cycles)
    acceptance_criteria: '>= 87,500 cycles without failure or loss of tolerance.'
    linked_components:
    - M1
    - M2
    - B3
    - B4
    - B5
  - requirement_id: R11
    method: inspection
    procedure_summary: "Review the project schedule and delivery logs to confirm the\
      \ \nfinal design package and prototype were delivered within the \nagreed timeframe.\n"
    conditions: Project management audit.
    metric: Time (months)
    acceptance_criteria: 3 - 4 months
    linked_components: []
  - requirement_id: R12
    method: demonstration
    procedure_summary: "Observe a single mechanic performing the full riveting process:\
      \ \nadjusting the support, positioning the shoe/lining, inserting \nthe rivet,\
      \ and actuating the lever.\n"
    conditions: Standard workshop environment.
    metric: Number of operators
    acceptance_criteria: 1 operator can complete the task safely and efficiently.
    linked_components: []
  - requirement_id: R14
    method: inspection
    procedure_summary: "Verify that the base plate (B11) includes the specified mounting\
      \ \nholes and that the tool can be securely bolted to a 30 mm thick \nwooden\
      \ worktop using M10/M12 fasteners.\n"
    conditions: Physical inspection of the manufactured base module (M4).
    metric: Presence of mounting interface
    acceptance_criteria: Functional base plate with at least 4 mounting points.
    linked_components:
    - M4
    - B11
  coverage_gaps:
  - No explicit environmental testing for corrosion resistance (EI3) is planned, relying
    instead on material selection and painting.
  - The 500 N force requirement (R1) is verified statically; dynamic effects of rapid
    manual operation are not explicitly tested.
  - The impact of wood compression on the worktop (LC4) over 5 years is not verified
    by physical testing, only by base plate thickness sizing.
  assumptions:
  - The workshop possesses a calibrated load cell and force gauge for R1 and R7.
  - Standard DIN 7338 copper rivets are available for testing R5.
  - The 'one-man operation' demonstration (R12) assumes an operator of average physical
    strength.
  open_questions:
  - Is there a specific bolt pattern required for the base plate to match existing
    workshop benches?
  - Should the service life verification (R10) include an accelerated wear test on
    the punch and die?
