          F4: WP6
          F5: WP8
          F6: WP9
          F7: WP10
        architecture_description: "This variant, the \"Precision Toggle Press,\" utilizes\
          \ a hand-lever (WP5) to actuate a toggle linkage (WP6). \nThe toggle linkage\
          \ provides a high mechanical advantage at the end of the stroke to ensure\
          \ the 500N \nriveting force is met with minimal operator effort. For positioning,\
          \ it uses a sliding radius support (WP1) \nto accommodate the full range\
          \ of brake shoe diameters. A spring-loaded centering pilot (WP3) ensures\
          \ \nthe DIN 7338 rivets are perfectly aligned before the compression punch\
          \ (WP8) forms the head. \nThe entire assembly is mounted on a heavy steel\
          \ base plate (WP10) and features a hard stop (WP9) \nfor consistent results.\n"
        expected_benefits:
        - High mechanical advantage at the point of deformation (R1, R7).
        - Continuous adjustment for any brake shoe diameter between 250-400mm (R3).
        - High precision alignment for rivets (R5).
        key_risks:
        - The centering pilot (WP3) is a small, high-wear component that may require
          replacement (R10).
        - Toggle linkages are sensitive to variations in material thickness (R6).
        requirement_coverage:
          satisfied:
          - R1
          - R2
          - R3
          - R4
          - R5
          - R6
          - R7
          - R8
          - R10
          - R11
          - R12
          - R14
          partially_satisfied:
          - R9
          - R13
          not_satisfied: []
        assumptions:
        - The workshop can manufacture the internal bore required for the spring-loaded
          pilot.
        - The toggle linkage can be adjusted to account for the 15mm assembly thickness.
      - id: CV2
        selected_principles:
          F1: WP2
          F2: WP4
          F3: WP5
          F4: WP7
          F5: WP8
          F6: WP9
          F7: WP10
        architecture_description: "The \"Compact Cam Press\" variant focuses on a\
          \ small footprint and simplicity. It uses an eccentric \ncam actuator (WP7)\
          \ driven by a hand lever (WP5) to provide a precise 4mm stroke. Instead\
          \ of a \nsliding rail, it uses interchangeable radius mandrels (WP2) for\
          \ the most common brake shoe sizes, \nproviding maximum stability. The rivet\
          \ is held in a simple recessed die pocket (WP4). This design \nminimizes\
          \ moving parts and machining complexity, favoring durability and compactness.\n"
        expected_benefits:
        - Very compact and easy to store (R13).
        - Precise control over the riveting stroke (R2).
        - Robust design with fewer pivot points than a toggle (R10).
        key_risks:
        - High surface stress on the cam (WP7) requires hardening and frequent lubrication.
        - Fixed mandrels (WP2) may not cover all intermediate brake shoe sizes (R3).
        requirement_coverage:
          satisfied:
          - R1
          - R2
          - R5
          - R6
          - R7
          - R8
          - R10
          - R11
          - R12
          - R13
          - R14
          partially_satisfied:
          - R3
          - R9
          not_satisfied: []
        assumptions:
        - Hardening facilities are available for the cam surface.
        - A set of 3-4 mandrels is sufficient for the workshop's typical workload.
      - id: CV3
        selected_principles:
          F1: WP1
          F2: WP4
          F3: WP5
          F4: WP6
          F5: WP8
          F6: WP9
          F7: WP10
        architecture_description: "The \"Value Versatile Press\" is designed to meet\
          \ the 400 CHF target (R9) by combining the most \ncost-effective principles.\
          \ It uses the sliding radius support (WP1) for universal diameter \ncompatibility\
          \ and a standard toggle linkage (WP6) for force amplification. To save on\
          \ machining \ncosts, it employs a simple recessed die pocket (WP4) for rivet\
          \ alignment instead of a spring-loaded \npilot. The frame is a simple welded\
          \ or bolted construction anchored by a steel plate (WP10).\n"
        expected_benefits:
        - Lowest manufacturing cost (R9).
        - Full compatibility with all specified brake shoe sizes (R3).
        - Reliable force delivery for copper rivets (R1).
        key_risks:
        - Rivet may tilt or shift in the recessed pocket (WP4) during the positioning
          of large shoes.
        - Sliding support (WP1) requires careful locking to prevent movement during
          the stroke.
        requirement_coverage:
          satisfied:
          - R1
          - R2
          - R3
          - R4
          - R5
          - R6
          - R7
          - R8
          - R9
          - R10
          - R11
          - R12
          - R14
          partially_satisfied:
          - R13
          not_satisfied: []
        assumptions:
        - The operator can visually verify rivet alignment before applying full force.
        - Standard steel stock is used to keep material costs low.
      open_questions:
      - Is the 500N force sufficient for the largest 5mm DIN 7338 rivets, or should
        the linkage be designed for a higher safety factor?
      - Would a foot-pedal conversion kit be a valuable add-on for any of these concepts
        to improve ergonomics (R12)?
      - For CV2, what are the most common brake shoe diameters to prioritize for the
        mandrel set?
  concept_selection:
    concept_selection:
      criteria_weights:
      - criterion_id: EC1
        weight: 0.25
        justification: 'Manufacturing cost is a primary objective (O1) and constraint
          (C1). Reaching the 400 CHF target is a high priority for in-house economic
          viability.

          '
      - criterion_id: EC2
        weight: 0.3
        justification: 'Operator force is critical for ergonomics (O2) and safety
          (C5). Given the 70-rivet daily workload, minimizing fatigue is essential
          for a one-man operation.

          '
      - criterion_id: EC3
        weight: 0.15
        justification: 'Compactness and weight are desirable (O4, R13) for workshop
          flexibility but are secondary to the tool''s primary functional performance.

          '
      - criterion_id: EC4
        weight: 0.3
        justification: 'The tool must accommodate a wide range of diameters (250-400
          mm). Ease of adjustment directly impacts the efficiency of the mechanic''s
          workflow.

          '
      scoring:
      - concept_id: CV1
        scores:
          EC1: 3.0
          EC2: 5.0
          EC3: 3.0
          EC4: 4.0
        notes: 'CV1 offers excellent force delivery via the toggle linkage and high
          precision with the spring-loaded pilot. However, the pilot increases machining
          complexity and cost, making the 400 CHF target harder to reach.

          '
      - concept_id: CV2
        scores:
          EC1: 3.0
          EC2: 4.0
          EC3: 5.0
          EC4: 2.0
        notes: 'CV2 is the most compact due to the cam actuator. However, the use
          of interchangeable mandrels is less flexible for the full 250-400 mm range
          compared to a sliding support, and the cam requires specialized hardening.

          '
      - concept_id: CV3
        scores:
          EC1: 5.0
          EC2: 5.0
          EC3: 3.0
          EC4: 4.0
        notes: 'CV3 is optimized for cost by using a simple recessed die while maintaining
          the high mechanical advantage of the toggle linkage and the universal adjustability
          of the sliding support.

          '
      selected_concept_id: CV3
      selection_rationale: 'CV3 (Value Versatile Press) is selected because it best
        balances the stringent cost target (400 CHF) with the functional requirements.
        It utilizes a toggle linkage (WP6) to ensure the 500 N riveting force is achieved
        with minimal operator effort (meeting R1 and R7). The sliding radius support
        (WP1) provides the necessary flexibility for the specified range of brake
        shoe diameters (R3) without the added cost of multiple mandrels. While it
        lacks the precision centering of CV1, the recessed die (WP4) is a cost-effective
        solution that meets the basic alignment needs for DIN 7338 rivets.

        '
      sensitivity_analysis_notes: 'The selection is sensitive to the actual machining
        hours required for the toggle linkage. If the linkage proves too complex for
        the budget, the design might need to revert to a simpler lever, though this
        would negatively impact operator force (EC2). Additionally, if the workshop
        finds the manual alignment in the recessed die (WP4) leads to too many rejects,
        the spring-loaded pilot (WP3) from CV1 could be integrated as a high-precision
        upgrade, likely pushing the cost closer to the 500 CHF limit.

        '
      assumptions:
      - The toggle linkage can be manufactured using standard workshop milling and
        drilling without specialized CNC equipment.
      - The 500 N force provided by the toggle is sufficient for the full range of
        DIN 7338 copper rivets (3-5 mm).
      - Standard steel stock prices remain stable enough to support the 400 CHF target.
      open_questions:
      - Is the tactile feedback from the hard stop (WP9) sufficient for the operator,
        or is a visual stroke indicator required?
      - Can the sliding support (WP1) be effectively locked using simple hand-tightened
        knobs to meet the 70-rivet/day pace?
      traceability:
        based_on_concepts:
        - CV1
        - CV2
        - CV3
  embodiment_layouts:
    embodiment_layouts:
      layout:
      - id: EL1
        module_breakdown:
        - module_id: M1
          name: Actuation and Force Amplification Module
          responsibilities:
          - Receive manual input force from the operator via a hand lever.
          - Amplify the input force to the required 500 N riveting force using a toggle
            linkage.
          - Control the output stroke to the specified 3-4 mm range.
          allocated_functions:
          - F3 (Receive human actuation force)
          - F4 (Amplify force and control stroke)
        - module_id: M2
          name: Tooling and Forming Module
          responsibilities:
          - Hold the rivet in a recessed die pocket for alignment.
          - Plastically deform the copper rivet using a hardened punch and die set.
          - Provide a physical hard stop to indicate process completion and ensure
            consistency.
          allocated_functions:
          - F2 (Align and hold rivet)
          - F5 (Form rivet head)
          - F6 (Indicate process completion)
        - module_id: M3
          name: Workpiece Support and Positioning Module
          responsibilities:
          - Support the brake shoe and lining assembly during the riveting process.
          - Provide radial adjustment to accommodate brake shoe diameters from 250
            mm to 400 mm.
          - Ensure a minimum 10 mm clearance from the rivet center to the shoe rib.
          allocated_functions:
          - F1 (Position and support brake shoe)
        - module_id: M4
          name: Structural Frame and Mounting Module
          responsibilities:
          - Provide a rigid backbone to resist the 500 N internal forces without significant
            deflection.
          - Anchor the tool securely to the wooden workshop bench.
          allocated_functions:
          - F7 (Anchor tool to workbench)
        interfaces:
        - id: IF1
          between:
          - M1
          - M2
          type:
          - mechanical
          description: 'Pivot pin connection between the toggle linkage output and
            the sliding punch carrier.

            '
          constraints:
          - Must withstand 500 N axial load.
          - Minimal play to ensure stroke accuracy (3-4 mm).
        - id: IF2
          between:
          - M2
          - M3
          type:
          - mechanical
          description: 'Spatial alignment interface between the lower die (M2) and
            the sliding support block (M3).

            '
          constraints:
          - Vertical clearance must accommodate up to 15 mm assembly thickness.
          - Radial alignment must allow the rivet to center on the die.
        - id: IF3
          between:
          - M1
          - M4
          type:
          - mechanical
          description: 'Fulcrum and pivot points where the lever and linkage are mounted
            to the main frame.

            '
          constraints:
          - High shear strength required for pivot pins.
          - Low friction bushings to minimize operator effort.
        - id: IF4
          between:
          - M3
          - M4
          type:
          - mechanical
          description: 'Sliding rail or T-slot interface between the support module
            and the base frame.

            '
          constraints:
          - 75 mm travel range (to cover 125 mm to 200 mm radius).
          - Locking mechanism must prevent movement under 500 N vertical load.
        - id: IF5
          between:
          - M4
          - human
          type:
          - human
          description: 'Hand grip area on the lever.

            '
          constraints:
          - Ergonomic diameter (30-40 mm).
          - Height must be within comfortable reach (approx. 900-1100 mm from floor).
        key_design_parameters:
        - id: KDP1
          name: Toggle Linkage Mechanical Advantage
          unit: ratio
          target_or_range: 3:1 to 5:1 (at end of stroke)
          linked_requirements:
          - R1
          - R7
        - id: KDP2
          name: Support Radial Adjustment Range
          unit: mm
          target_or_range: 125 - 200
          linked_requirements:
          - R3
        - id: KDP3
          name: Punch and Die Hardness
          unit: HRC
          target_or_range: 54 - 58
          linked_requirements:
          - R10
        - id: KDP4
          name: Base Plate Thickness
          unit: mm
          target_or_range: 12 - 15
          linked_requirements:
          - R14
          - R1
        - id: KDP5
          name: Lever Length
          unit: mm
          target_or_range: 500 - 600
          linked_requirements:
          - R7
        risks_and_mitigations:
        - id: RM1
          risk: 'Toggle linkage sensitivity to thickness variations (R6) may lead
            to incomplete riveting or mechanical jamming if the assembly exceeds 15
            mm.

            '
          mitigation: 'Incorporate a threaded adjustment on the punch or die height
            to fine-tune the closed position for different shoe/lining combinations.

            '
        - id: RM2
          risk: 'The sliding support (WP1) may shift during operation due to the 70-rivet/day
            workload, leading to misaligned rivets.

            '
          mitigation: 'Use a serrated or notched rail for the sliding support to provide
            positive mechanical locking rather than relying solely on friction.

            '
        - id: RM3
          risk: 'Manufacturing cost exceeds 400 CHF due to complex machining of the
            toggle linkage pivots.

            '
          mitigation: 'Use standard off-the-shelf (COTS) shoulder bolts for pivots
            and simplify the frame to a welded C-channel construction.

            '
      assumptions:
      - The workshop's wooden worktop is of sufficient thickness (min 30mm) and quality
        to support M10/M12 mounting bolts.
      - Standard tool steel (e.g., O1) is available in-house for the punch and die.
      - The operator can manually return the lever (no return spring required for
        the preliminary layout).
      open_questions:
      - Is a specific bolt pattern required for the base plate to match existing workshop
        benches?
      - Should the hard stop (WP9) be adjustable to accommodate different rivet head
        heights?
      - Is there a preference for the lever orientation (vertical pull-down vs. horizontal
        pull)?
      traceability:
        selected_concept_id: CV3
  preliminary_sizing:
    preliminary_sizing:
      load_cases:
      - id: LC1
        description: 'Peak Riveting Load: The condition where the tool applies the
          maximum required force (500 N) to the copper rivet at the end of the 4 mm
          stroke. This governs the structural integrity of the toggle linkage, pivot
          pins, and the C-frame.

          '
        related_requirements:
        - R1
        - R2
        - R6
      - id: LC2
        description: 'Maximum Operator Input: The condition where the operator applies
          the maximum allowable hand force (200 N) to the lever. This governs the
          bending strength of the lever arm and the ergonomic interface.

          '
        related_requirements:
        - R7
        - R12
      - id: LC3
        description: 'Cyclic Loading (Fatigue): Repeated operation over the 5-year
          service life (approx. 87,500 cycles). This governs the wear allowance for
          pivot bushings and the fatigue limit of the toggle links.

          '
        related_requirements:
        - R10
      - id: LC4
        description: 'Mounting Reaction: The reaction forces transmitted through the
          base plate to the wooden worktop during peak riveting. This governs the
          base plate thickness and bolt spacing.

          '
        related_requirements:
        - R14
      sizing_results:
      - parameter_id: KDP1
        governing_case: LC1
        equation_or_model: 'MA_total = F_rivet / F_input = (L_lever / L_pivot_arm)
          * (1 / tan(theta))

          where theta is the angle of the toggle links relative to the vertical axis
          at the point of closure.

          '
        assumed_values:
          F_rivet: 500 N
          F_input: 100 N (Targeting 50% of limit for ergonomics)
          theta: 5 degrees (near toggle lock)
        result: 'Total Mechanical Advantage required: 5:1'
        margin_or_factor_of_safety: 2.0 (relative to R7 limit of 200 N)
      - parameter_id: KDP5
        governing_case: LC2
        equation_or_model: 'sigma_max = (M * y) / I = (F_input * L_lever * c) / I

          where I is the area moment of inertia of the lever cross-section.

          '
        assumed_values:
          F_input: 200 N
          L_lever: 550 mm
          Material: Steel S235 (Yield = 235 MPa)
        result: Minimum Lever Section Modulus (W) = 1.17 cm^3
        margin_or_factor_of_safety: 2.5 (Safety factor against yielding)
      - parameter_id: B1
        governing_case: LC1
        equation_or_model: 'tau = F_rivet / (2 * A_pin)

          d_pin = sqrt((2 * F_rivet) / (pi * tau_allow))

          '
        assumed_values:
          F_rivet: 500 N
          tau_allow: 60 MPa (for mild steel pins in double shear)
        result: 'Minimum Pivot Pin Diameter: 8 mm'
        margin_or_factor_of_safety: 4.0 (High factor to account for wear/LC3)
      - parameter_id: B2
        governing_case: LC1
        equation_or_model: 'delta = (F_rivet * H^3) / (3 * E * I_frame)

          Simplified as a cantilever beam deflection for the C-frame throat.

          '
        assumed_values:
          F_rivet: 500 N
          H (Throat Depth): 150 mm
          E: 210 GPa
          Allowable delta: 0.1 mm (to maintain R2 stroke accuracy)
        result: 'Minimum Frame Moment of Inertia: 2.68 cm^4'
        margin_or_factor_of_safety: '1.5'
      - parameter_id: B3
        governing_case: LC1
        equation_or_model: 'sigma_comp = F_rivet / A_punch

          '
        assumed_values:
          F_rivet: 500 N
          d_punch: 10 mm (standard shank for 3-5mm rivets)
        result: 'Compressive Stress: 6.37 MPa'
        margin_or_factor_of_safety: '>10 (Governed by buckling or hardness KDP3 rather
          than pure compression)'
      assumptions:
      - The toggle linkage is designed to be near its "dead center" (lock) position
        at the 4 mm stroke completion to maximize force.
      - Pivot pins are in double shear within the linkage assembly.
      - The C-frame is constructed from standard steel plate or C-channel available
        in the workshop.
      - Friction losses in the pivots are estimated at 10% of the input energy.
      - The 500 N force is a static peak; dynamic effects from manual actuation are
        negligible.
      open_questions:
      - What is the specific yield strength of the DIN 7338 copper rivets? (Required
        to confirm if 500 N is sufficient for the 5 mm diameter variant).
      - Does the workshop have a preference for pin materials (e.g., silver steel
        vs. standard mild steel)?
      - Is the wooden worktop hardwood or softwood? (Affects LC4 bolt pull-out calculations).
  manufacturing_plan:
    manufacturing_plan:
      module_plans:
      - module_id: M1
        material_candidates:
        - S235JR Structural Steel (Lever and Links)
        - 1.2210 (115CrV3) Silver Steel or O1 Tool Steel (Pivot Pins)
        process_candidates:
        - Sawing and Drilling (Lever arm)
        - Milling (Linkage ends and pivot slots)
        - Turning (Pivot pins)
        - Manual Assembly (Press-fit or circlip retention for pins)
        rationale: 'S235 steel provides the necessary modulus of elasticity and yield
          strength (235 MPa) to handle the 200 N operator input (LC2) and 500 N riveting
          load (LC1) while keeping material costs low to meet R9. Hardened silver
          steel for pins is required to mitigate wear over the 87,500-cycle service
          life (LC3, R10).

          '
        critical_characteristics:
        - Pivot center-to-center distance (Tolerance critical for R2 stroke accuracy)
        - Pin surface finish (Wear resistance for R10)
        risks:
        - High bending moments on the lever (LC2) could lead to permanent deformation
          if undersized.
        - Pivot pin shear failure if material quality is inconsistent.
      - module_id: M2
        material_candidates:
        - 1.2510 (O1) or 1.2379 (D2) Tool Steel
        process_candidates:
        - Turning (Punch and Die profiles)
        - Drilling (Recessed die pocket WP4)
        - Heat Treatment (Hardening and Tempering to 54-58 HRC)
        - Surface Grinding (Optional, for precision height adjustment)
        rationale: 'Tool steel is essential for the forming tools (F5) to maintain
          geometry under the 500 N load (R1) and ensure a 5-year service life (R10).
          The hardness range (KDP3) prevents mushrooming of the punch and die faces
          during repeated contact with copper rivets (R5).

          '
        critical_characteristics:
        - Hardness (54-58 HRC)
        - Concentricity between punch and die
        - Die pocket depth (Rivet alignment WP4)
        risks:
        - Brittle failure of the punch if over-hardened (Safety critical).
        - Inconsistent rivet head formation if the die pocket is not matched to DIN
          7338 (R5).
      - module_id: M3
        material_candidates:
        - S235JR Structural Steel
        - C45 Medium Carbon Steel (for the rail)
        process_candidates:
        - Milling (T-slot or sliding rail interface IF4)
        - Drilling and Tapping (Locking mechanism)
        - Surface Finishing (To ensure smooth sliding)
        rationale: 'Steel construction ensures the support can withstand the 500 N
          vertical load without deflection (R1). Milling the sliding interface is
          necessary to provide the 75 mm travel range required to accommodate the
          250-400 mm diameter range (R3, KDP2).

          '
        critical_characteristics:
        - Perpendicularity of the support surface to the punch axis
        - Locking force of the adjustment screw (RM2)
        risks:
        - Sliding support shifting during operation (RM2), leading to misaligned rivets.
        - Surface corrosion in a workshop environment (EI3) affecting adjustability.
      - module_id: M4
        material_candidates:
        - S235JR Steel Plate (12-15 mm thickness)
        - Standard C-Channel or Square Hollow Section
        process_candidates:
        - Welding (C-frame construction)
        - Drilling (Base plate mounting holes)
        - Painting/Coating (Corrosion protection)
        rationale: 'A thick steel base plate (KDP4) is required to distribute the
          reaction forces (LC4) to the wooden worktop (R14). A welded construction
          is the most cost-effective way to achieve the required frame stiffness (B2)
          within the 400 CHF budget (R9).

          '
        critical_characteristics:
        - Frame stiffness (Minimum Moment of Inertia 2.68 cm^4)
        - Base plate flatness
        risks:
        - Weld distortion during fabrication could misalign the actuation (M1) and
          tooling (M2) modules.
        - Insufficient base plate thickness leading to wood compression/instability
          (LC4).
      assumptions:
      - The in-house machining facility has a hardening furnace capable of reaching
        800-1000°C for tool steel.
      - Standard S235 steel stock is readily available and included in the 400 CHF
        cost target.
      - Welding equipment and qualified personnel are available in-house.
      open_questions:
      - What is the specific yield strength of the DIN 7338 copper rivets to confirm
        the 500 N force is sufficient for the 5 mm variant?
      - Is there a specific bolt pattern required for the base plate to match existing
        workshop benches?
      - Does the workshop prefer a specific corrosion protection (e.g., powder coating
        vs. simple industrial paint)?
