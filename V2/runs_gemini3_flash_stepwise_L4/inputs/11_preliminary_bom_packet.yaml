  black_box:
    black_box:
      overall_function: 'Transform separate brake components (shoe and lining), fasteners
        (rivets), and human mechanical energy into a permanently joined brake shoe
        assembly through controlled plastic deformation of the rivets.

        '
      flows:
        inputs:
        - id: IN1
          type: material
          name: Brake shoe and friction lining
          description: Pre-drilled components with diameters 250-400 mm and thickness
            up to 15 mm.
        - id: IN2
          type: material
          name: DIN 7338 copper rivets
          description: Tubular or semi-tubular copper rivets with 3-5 mm shank diameter.
        - id: IN3
          type: energy
          name: Human actuation force
          description: Manual input force from the operator (Hand < 200 N or Foot
            < 400 N).
        - id: IN4
          type: signal
          name: Alignment/Positioning signal
          description: Visual and tactile information used by the operator to align
            the rivet with the punch and die.
        outputs:
        - id: OUT1
          type: material
          name: Assembled brake shoe
          description: The friction lining permanently attached to the brake shoe
            via set rivets.
        - id: OUT2
          type: energy
          name: Dissipated energy
          description: Thermal energy from rivet deformation and acoustic energy (noise)
            during the riveting stroke.
        - id: OUT3
          type: signal
          name: Completion feedback
          description: Tactile resistance or visual confirmation indicating the 3-4
            mm stroke is complete and the rivet is set.
      external_interactions:
      - id: EI1
        description: Mechanical mounting interface with a wooden worktop to resist
          the 500 N riveting force.
        related_requirements:
        - R1
        - R14
      - id: EI2
        description: Ergonomic interaction with a single operator during a 70-rivet
          daily workload.
        related_requirements:
        - R7
        - R10
        - R12
      - id: EI3
        description: Exposure to workshop environment (dust, lubricants, and varying
          temperatures).
        related_requirements:
        - R10
      assumptions:
      - The tool is purely mechanical and does not require external power sources
        (pneumatic, hydraulic, or electric).
      - The brake shoes and linings are provided to the tool already cleaned and pre-drilled.
      - The operator has sufficient physical capability to provide the required actuation
        force repeatedly.
      open_questions:
      - Is there a specific preference for hand-operated versus foot-operated actuation?
      - What are the specific dimensions or bolt patterns required for the wooden
        worktop mounting?
      - Are there specific noise level limits for the workshop environment?
      traceability:
        derived_from_requirements:
        - R1
        - R2
        - R3
        - R5
        - R6
        - R7
        - R10
        - R12
        - R14
  function_structure:
    function_structure:
      subfunctions:
      - id: F1
        verb_noun: Position and support brake shoe
        description: Adjusts for different diameters (250-400mm) and provides a stable
          surface for the shoe and lining assembly.
        input_flows:
        - IN1
        - IN4
        output_flows:
        - M_POSITIONED_COMPONENTS
        allocated_requirements:
        - R3
        - R4
        - R6
      - id: F2
        verb_noun: Align and hold rivet
        description: Receives the DIN 7338 rivet and ensures it is centered relative
          to the pre-drilled holes and the riveting punch.
        input_flows:
        - IN2
        - IN4
        output_flows:
        - M_ALIGNED_RIVET
        allocated_requirements:
        - R5
      - id: F3
        verb_noun: Receive human actuation force
        description: Interface (lever or pedal) that captures the operator's physical
          input.
        input_flows:
        - IN3
        output_flows:
        - E_INPUT_MECH
        allocated_requirements:
        - R7
        - R12
      - id: F4
        verb_noun: Amplify force and control stroke
        description: Mechanical linkage or lever system that converts input force
          to 500N and limits travel to 3-4mm.
        input_flows:
        - E_INPUT_MECH
        output_flows:
        - E_RIVETING_MECH
        - S_STROKE_LIMIT
        allocated_requirements:
        - R1
        - R2
      - id: F5
        verb_noun: Form rivet head
        description: The punch and die set that plastically deforms the copper rivet
          to join the lining to the shoe.
        input_flows:
        - M_POSITIONED_COMPONENTS
        - M_ALIGNED_RIVET
        - E_RIVETING_MECH
        output_flows:
        - OUT1
        - OUT2
        allocated_requirements:
        - R1
        - R2
      - id: F6
        verb_noun: Indicate process completion
        description: Provides tactile or visual feedback to the operator once the
          required stroke is achieved.
        input_flows:
        - S_STROKE_LIMIT
        output_flows:
        - OUT3
        allocated_requirements: []
      - id: F7
        verb_noun: Anchor tool to workbench
        description: Provides the reaction force interface to the wooden worktop to
          maintain stability during operation.
        input_flows: []
        output_flows: []
        allocated_requirements:
        - R14
      hierarchy:
      - parent: F0
        children:
        - F1
        - F2
        - F3
        - F4
        - F5
        - F6
        - F7
      connections:
      - from_function: F1
        to_function: F5
        flow_id: M_POSITIONED_COMPONENTS
      - from_function: F2
        to_function: F5
        flow_id: M_ALIGNED_RIVET
      - from_function: F3
        to_function: F4
        flow_id: E_INPUT_MECH
      - from_function: F4
        to_function: F5
        flow_id: E_RIVETING_MECH
      - from_function: F4
        to_function: F6
        flow_id: S_STROKE_LIMIT
      completeness_checks:
        flow_conservation_notes: 'All material inputs (IN1, IN2) are processed through
          positioning and alignment functions before being combined in the forming
          function (F5) to produce the output assembly (OUT1). Energy input (IN3)
          is amplified (F4) and then dissipated (OUT2) or used for deformation. Signals
          (IN4) guide the initial setup, and internal signals (S_STROKE_LIMIT) trigger
          the final feedback (OUT3).

          '
        missing_functions_suspected: []
      assumptions:
      - The tool is purely mechanical; no energy storage (like springs for power)
        is required beyond the immediate stroke.
      - The 'Position and support' function (F1) includes the necessary adjustments
        for the 250-400mm diameter range.
      open_questions:
      - Does the 'Indicate process completion' function require a dedicated mechanism
        (e.g., a bell or hard stop) or is tactile resistance sufficient?
      traceability:
        derived_from_black_box: true
  working_principles:
    working_principles:
      principles:
      - id: WP1
        function_id: F1
        principle_name: Sliding Radius Support
        physical_effect_or_mechanism: 'A sliding block mounted on a linear rail or
          T-slot, adjustable along the radial axis of the brake shoe. The block features
          a curved or V-shaped interface to support the shoe rim.

          '
        key_parameters:
        - Adjustment range (150mm to 200mm radius)
        - Locking screw torque
        - Support surface width (min 100mm)
        advantages:
        - Continuously adjustable for any diameter within the range
        - Simple to manufacture using milling and drilling
        disadvantages:
        - Requires manual adjustment and locking for each batch
        - Potential for misalignment if the rail is not perpendicular to the punch
        risks:
        - Locking screw may vibrate loose over 70 cycles/day
        impacted_requirements:
        - R3
        - R4
        - R6
      - id: WP2
        function_id: F1
        principle_name: Interchangeable Radius Mandrels
        physical_effect_or_mechanism: 'A set of fixed-radius support blocks (e.g.,
          250mm, 325mm, 400mm) that can be quickly swapped on a central mounting post.

          '
        key_parameters:
        - Mandrel radius
        - Mounting pin diameter
        advantages:
        - Extremely stable support
        - Faster setup for standard sizes
        disadvantages:
        - Higher material cost for multiple mandrels
        - Storage required for unused mandrels
        risks:
        - Mandrels may be lost in a busy workshop environment
        impacted_requirements:
        - R3
        - R8
        - R13
      - id: WP3
        function_id: F2
        principle_name: Spring-Loaded Centering Pilot
        physical_effect_or_mechanism: 'A small-diameter retractable pin located in
          the center of the riveting punch. The pin enters the rivet''s tubular shank
          to align it before the forming pressure is applied.

          '
        key_parameters:
        - Pilot pin diameter (2.5mm to 4.5mm)
        - Spring constant
        - Retraction depth
        advantages:
        - Ensures perfect concentricity between rivet and punch
        - Prevents rivet from tipping during the start of the stroke
        disadvantages:
        - More complex machining (internal bore in punch)
        - Small pins are prone to bending or breaking
        risks:
        - Pin fatigue failure over 5-year service life
        impacted_requirements:
        - R5
        - R10
      - id: WP4
        function_id: F2
        principle_name: Recessed Die Pocket
        physical_effect_or_mechanism: 'The lower die features a shallow counterbore
          or spherical depression matching the rivet head geometry, acting as a nest.

          '
        key_parameters:
        - Pocket depth
        - Pocket diameter (matching DIN 7338)
        advantages:
        - Very low cost (simple lathe operation)
        - No moving parts
        disadvantages:
        - Does not actively hold the rivet if the assembly is tilted
        risks:
        - Rivet may fall out during positioning of the heavy brake shoe
        impacted_requirements:
        - R5
        - R8
      - id: WP5
        function_id: F3
        principle_name: Class 1 Hand Lever
        physical_effect_or_mechanism: 'A long steel bar rotating around a fixed fulcrum,
          providing mechanical advantage based on the ratio of the effort arm to the
          load arm.

          '
        key_parameters:
        - Lever length (approx. 500-700mm)
        - Fulcrum pin diameter
        advantages:
        - Simple and intuitive operation
        - Easy to manufacture in-house
        disadvantages:
        - Requires significant vertical or horizontal clearance
        - May cause operator fatigue if the handle height is not ergonomic
        risks:
        - High bending moments on the fulcrum pin
        impacted_requirements:
        - R7
        - R12
        - R13
      - id: WP6
        function_id: F4
        principle_name: Toggle Linkage (Knee Lever)
        physical_effect_or_mechanism: 'A two-bar linkage that approaches a straight
          line (180 degrees) at the end of the stroke, providing a theoretically infinite
          mechanical advantage at the point of rivet closure.

          '
        key_parameters:
        - Link lengths
        - Transmission angle at end-of-stroke
        advantages:
        - Maximum force (500N+) delivered exactly when needed for deformation
        - Low input force required from the operator
        disadvantages:
        - Sensitive to assembly thickness variations
        - More pivot points to maintain and lubricate
        risks:
        - Mechanical jam if the assembly is thicker than 15mm
        impacted_requirements:
        - R1
        - R2
        - R7
      - id: WP7
        function_id: F4
        principle_name: Eccentric Cam Actuator
        physical_effect_or_mechanism: 'A rotating circular cam with an offset center
          that pushes a follower (the punch) downwards.

          '
        key_parameters:
        - Cam eccentricity (offset)
        - Cam profile radius
        advantages:
        - Very compact design
        - Precise control over the 3-4mm stroke
        disadvantages:
        - High surface contact stresses between cam and follower
        - Requires hardening of the cam surface
        risks:
        - Rapid wear if not properly lubricated in a workshop environment
        impacted_requirements:
        - R2
        - R10
        - R13
      - id: WP8
        function_id: F5
        principle_name: Compression Punch and Die
        physical_effect_or_mechanism: 'Direct axial compression of the copper rivet
          between a hardened steel punch (upper) and die (lower) to create a flared
          or rolled head.

          '
        key_parameters:
        - Tool steel grade (e.g., O1 or D2)
        - Surface finish of the forming face
        advantages:
        - Robust and reliable
        - Easy to replace if worn
        disadvantages:
        - Requires high peak force (500N)
        risks:
        - Brittle failure of the punch if over-hardened
        impacted_requirements:
        - R1
        - R5
        - R10
      - id: WP9
        function_id: F6
        principle_name: Mechanical Hard Stop
        physical_effect_or_mechanism: 'A physical interference between the lever/linkage
          and the tool frame that prevents further movement once the 4mm stroke is
          reached.

          '
        key_parameters:
        - Stop position adjustment
        - Contact area (to prevent mushrooming)
        advantages:
        - Clear tactile feedback to the operator
        - Ensures consistent rivet height
        disadvantages:
        - No visual indication for the operator before the stop is hit
        risks:
        - Repeated impact may damage the tool frame over time
        impacted_requirements:
        - R2
        - R12
      - id: WP10
        function_id: F7
        principle_name: Bolted Steel Base Plate
        physical_effect_or_mechanism: 'A thick (10-15mm) steel plate with pre-drilled
          holes for M10 or M12 bolts to secure the tool to the wooden worktop.

          '
        key_parameters:
        - Plate thickness
        - Bolt hole pattern
        advantages:
        - Maximum stability under the 500N load
        - Low cost and easy to manufacture
        disadvantages:
        - Requires drilling holes in the workshop's wooden worktop
        risks:
        - Wood may strip or compress over time, leading to tool wobble
        impacted_requirements:
        - R14
        - R8
      assumptions:
      - The workshop has the capability to heat-treat tool steel for the punch and
        die (WP8).
      - The wooden worktop is at least 30mm thick to provide a secure anchor for WP10.
      - Standard DIN 7338 rivets are semi-tubular, making the 500N force sufficient
        for closure.
      open_questions:
      - Should the tool include a return spring for the lever, or is manual return
        acceptable?
      - Is a foot-pedal option preferred to keep both hands free for brake shoe positioning?
      - What is the specific hardness requirement for the copper rivets to ensure
        the 500N force is adequate?
