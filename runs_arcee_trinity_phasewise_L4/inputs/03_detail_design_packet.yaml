artifacts_available:
  task_clarification:
    objectives:
    - Develop a simple rivet setting tool for a large car repair workshop
    - Produce 5 initial units with potential future sales
    - Design for in-house production using the repair workshop's machining facilities
    constraints:
    - Manufacturing cost per unit must be under 500 CHF, with a target maximum of
      400 CHF
    - Delivery timeframe: 3 months (maximum allowable 4 months)
    - Tool must handle internal drum brakes with inside diameter 250-400 mm
    - Tool must accommodate brake shoes up to 2 kg, 100 mm width, and 15 mm total
      thickness
    - Tool must handle 10-16 rivets per shoe with 3-5 mm shank diameter copper rivets
      (DIN 7338)
    - Tool must generate riveting force of approximately 500 N with 3-4 mm working
      stroke
    - Ergonomic requirements: operating force ≤200 N (hand) or ≤400 N (foot), standard
        working height
    - Tool must be reliable, maintenance-free, easy to transport, and compact for
      storage
    - Expected service life: 5 years
    - Minimum clearance: 10 mm from rivet center to brake shoe rib
    evaluation_criteria:
    - Cost effectiveness (manufacturing cost per unit)
    - Delivery time compliance
    - Functional performance (riveting force, working stroke)
    - Ergonomic compliance
    - Durability and reliability
    - Portability and storage efficiency
    assumptions:
    - The repair workshop's machining facilities are capable of producing the tool
    - The designer has access to all necessary technical specifications and drawings
    - The tool will be used in a typical car repair workshop environment
    open_questions:
    - Are there any specific safety standards or certifications required for the tool?
    - What is the preferred power source for the tool (manual, pneumatic, electric)?
    - Are there any specific mounting requirements for the wooden worktop?
    - What is the expected frequency of tool usage beyond the 70 rivets per day?
  requirements_list:
  - id: R1
    type: functional
    description: The tool must be capable of setting copper rivets with 3-5 mm shank
      diameter according to DIN 7338 standard
    rationale: Technical requirement for rivet compatibility
    origin: raw_task_statement
