function_structure:
  subfunctions:
  - id: F1
    verb_noun: Position brake shoe and lining
    description: 'Securely hold the brake shoe and lining in correct alignment for
      riveting.

      Ensure proper positioning relative to rivet holes and maintain stability during
      force application.'
    input_flows:
    - IN1
    - IN2
    output_flows:
    - OUT1
    allocated_requirements:
    - R1
    - R2
    - R3
    - R4
    - R5
    - R6
    - R12
  - id: F2
    verb_noun: Position and guide rivet
    description: 'Place the rivet in the correct position and guide it through the
      lining and shoe.

      Ensure proper alignment for forming the rivet heads.'
    input_flows:
    - IN3
    output_flows:
    - OUT1
    allocated_requirements:
    - R1
    - R7
    - R6
  - id: F3
    verb_noun: Apply riveting force
    description: 'Generate and apply controlled force to deform the rivet and form
      the second head.

      Achieve the required force (500 N) and stroke (~4 mm) to create a secure joint.'
    input_flows:
    - IN4
    - IN5
    output_flows:
    - OUT2
    - OUT3
    allocated_requirements:
    - R1
    - R8
    - R9
    - R11
    - R17
  - id: F4
    verb_noun: Form rivet heads
    description: 'Deform the rivet material to create the second (closure) head.

      Ensure proper head formation for joint integrity.'
    input_flows:
    - OUT1
    output_flows:
    - OUT1
    allocated_requirements:
    - R1
    - R9
  - id: F5
    verb_noun: Provide structural support
    description: 'Create a rigid framework to withstand riveting forces and maintain
      tool geometry.

      Mount securely to worktop and resist deformation during operation.'
    input_flows:
    - OUT2
    output_flows:
    - OUT1
    allocated_requirements:
    - R1
    - R12
    - R18
  - id: F6
    verb_noun: Control riveting stroke
    description: 'Limit and guide the motion of the force application mechanism.

      Ensure consistent stroke length and prevent over-travel.'
    input_flows:
    - IN5
    output_flows:
    - OUT3
    allocated_requirements:
    - R1
    - R9
    - R17
    - R18
  hierarchy:
  - parent: F0
    children:
    - F1
    - F2
    - F3
    - F4
    - F5
    - F6
  connections:
  - from_function: F1
    to_function: F2
    flow_id: OUT1
  - from_function: F2
    to_function: F3
    flow_id: OUT1
  - from_function: F3
    to_function: F4
    flow_id: OUT1
  - from_function: F4
    to_function: F5
    flow_id: OUT1
  - from_function: F5
    to_function: F6
    flow_id: OUT1
  completeness_checks:
    flow_conservation_notes: 'Material flows (IN1, IN2, IN3) are transformed through
      positioning, force application, and forming to produce OUT1.

      Energy flows (IN4, IN5) are consumed in the process, with waste energy (OUT2)
      and feedback (OUT3) as outputs.

      All primary inputs are accounted for in the output assembly.'
    missing_functions_suspected: []
  assumptions:
  - The tool is bench-mounted and manually actuated as described in the case context.
  - Workshop environment is typical indoor with possible contaminants.
  - Riveting force and stroke values are as stated (500 N, ~4 mm closure).
  open_questions:
  - Confirm exact brake shoe geometry envelope limits (some dimensions are hard to
    read in the scan).
  - Confirm which actuation mode is preferred (hand vs foot) or whether both are required.
  - Confirm required riveting force and stroke values beyond the experiment note (500
    N and 4 mm closure).
  traceability:
    derived_from_black_box: true
