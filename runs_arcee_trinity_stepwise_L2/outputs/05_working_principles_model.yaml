working_principles:
  principles:
  - id: WP1
    function_id: F1
    principle_name: Vise-style clamping with adjustable jaws
    physical_effect_or_mechanism: Mechanical clamping via screw-driven or cam-actuated
      jaws
    key_parameters:
    - Clamping force range
    - Jaw opening range (80-400 mm)
    - Material hardness (to avoid shoe damage)
    advantages:
    - Simple, robust, workshop-proven
    - Wide adjustment range for different shoe sizes
    - Low cost and easy maintenance
    disadvantages:
    - May require manual adjustment between parts
    - Potential for uneven clamping if jaws misaligned
    risks:
    - Over-clamping could deform soft Al-alloy shoes
    - Under-clamping could cause movement during riveting
    impacted_requirements:
    - R2 (supports 80-400 mm width)
    - R3 (supports 80-400 mm width)
    - R4 (supports 6-8 mm thickness)
    - R5 (supports up to 45 mm stack)
    - R12 (stable on bench)
  - id: WP2
    function_id: F1
    principle_name: Magnetic or vacuum fixture
    physical_effect_or_mechanism: Magnetic attraction or vacuum suction to hold workpiece
    key_parameters:
    - Magnetic field strength or vacuum pressure
    - Surface compatibility (ferrous vs non-ferrous)
    - Fixture size and adjustability
    advantages:
    - Quick release and positioning
    - No mechanical wear on clamping surfaces
    - Uniform holding force
    disadvantages:
    - Ineffective on Al-alloy shoes (non-magnetic)
    - Requires power source (vacuum or electromagnet)
    - Higher cost and complexity
    risks:
    - Loss of holding force during operation
    - Incompatibility with non-ferrous materials
    impacted_requirements:
    - R2 (supports 80-400 mm width)
    - R3 (supports 80-400 mm width)
    - R4 (supports 6-8 mm thickness)
    - R5 (supports up to 45 mm stack)
    - R12 (stable on bench)
  - id: WP3
    function_id: F2
    principle_name: Gravity-fed rivet magazine with guide tube
    physical_effect_or_mechanism: Gravity and guided descent to position rivet
    key_parameters:
    - Magazine capacity
    - Guide tube inner diameter (3-5 mm)
    - Alignment tolerance
    advantages:
    - Fast, repeatable rivet positioning
    - Minimal operator effort
    - Supports multiple rivets in sequence
    disadvantages:
    - Requires pre-loaded magazine
    - Potential jamming if rivet sizes vary
    risks:
    - Misalignment causing rivet damage
    - Magazine not compatible with all rivet sizes
    impacted_requirements:
    - R6 (ensures >= 4 mm edge distance via consistent positioning)
    - R7 (supports 3-5 mm shank diameter)
    - R10 (supports high productivity)
  - id: WP4
    function_id: F2
    principle_name: Manual rivet placement with alignment jig
    physical_effect_or_mechanism: Manual insertion guided by fixed alignment features
    key_parameters:
    - Jig hole diameter tolerance
    - Jig positioning repeatability
    - Operator skill requirement
    advantages:
    - Simple, low-cost solution
    - Works with any rivet size within range
    - No moving parts to maintain
    disadvantages:
    - Slower than automated feeding
    - Dependent on operator accuracy
    risks:
    - Inconsistent positioning between rivets
    - Potential for dropped rivets
    impacted_requirements:
    - R6 (ensures >= 4 mm edge distance via jig)
    - R7 (supports 3-5 mm shank diameter)
    - R11 (supports one-man operation)
  - id: WP5
    function_id: F3
    principle_name: Fixed alignment plate with datum surfaces
    physical_effect_or_mechanism: Mechanical referencing via fixed surfaces
    key_parameters:
    - Datum surface accuracy
    - Plate material and wear resistance
    - Adjustability for different shoe sizes
    advantages:
    - High repeatability
    - Simple, robust design
    - No power required
    disadvantages:
    - Limited to specific shoe geometries
    - May require manual repositioning
    risks:
    - Wear leading to alignment drift
    - Incompatibility with non-standard shoes
    impacted_requirements:
    - R2 (supports 80-400 mm width)
    - R3 (supports 80-400 mm width)
    - R10 (supports consistent alignment for productivity)
    - R15 (ensures quality via repeatable alignment)
  - id: WP6
    function_id: F3
    principle_name: Adjustable alignment guide with visual markers
    physical_effect_or_mechanism: Adjustable mechanical guide with visual positioning
      aids
    key_parameters:
    - Guide range and resolution
    - Marker visibility and accuracy
    - Guide material wear resistance
    advantages:
    - Flexible for different shoe sizes
    - Quick adjustment between parts
    - Operator feedback via markers
    disadvantages:
    - More complex than fixed alignment
    - Potential for marker wear/fading
    risks:
    - Misalignment if markers misread
    - Guide mechanism failure
    impacted_requirements:
    - R2 (supports 80-400 mm width)
    - R3 (supports 80-400 mm width)
    - R10 (supports quick repositioning)
    - R15 (ensures quality via alignment)
  - id: WP7
    function_id: F4
    principle_name: Direct hand lever actuation
    physical_effect_or_mechanism: Direct mechanical advantage via lever arm
    key_parameters:
    - Lever length and pivot position
    - Handle ergonomics and grip
    - Force transmission efficiency
    advantages:
    - Simple, reliable mechanism
    - Direct operator control
    - Low cost
    disadvantages:
    - Limited force amplification
    - May require high hand force
    risks:
    - Operator fatigue with repeated use
    - Inconsistent force application
    impacted_requirements:
    - R11 (supports one-man operation)
    - R17 (hand force <= 200 N target)
    - R18 (safe operation with direct control)
  - id: WP8
    function_id: F4
    principle_name: Foot pedal actuation
    physical_effect_or_mechanism: Foot-operated lever or pedal mechanism
    key_parameters:
    - Pedal travel and force characteristics
    - Foot positioning and stability
    - Force transmission path
    advantages:
    - Higher force capability (up to 400 N)
    - Frees hands for positioning
    - Ergonomic for repetitive tasks
    disadvantages:
    - Requires foot space and stability
    - May be slower than hand actuation
    risks:
    - Foot slippage during operation
    - Inconsistent force application
    impacted_requirements:
    - R11 (supports one-man operation)
    - R17 (foot force <= 400 N target)
    - R18 (safe operation with foot control)
  - id: WP9
    function_id: F5
    principle_name: Toggle linkage mechanism
    physical_effect_or_mechanism: Mechanical toggle linkage providing high force at
      end of stroke
    key_parameters:
    - Linkage geometry and ratios
    - Material strength and wear
    - Stroke length and force profile
    advantages:
    - High force amplification
    - Self-locking at end position
    - Simple, robust design
    disadvantages:
    - Limited stroke length
    - Sensitive to wear and misalignment
    risks:
    - Mechanism jamming if misaligned
    - Wear leading to force loss
    impacted_requirements:
    - R8 (achieves >= 500 N force)
    - R17 (manages force within limits)
    - R15 (ensures reliable force delivery)
  - id: WP10
    function_id: F5
    principle_name: Screw mechanism with gear reduction
    physical_effect_or_mechanism: Threaded screw with gear train for force multiplication
    key_parameters:
    - Thread pitch and lead
    - Gear ratio and efficiency
    - Screw material and lubrication
    advantages:
    - Precise force control
    - High force capability
    - Self-locking when stationary
    disadvantages:
    - Slower operation
    - More complex and costly
    risks:
    - Screw wear or galling
    - Gear failure under high loads
    impacted_requirements:
    - R8 (achieves >= 500 N force)
    - R17 (manages force within limits)
    - R15 (ensures reliable force delivery)
  - id: WP11
    function_id: F6
    principle_name: Mechanical stop with spring preload
    physical_effect_or_mechanism: Physical stop with spring to control stroke and
      provide feedback
    key_parameters:
    - Stop position accuracy
    - Spring rate and preload
    - Material wear resistance
    advantages:
    - Simple, reliable control
    - Provides tactile feedback
    - No power required
    disadvantages:
    - Limited adjustability
    - Spring fatigue over time
    risks:
    - Stop wear leading to over-travel
    - Spring failure causing inconsistent force
    impacted_requirements:
    - R9 (controls ~4 mm closure)
    - R15 (ensures consistent operation)
    - R16 (minimizes maintenance)
  - id: WP12
    function_id: F6
    principle_name: Hydraulic or pneumatic pressure control
    physical_effect_or_mechanism: Fluid pressure regulation to control force and stroke
    key_parameters:
    - Pressure setting and regulation
    - Fluid type and seal compatibility
    - Cylinder sizing and travel
    advantages:
    - Precise force control
    - Smooth operation
    - Adjustable for different rivets
    disadvantages:
    - Requires fluid system (maintenance)
    - Higher cost and complexity
    risks:
    - Fluid leaks affecting performance
    - Pressure fluctuations
    impacted_requirements:
    - R9 (controls ~4 mm closure)
    - R15 (ensures consistent operation)
    - R16 (requires maintenance)
  - id: WP13
    function_id: F7
    principle_name: Direct compression with hardened dies
    physical_effect_or_mechanism: Direct metal forming via compression between dies
    key_parameters:
    - Die material and hardness
    - Die geometry and clearance
    - Compression force and speed
    advantages:
    - Simple, proven method
    - High quality joints
    - No heat required
    disadvantages:
    - Requires high force
    - Die wear over time
    risks:
    - Die damage from misalignment
    - Inconsistent forming if force varies
    impacted_requirements:
    - R1 (forms quality joint)
    - R8 (requires >= 500 N force)
    - R9 (achieves ~4 mm closure)
  - id: WP14
    function_id: F7
    principle_name: Impact forming with energy storage
    physical_effect_or_mechanism: Stored energy release (spring or flywheel) for impact
      forming
    key_parameters:
    - Energy storage capacity
    - Impact velocity and mass
    - Anvil and die design
    advantages:
    - Lower peak force requirement
    - Faster operation
    - Can work with lower continuous force
    disadvantages:
    - More complex mechanism
    - Potential for inconsistent results
    risks:
    - Energy storage failure
    - Inconsistent forming energy
    impacted_requirements:
    - R1 (forms quality joint)
    - R8 (achieves required force via impact)
    - R9 (achieves ~4 mm closure)
  - id: WP15
    function_id: F8
    principle_name: Sliding carriage with detent positioning
    physical_effect_or_mechanism: Linear motion with mechanical detents for repeatable
      positioning
    key_parameters:
    - Carriage travel range
    - Detent spacing and accuracy
    - Sliding surface wear resistance
    advantages:
    - Fast repositioning
    - Consistent spacing between rivets
    - Operator feedback via detents
    disadvantages:
    - Limited to fixed spacing patterns
    - Detent wear over time
    risks:
    - Carriage binding or sticking
    - Detent failure causing misalignment
    impacted_requirements:
    - R10 (supports productivity via fast repositioning)
    - R11 (supports one-man operation)
    - R15 (ensures consistent quality)
  - id: WP16
    function_id: F8
    principle_name: Manual repositioning with alignment marks
    physical_effect_or_mechanism: Manual movement guided by visual alignment marks
    key_parameters:
    - Mark visibility and accuracy
    - Reference surface quality
    - Operator skill requirement
    advantages:
    - Simple, flexible for any pattern
    - No moving parts to maintain
    - Low cost
    disadvantages:
    - Slower than automated repositioning
    - Dependent on operator accuracy
    risks:
    - Inconsistent positioning between rivets
    - Misalignment if marks misread
    impacted_requirements:
    - R10 (supports productivity, though slower)
    - R11 (supports one-man operation)
    - R15 (quality depends on operator skill)
  - id: WP17
    function_id: F9
    principle_name: Integrated base with non-slip feet
    physical_effect_or_mechanism: Weighted base with friction feet for stability
    key_parameters:
    - Base mass and footprint
    - Foot material and geometry
    - Worktop surface compatibility
    advantages:
    - Simple, no mounting required
    - Portable and self-contained
    - Quick setup
    disadvantages:
    - May shift under high forces
    - Limited to flat surfaces
    risks:
    - Sliding during operation
    - Tipping if top-heavy
    impacted_requirements:
    - R12 (stable on worktop)
    - R14 (portable design)
    - R18 (safe operation)
  - id: WP18
    function_id: F9
    principle_name: Clamp-on mounting bracket
    physical_effect_or_mechanism: Mechanical clamping to worktop edge or vice
    key_parameters:
    - Clamping force and range
    - Bracket material and strength
    - Compatibility with worktop thickness
    advantages:
    - Very stable mounting
    - Compatible with various worktops
    - No permanent installation
    disadvantages:
    - Requires compatible worktop edge
    - Setup time for clamping
    risks:
    - Insufficient clamping force
    - Worktop damage from clamping
    impacted_requirements:
    - R12 (stable on worktop)
    - R14 (portable with clamp-on design)
    - R18 (safe mounting)
  - id: WP19
    function_id: F10
    principle_name: Enclosed work zone with safety guards
    physical_effect_or_mechanism: Physical barriers to prevent access to pinch points
    key_parameters:
    - Guard material and strength
    - Clearance and visibility
    - Guard attachment and release
    advantages:
    - High safety level
    - Clear visual indication of safe operation
    - Prevents accidental contact
    disadvantages:
    - May restrict access for maintenance
    - Added cost and complexity
    risks:
    - Guard failure or removal
    - Reduced visibility of work
    impacted_requirements:
    - R18 (ensures safety)
    - R11 (may affect one-man operation if guards interfere)
  - id: WP20
    function_id: F10
    principle_name: Safety interlocks with control logic
    physical_effect_or_mechanism: Electrical or mechanical interlocks preventing operation
      unless safe
    key_parameters:
    - Interlock type and reliability
    - Logic complexity
    - Override prevention
    advantages:
    - High safety assurance
    - Can prevent unsafe sequences
    - Provides feedback to operator
    disadvantages:
    - Higher cost and complexity
    - Potential for interlock failure
    risks:
    - Interlock malfunction allowing unsafe operation
    - Operator bypass of safety features
    impacted_requirements:
    - R18 (ensures safety)
    - R11 (may affect one-man operation)
  - id: WP21
    function_id: F11
    principle_name: Visual inspection window with lighting
    physical_effect_or_mechanism: Transparent window with illumination for quality
      verification
    key_parameters:
    - Window material and clarity
    - Lighting intensity and coverage
    - Window durability and scratch resistance
    advantages:
    - Direct visual confirmation
    - No power required for basic version
    - Operator feedback during operation
    disadvantages:
    - May be obscured by debris
    - Limited to visual defects
    risks:
    - Window damage or scratching
    - Inadequate lighting for verification
    impacted_requirements:
    - R15 (verifies closed rivets)
    - R18 (safe operation with visibility)
  - id: WP22
    function_id: F11
    principle_name: Mechanical feeler gauge or go/no-go gauge
    physical_effect_or_mechanism: Physical gauge to check rivet closure dimension
    key_parameters:
    - Gauge accuracy and tolerance
    - Material wear resistance
    - Gauge integration with tool
    advantages:
    - Objective, quantitative verification
    - No power required
    - Simple, reliable
    disadvantages:
    - Requires manual checking
    - Gauge wear affecting accuracy
    risks:
    - Gauge damage or loss
    - Inconsistent use by operator
    impacted_requirements:
    - R15 (verifies closed rivets)
    - R9 (checks ~4 mm closure)
    - R16 (minimal maintenance if robust)
  assumptions:
  - The tool is designed for workshop use on a worktop, consistent with the case description.
  - Rivet holes are pre-drilled in the brake shoe and lining per specifications.
  - The tool focuses on setting and forming rivets rather than drilling or other preparatory
    operations.
  - All proposed principles are compatible with the specified material ranges (Al-alloy
    shoes, 3-5 mm rivets, etc.).
  open_questions:
  - Is there a specific requirement for the shape or diameter of the formed rivet
    head beyond the closure distance?
  - Are there any environmental constraints (e.g., dust, oil) that might affect the
    choice of mechanisms (e.g., hydraulic systems)?
  - Is there a preference for hand vs. foot actuation, or should both be considered
    viable options?
  - Are there any specific cost or weight targets that might influence the selection
    of mechanisms (e.g., toggle vs. screw)?
