black_box:
  overall_function: Transform brake shoe, lining, and rivet into a riveted brake assembly
    with proper head closure and joint integrity.
  flows:
    inputs:
    - id: IN1
      type: material
      name: Brake shoe
      description: Steel brake shoe component, 6-8 mm thick, 80-400 mm wide, for internal
        drum brakes (D=250-400 mm).
    - id: IN2
      type: material
      name: Brake lining
      description: Friction lining material to be riveted onto brake shoe.
    - id: IN3
      type: material
      name: Rivet
      description: Steel rivet, 3-5 mm shank diameter, to fasten lining to shoe.
    - id: IN4
      type: energy
      name: Manual actuation force
      description: Human-applied force via hand or foot (≤200 N hand, ≤400 N foot)
        to drive riveting mechanism.
    - id: IN5
      type: signal
      name: Operator control
      description: User input to initiate and control riveting stroke.
    outputs:
    - id: OUT1
      type: material
      name: Riveted brake assembly
      description: Completed brake shoe with lining securely riveted, rivet head closure
        ~4 mm, ready for installation.
    - id: OUT2
      type: signal
      name: Completion indication
      description: Feedback to operator that riveting process is complete.
  external_interactions:
  - id: EI1
    description: Workshop environment with typical contaminants (dust, oil) on worktop;
      tool must remain stable and functional.
    related_requirements:
    - R12
    - R17
    - R18
  assumptions:
  - Tool is bench-mounted and manually actuated as described in case context.
  - Primary application is internal drum brakes with specified dimensions.
  - Workshop environment is indoor with typical contaminants.
  open_questions:
  - Specific mechanism for rivet insertion and head formation not defined.
  - Whether tool includes automatic or manual rivet feeding.
  - Exact stroke length and force profile required for consistent riveting.
  traceability:
    derived_from_requirements:
    - R1 (functional requirement for riveting)
    - R2-R7 (interface requirements for component dimensions)
    - R8-R9 (performance requirements for force and head closure)
    - R11 (ergonomic requirement for one-person operation)
    - R12 (environmental requirement for workshop use)
    - R17 (ergonomic force limits)
    - R18 (safety requirement)
