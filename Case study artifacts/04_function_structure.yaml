function_structure:
  overall_function:
    id: F0
    verb_noun: "Rivet lining to shoe"
    input_flows: [IN_M1, IN_M2, IN_M3, IN_E1, IN_S1]
    output_flows: [OUT_M1, OUT_S1]
    allocated_requirements: [R1, R11, R15]
  subfunctions:
    - id: F1
      verb_noun: "Prepare and CLAMP workpiece"
      description: "Support and clamp shoe+lining in the tool/fixture."
      input_flows: [IN_M1, IN_M2]
      output_flows: []
      allocated_requirements: [R2, R3, R4, R5, R12]
    - id: F2
      verb_noun: "INSERT and POSITION rivet"
      description: "Insert rivet into aligned holes and position for forming."
      input_flows: [IN_M3]
      output_flows: []
      allocated_requirements: [R6, R7]
    - id: F3
      verb_noun: "ALIGN work zone"
      description: "Align shoe/lining/rivet under forming heads; ensure repeatability across multiple rivets."
      input_flows: []
      output_flows: []
      allocated_requirements: [R10, R15]
    - id: F4
      verb_noun: "ACCEPT actuating force"
      description: "Accept hand/foot force input from operator."
      input_flows: [IN_E1]
      output_flows: []
      allocated_requirements: [R11, R17]
    - id: F5
      verb_noun: "AMPLIFY force"
      description: "Amplify human input to required riveting force."
      input_flows: [IN_E1]
      output_flows: []
      allocated_requirements: [R8, R17]
    - id: F6
      verb_noun: "CONTROL stroke and force"
      description: "Control working stroke/force; ensure closure head movement and limit end position."
      input_flows: []
      output_flows: []
      allocated_requirements: [R9, R15]
    - id: F7
      verb_noun: "FORM rivet head"
      description: "Perform deformation/forming to close rivet head to target closure."
      input_flows: [IN_M3]
      output_flows: [OUT_M1]
      allocated_requirements: [R1, R8, R9]
    - id: F8
      verb_noun: "ENABLE repositioning for next rivet"
      description: "Enable moving to next rivet location and repeating operation."
      input_flows: []
      output_flows: []
      allocated_requirements: [R10, R11]
    - id: F9
      verb_noun: "ENSURE stability on table"
      description: "Ensure tool stability / mounting on worktop or in vice."
      input_flows: []
      output_flows: []
      allocated_requirements: [R12]
    - id: F10
      verb_noun: "ENSURE safety"
      description: "Prevent pinch/crush hazards; safe clearances and guards."
      input_flows: []
      output_flows: []
      allocated_requirements: [R18]
    - id: F11
      verb_noun: "VERIFY closed rivets"
      description: "Provide means to check that all rivets are properly closed."
      input_flows: []
      output_flows: [OUT_S1]
      allocated_requirements: [R15]
  hierarchy:
    - parent: F0
      children: [F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11]
  completeness_checks:
    flow_conservation_notes: "Material inputs IN_M1/IN_M2/IN_M3 produce OUT_M1; energy IN_E1 is consumed in F4/F5; signal OUT_S1 via F11."
    missing_functions_suspected:
      - "Internal lubrication/cleaning function might be needed for reliable forming in a workshop environment."
  assumptions:
    - "Subfunctions are synthesized from the machine functional structure diagram and the technical process (pp. 8-10)."
  open_questions:
    - "Confirm whether the original case separates 'position shoe/lining' vs 'position rivet' as distinct operator vs TS functions."
  traceability:
    derived_from:
      - "Functional structure of operator (p. 8)"
      - "Functional structure of the machine system (p. 10)"
