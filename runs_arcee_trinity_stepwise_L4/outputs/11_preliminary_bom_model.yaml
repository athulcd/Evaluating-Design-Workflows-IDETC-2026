preliminary_bom:
  items:
  - item_id: B1
    module_id: M1
    name: Lever and Fulcrum Mechanism
    quantity: 1
    key_specs:
    - spec: Material
      target: Steel 1045
    - spec: Yield Strength
      target: 360 MPa
    - spec: Ultimate Tensile Strength
      target: 540 MPa
    tolerance_notes: 'Lever arm ratio: "25:1 to 30:1"

      Fulcrum position: Adjustable within 50-100 mm range

      Critical dimensions: ±0.1 mm for pivot points'
    material: Steel 1045
    process: CNC Machining
    verification: 'Stress analysis to verify 500 N force capacity with 3x safety factor

      Dimensional inspection of pivot points and force transmission surfaces

      Fatigue testing for 5-year reliability'
    traces_to:
      functions:
      - F3 (Apply riveting force)
      requirements:
      - R1 (500 N force)
      - R2 (3-4 mm stroke)
      - R8 (ergonomic operation)
      - R9 (5-year reliability)
      - R13 (cost-effective manufacturing)
  - item_id: B2
    module_id: M2
    name: Brake Shoe Positioning System
    quantity: 1
    key_specs:
    - spec: Material
      target: Steel 1020
    - spec: Yield Strength
      target: 210 MPa
    - spec: Adjustment Range
      target: 250-400 mm diameter
    tolerance_notes: 'Positioning accuracy: ±1 mm

      Width capacity: 100 mm ±2 mm

      Lining thickness: 15 mm ±1 mm'
    material: Steel 1020
    process: Welding
    verification: 'Dimensional inspection of adjustment range

      Load testing with 2 kg brake shoes

      Wear testing for 5-year service life'
    traces_to:
      functions:
      - F2 (Position brake shoe assembly)
      requirements:
      - R3 (250-400 mm diameter range)
      - R4 (2 kg, 100 mm width)
      - R6 (15 mm lining thickness)
      - R9 (5-year reliability)
      - R13 (cost-effective manufacturing)
  - item_id: B3
    module_id: M3
    name: Copper Rivet Reception System
    quantity: 1
    key_specs:
    - spec: Material
      target: Brass C260
    - spec: Yield Strength
      target: 105 MPa
    - spec: Rivet Compatibility
      target: 3-5 mm diameter (DIN 7338)
    tolerance_notes: 'Guide hole diameter: 3.1-5.1 mm

      Alignment accuracy: ±0.05 mm

      Stroke travel: 3-4 mm'
    material: Brass C260
    process: CNC Machining
    verification: 'Alignment accuracy testing with copper rivets

      Wear testing for 5-year service life

      Compatibility testing with DIN 7338 rivets'
    traces_to:
      functions:
      - F1 (Receive copper rivets)
      requirements:
      - R15 (3-5 mm copper rivets)
      - R9 (5-year reliability)
      - R13 (cost-effective manufacturing)
  - item_id: B4
    module_id: M4
    name: Mounting Base and Worktop Interface
    quantity: 1
    key_specs:
    - spec: Material
      target: Steel 1045
    - spec: Clamping Force
      target: '>1000 N'
    - spec: Base Weight
      target: 1.67 kg minimum
    tolerance_notes: 'Mounting surface flatness: 0.2 mm

      Clamping adjustment: 50-100 mm range

      Worktop contact area: ">100 cm\u00b2"'
    material: Steel 1045
    process: Milling
    verification: 'Clamping force testing

      Worktop mounting stability testing

      Dimensional inspection of mounting surfaces'
    traces_to:
      functions:
      - F4 (Mount on worktop)
      requirements:
      - R11 (mounting on wooden worktop)
      - R12 (one-man operation)
      - R10 (compact and transportable)
      - R13 (cost-effective manufacturing)
  - item_id: B5
    module_id: M5
    name: Transport and Storage System
    quantity: 1
    key_specs:
    - spec: Material
      target: ABS Plastic
    - spec: Total Weight
      target: <10 kg
    - spec: Volume
      target: <0.05 m³
    tolerance_notes: 'Component weight: <2.08 kg each

      Connection repeatability: ±0.5 mm

      Impact resistance: 200 J/m'
    material: ABS Plastic
    process: Injection Molding
    verification: 'Drop testing for transport durability

      Dimensional stability testing

      Assembly/disassembly cycle testing'
    traces_to:
      functions:
      - F5 (Enable transport and storage)
      requirements:
      - R10 (compact and transportable)
      - R13 (cost-effective manufacturing)
      - R14 (design completion within 3-4 months)
  assumptions:
  - Workshop machining facilities can produce precision lever components with appropriate
    material strength
  - Operators will receive training on proper fulcrum adjustment and operation technique
  - Wooden worktop can withstand clamping forces without damage when using load distribution
    plates
  - Copper rivets will be supplied in annealed state as specified in DIN 7338
  - All material suppliers can provide required materials within project timeline
  open_questions:
  - What specific ergonomic guidelines (e.g., working height) must the tool comply
    with?
  - Are there any additional safety requirements or certifications needed for the
    tool?
  - What is the exact project completion deadline within the 3-4 month timeframe?
  - Are there any specific material or surface finish requirements for the tool?
  - What is the expected variability in brake shoe dimensions within the 250-400 mm
    range?
