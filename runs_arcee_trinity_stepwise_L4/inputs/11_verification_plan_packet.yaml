      - id: CV5
        selected_principles:
          F1: WP5
          F2: WP5
          F3: WP5
          F4: WP6
          F5: WP7
        architecture_description: 'This concept employs a cam and follower mechanism
          for all three main functions (F1, F2, F3). The eccentric cam motion provides
          smooth force application throughout the stroke, making it ideal for consistent
          riveting quality. The copper rivet reception and brake shoe positioning
          use smaller cam mechanisms with appropriate force ratings. The tool includes
          a clamping base with adjustable feet (F4) and a modular design with quick-release
          components (F5).


          The cam mechanism uses precision-ground cams with optimized profiles to
          provide the required 500 N force over a 3-4 mm stroke. The modular design
          allows the cam assemblies to be separated from the main body for transport.
          The smooth force profile reduces the risk of rivet or brake shoe damage
