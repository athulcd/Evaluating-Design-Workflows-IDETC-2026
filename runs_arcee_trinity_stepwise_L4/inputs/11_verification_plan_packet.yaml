  concept_selection:
    concept_selection:
      criteria_weights:
      - criterion_id: EC1
        weight: 0.3
        justification: Manufacturing cost is critical as it directly impacts project
          viability and must stay under 500 CHF (target 400 CHF). This is a hard constraint
          that cannot be compromised.
      - criterion_id: EC2
        weight: 0.2
        justification: Operating force affects ergonomics and operator fatigue. Must
          be ≤200 N for hand operation or ≤400 N for foot operation to ensure one-man
          usability.
      - criterion_id: EC3
        weight: 0.15
        justification: Tool weight impacts transportability and must be <10 kg to
          meet the compact and easily transportable requirement.
      - criterion_id: EC4
        weight: 0.1
        justification: Tool volume affects storage and workshop space utilization,
          with a target <0.05 m³ for compactness.
      - criterion_id: EC5
        weight: 0.15
        justification: MTBF >5 years is essential for reliability and maintenance-free
          operation over the 5-year service life.
      - criterion_id: EC6
        weight: 0.1
        justification: Design completion within 3-4 months is a hard constraint that
          must be met to satisfy the project schedule.
      scoring:
      - concept_id: CV1
        scores:
          EC1: 0.9
          EC2: 0.95
          EC3: 0.95
          EC4: 0.95
          EC5: 0.85
          EC6: 0.95
        notes: Lever mechanism offers excellent cost-effectiveness and ergonomic operation
          with simple manufacturing. However, potential for material fatigue over
          time.
      - concept_id: CV2
        scores:
          EC1: 0.85
          EC2: 0.9
          EC3: 0.9
          EC4: 0.9
          EC5: 0.8
          EC6: 0.9
        notes: Screw mechanism provides precise control and self-locking safety but
          has slower operation and potential thread wear issues.
      - concept_id: CV3
        scores:
          EC1: 0.7
          EC2: 0.85
          EC3: 0.75
          EC4: 0.8
          EC5: 0.9
          EC6: 0.85
        notes: Hydraulic system offers smooth operation and foot control but has highest
          manufacturing cost and complexity with potential leakage risks.
      - concept_id: CV4
        scores:
          EC1: 0.8
          EC2: 0.9
          EC3: 0.9
          EC4: 0.9
          EC5: 0.75
          EC6: 0.9
        notes: Toggle linkage provides high force multiplication but has complex geometry
          and potential for jamming if tolerances not maintained.
      - concept_id: CV5
        scores:
          EC1: 0.75
          EC2: 0.9
          EC3: 0.85
          EC4: 0.85
          EC5: 0.8
          EC6: 0.85
        notes: Cam mechanism offers smooth operation but has complex manufacturing
          requirements and potential for follower wear.
      selected_concept_id: CV1
      selection_rationale: 'Concept CV1 (lever and fulcrum mechanism) is selected
        as the preferred concept based on its superior performance across the weighted
        criteria. It achieves the highest overall score by excelling in manufacturing
        cost (0.90), operating force (0.95), weight (0.95), volume (0.95), and design
        completion time (0.95). The lever mechanism provides the best balance of cost-effectiveness,
        ergonomic operation, and reliability while meeting all functional requirements.


        The 30% weight on manufacturing cost heavily favors CV1''s estimated 350 CHF
        per unit, which is well under the 400 CHF target and provides the best cost
        margin. The 20% weight on operating force strongly supports CV1''s ergonomic
        hand operation with forces under 200 N. The simple design also ensures the
        3-4 month completion timeline can be met with basic machining operations available
        in the workshop.


        While CV1 has slightly lower reliability (0.85) compared to hydraulic (0.90)
        or toggle (0.75) mechanisms, the simple lever design with minimal moving parts
        actually provides excellent long-term reliability when properly designed with
        quality materials. The main risk of material fatigue can be mitigated through
        appropriate material selection and design optimization.

        '
      sensitivity_analysis_notes: 'The selection is most sensitive to the manufacturing
        cost weight (30%). If this were reduced to 20% and reliability weight increased
        to 25%, CV3 (hydraulic) would become competitive due to its superior MTBF
        rating. However, the 30% cost weight reflects the project''s strong emphasis
        on cost-effectiveness as a key success criterion.


        The operating force weight (20%) also significantly impacts the selection.
        If ergonomic requirements were less critical and this weight reduced to 10%,
        CV3 would gain advantage due to its foot operation freeing both hands, though
        at the expense of higher cost and complexity.


        The design completion time weight (10%) has minimal impact on the selection
        as all concepts are rated similarly achievable within 3-4 months, though CV1''s
        simpler design provides the highest confidence in meeting this constraint.

        '
      assumptions:
      - Lever mechanism can be optimized to provide sufficient stroke without multiple
        operations per rivet
      - Workshop facilities can produce precision lever components with appropriate
        material strength
      - Operators will receive training on proper fulcrum adjustment and operation
        technique
      - Wooden worktop can withstand clamping forces without damage
      open_questions:
      - What specific ergonomic guidelines (e.g., working height) must the tool comply
        with?
      - Are there any additional safety requirements or certifications needed for
        the tool?
      - What is the exact project completion deadline within the 3-4 month timeframe?
      - Are there any specific material or surface finish requirements for the tool?
      - What is the expected variability in brake shoe dimensions within the 250-400
        mm range?
      traceability:
        based_on_concepts:
        - CV1
        - CV2
        - CV3
        - CV4
        - CV5
  embodiment_layouts:
    embodiment_layouts:
      layout:
      - id: EL1
        module_breakdown:
        - module_id: M1
          name: Lever and Fulcrum Mechanism
          responsibilities:
          - Generate 500 N riveting force through mechanical advantage
          - Provide 3-4 mm working stroke for rivet deformation
          - Enable ergonomic hand operation with force under 200 N
          allocated_functions:
          - F3 (Apply riveting force)
        - module_id: M2
          name: Brake Shoe Positioning System
          responsibilities:
          - Securely hold brake shoes (250-400 mm diameter, max 2 kg, 100 mm width)
          - Accommodate linings up to 15 mm thickness
          - Provide 10 mm clearance from rivet center to brake shoe rib
          allocated_functions:
          - F2 (Position brake shoe assembly)
        - module_id: M3
          name: Copper Rivet Reception
          responsibilities:
          - Accept and position annealed copper rivets (DIN 7338, 3-5 mm)
          - Guide rivets for proper alignment during setting
          allocated_functions:
          - F1 (Receive copper rivets)
        - module_id: M4
          name: Mounting Base and Worktop Interface
          responsibilities:
          - Provide stable mounting on wooden worktop
          - Ensure ergonomic one-man operation
          - Compensate for uneven worktop surfaces
          allocated_functions:
          - F4 (Mount on worktop)
        - module_id: M5
          name: Transport and Storage System
          responsibilities:
          - Enable tool disassembly for transport
          - Maintain compact dimensions (< 0.05 m³)
          - Keep total weight under 10 kg
          allocated_functions:
          - F5 (Enable transport and storage)
        interfaces:
        - id: IF1
          between:
          - M1
          - M2
          type: mechanical
          description: Mechanical linkage between riveting mechanism and brake shoe
            positioning
          constraints:
          - Must transmit 500 N force without deformation
          - Stroke travel limited to 3-4 mm
          - Clearance for 10 mm rib offset maintained
        - id: IF2
          between:
          - M1
          - M3
          type: mechanical
          description: Guide system for copper rivet alignment and positioning
          constraints:
          - Accepts 3-5 mm diameter rivets per DIN 7338
          - Maintains alignment during 3-4 mm stroke
          - Prevents rivet rotation during setting
        - id: IF3
          between:
          - M2
          - M4
          type: mechanical
          description: Mounting interface between brake shoe system and base
          constraints:
          - Provides stable platform for 2 kg brake shoes
          - Allows 250-400 mm diameter adjustment range
          - Maintains 100 mm width capacity
        - id: IF4
          between:
          - M4
          - M5
          type: mechanical
          description: Quick-release connection for transport and storage
          constraints:
          - Enables tool disassembly into components < 10 kg each
          - Maintains alignment when reassembled
          - Provides secure connection during operation
        - id: IF5
          between:
          - M1
          - Human Operator
          type: human
          description: Ergonomic hand operation interface
          constraints:
          - Operating force ≤ 200 N
          - Comfortable grip geometry
          - Proper working height for one-man operation
        key_design_parameters:
        - id: KDP1
          name: Lever arm ratio
          unit: dimensionless
          target_or_range: 25:1 to 30:1
          linked_requirements:
          - R1 (500 N force)
          - R8 (ergonomic operation)
        - id: KDP2
          name: Fulcrum position
          unit: millimeters
          target_or_range: Adjustable within 50-100 mm range
          linked_requirements:
          - R2 (3-4 mm stroke)
          - R5 (10 mm clearance)
        - id: KDP3
          name: Material yield strength
          unit: MPa
          target_or_range: '> 400 MPa for lever components'
          linked_requirements:
          - R9 (5-year reliability)
          - R13 (cost-effective manufacturing)
        - id: KDP4
          name: Base clamping force
          unit: Newtons
          target_or_range: '> 1000 N'
          linked_requirements:
          - R11 (mounting on wooden worktop)
          - R12 (one-man operation)
        - id: KDP5
          name: Component weight distribution
          unit: kilograms
          target_or_range: < 10 kg total, balanced for stability
          linked_requirements:
          - R10 (compact and transportable)
          - R17 (70 rivets per day)
        risks_and_mitigations:
        - id: RM1
          risk: Material fatigue in lever components over time
          mitigation: Use high-strength steel (yield > 400 MPa) with optimized cross-sections
            and stress analysis
        - id: RM2
          risk: Inconsistent force application due to fulcrum position drift
          mitigation: Implement positive locking mechanism for fulcrum adjustment
            with detents at optimal positions
        - id: RM3
          risk: Insufficient stroke length requiring multiple operations per rivet
          mitigation: Optimize lever geometry to achieve full 3-4 mm stroke in single
            operation through detailed kinematic analysis
        - id: RM4
          risk: Worktop damage from clamping forces
          mitigation: Design clamping system with load distribution plates and adjustable
            pressure limits
        - id: RM5
          risk: Component misalignment during reassembly affecting performance
          mitigation: Incorporate alignment pins and color-coded assembly guides for
            quick, accurate reassembly
      assumptions:
      - Workshop machining facilities can produce precision lever components with
        required tolerances
      - Operators will receive training on proper fulcrum adjustment and operation
        technique
      - Wooden worktop can withstand clamping forces without damage when using load
        distribution plates
      - Copper rivets will be supplied in annealed state as specified in DIN 7338
      open_questions:
      - What specific ergonomic guidelines (e.g., working height) must the tool comply
        with?
      - Are there any additional safety requirements or certifications needed for
        the tool?
      - What is the exact project completion deadline within the 3-4 month timeframe?
      - Are there any specific material or surface finish requirements for the tool?
      - What is the expected variability in brake shoe dimensions within the 250-400
        mm range?
      traceability:
        selected_concept_id: CV1
  preliminary_sizing:
    preliminary_sizing:
      load_cases:
      - id: LC1
        description: Maximum riveting force application with 500 N load over 3-4 mm
          stroke
        related_requirements:
        - R1 (500 N force)
        - R2 (3-4 mm stroke)
        - R9 (5-year reliability)
        - R17 (70 rivets per day)
      sizing_results:
      - parameter_id: KDP1
        governing_case: LC1
        equation_or_model: 'Force_amplification = (L_input / L_output)

          Required_L_input = (500 N * L_output) / Operator_force

          Where:

          - L_input = length of input lever arm

          - L_output = length of output lever arm

          - Operator_force ≤ 200 N (ergonomic limit)'
        assumed_values:
        - Operator_force: 150 N (conservative ergonomic estimate)
        - L_output: 20 mm (determined by stroke requirement)
        result: L_input = 67 mm (lever arm ratio ≈ 3.35:1)
        margin_or_factor_of_safety: 1.33 (based on 150 N vs 200 N ergonomic limit)
      - parameter_id: KDP2
        governing_case: LC1
        equation_or_model: 'Fulcrum_position = L_input + Adjustment_range

          Adjustment_range = 50-100 mm (to accommodate different brake shoe sizes)

          Total_lever_length = L_input + L_output + Adjustment_range'
        assumed_values:
        - Adjustment_range: 75 mm (midpoint of specified range)
        result: Fulcrum_position = 142 mm from pivot, Total_lever_length = 232 mm
        margin_or_factor_of_safety: 1.5 (provides adequate adjustment range)
      - parameter_id: KDP3
        governing_case: LC1
        equation_or_model: 'Stress = (Force * Safety_factor) / Cross_sectional_area

          Required_area = (Force * Safety_factor) / Allowable_stress

          Where:

          - Safety_factor = 3.0 (for fatigue and reliability)

          - Allowable_stress = 0.6 * Yield_strength (for steel)'
        assumed_values:
        - Safety_factor: 3.0
        - Allowable_stress: 240 MPa (for 400 MPa yield strength steel)
        result: Cross_sectional_area = 6.25 mm² (minimum for critical lever sections)
        margin_or_factor_of_safety: 3.0 (fatigue and reliability margin)
      - parameter_id: KDP4
        governing_case: LC1
        equation_or_model: 'Clamping_force = (Base_weight + Applied_force) * Friction_coefficient

          Required_base_weight = (Clamping_force / Friction_coefficient) - Applied_force

          Where:

          - Friction_coefficient = 0.3 (steel on wood)

          - Applied_force = 500 N (maximum riveting force)'
        assumed_values:
        - Friction_coefficient: 0.3
        - Applied_force: 500 N
        result: Base_weight = 1.67 kg (minimum for stability)
        margin_or_factor_of_safety: 2.0 (includes dynamic loading during operation)
      - parameter_id: KDP5
        governing_case: LC1
        equation_or_model: 'Total_weight = Sum_of_component_weights + Base_weight

          Component_weight_limit = (10 kg - Base_weight) / Number_of_components

          Where:

          - Number_of_components = 4 (main lever, positioning system, rivet guide,
          base)'
        assumed_values:
        - Base_weight: 1.67 kg
        - Number_of_components: 4
        result: Component_weight_limit = 2.08 kg per component
        margin_or_factor_of_safety: 1.2 (provides margin for fasteners and hardware)
      assumptions:
      - Lever mechanism can be optimized to provide sufficient stroke without multiple
        operations per rivet
      - Workshop facilities can produce precision lever components with appropriate
        material strength
      - Operators will receive training on proper fulcrum adjustment and operation
        technique
      - Wooden worktop can withstand clamping forces without damage when using load
        distribution plates
      - Copper rivets will be supplied in annealed state as specified in DIN 7338
      open_questions:
      - What specific ergonomic guidelines (e.g., working height) must the tool comply
        with?
      - Are there any additional safety requirements or certifications needed for
        the tool?
      - What is the exact project completion deadline within the 3-4 month timeframe?
      - Are there any specific material or surface finish requirements for the tool?
      - What is the expected variability in brake shoe dimensions within the 250-400
        mm range?
