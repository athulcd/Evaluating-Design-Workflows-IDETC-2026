        - Wooden worktop can support the weight of the hydraulic system
      - id: CV4
        selected_principles:
          F1: WP2
          F2: WP2
          F3: WP2
          F4: WP6
          F5: WP7
        architecture_description: 'This concept utilizes a toggle linkage mechanism
          for all three main functions (F1, F2, F3). The toggle mechanism provides
          high force multiplication at the end of the stroke, making it ideal for
          the 500 N requirement. The copper rivet reception and brake shoe positioning
          use smaller toggle linkages with appropriate force ratings. The tool includes
          a clamping base with adjustable feet (F4) and a modular design with quick-release
          components (F5).


          The toggle mechanism consists of multiple linked arms that fold at the end
          of the stroke to achieve maximum force. The geometry is optimized to provide
          the required 3-4 mm stroke while maintaining ergonomic operation. The modular
          design allows the toggle arms to be disconnected for transport, reducing
          the overall volume.

          '
        expected_benefits:
        - High force multiplication at end of stroke ideal for riveting
        - Compact design suitable for workshop space constraints
        - Smooth force application reduces risk of damage
        - Manufacturing cost estimated at 390 CHF per unit
        key_risks:
