        rationale: The lever mechanism requires high strength materials to withstand
          repeated 500 N forces while maintaining dimensional stability. Steel 1045
          offers the best balance of strength, machinability, and cost for workshop
          production. CNC machining provides the precision needed for reliable force
          transmission, though manual machining can be used for cost reduction if
          operator skill is sufficient.
        critical_characteristics:
        - High strength to withstand 500 N forces with safety factor
        - Dimensional stability for precise pivot points
        - Surface finish for smooth force transmission
        - Corrosion resistance for 5-year service life
        risks:
        - Material fatigue failure under repeated loading
        - Dimensional changes affecting force transmission
        - Surface wear at pivot points reducing reliability
        - Corrosion compromising structural integrity
