    concept_variants:
      morphological_chart:
      - function_id: F1
        options:
        - WP1
        - WP2
        - WP3
        - WP4
        - WP5
      - function_id: F2
        options:
        - WP1
        - WP2
        - WP3
        - WP4
        - WP5
      - function_id: F3
        options:
        - WP1
        - WP2
        - WP3
        - WP4
        - WP5
      - function_id: F4
        options:
        - WP6
      - function_id: F5
        options:
        - WP7
      concepts:
      - id: CV1
        selected_principles:
          F1: WP1
          F2: WP1
          F3: WP1
          F4: WP6
          F5: WP7
        architecture_description: 'This concept employs a lever and fulcrum mechanism
          for both receiving copper rivets (F1) and positioning the brake shoe assembly
          (F2). The riveting force application (F3) also uses a lever mechanism with
          a long handle for mechanical advantage, providing the required 500 N force
          with ergonomic hand operation. The tool features a clamping base with adjustable
          feet (F4) for stable mounting on wooden worktops, and a modular design with
          quick-release components (F5) for transport and storage.


          The lever mechanism consists of a main lever arm with a fulcrum positioned
          to provide optimal force multiplication. The brake shoe positioning uses
          a similar lever-based clamping system with adjustable jaws to accommodate
          the 250-400 mm diameter range. The modular design allows the tool to be
          disassembled into three main components for transport, with a total weight
          under 10 kg and volume under 0.05 m³.

          '
        expected_benefits:
        - Simple and cost-effective design with minimal moving parts
        - Easy to manufacture using basic machining operations
        - Ergonomic hand operation with force requirements under 200 N
        - Reliable and maintenance-free operation with no hydraulic or threaded components
        - Manufacturing cost estimated at 350 CHF per unit
        key_risks:
        - Limited stroke length may require multiple operations per rivet
        - Potential for operator fatigue with repeated use over long periods
        - Material fatigue in lever components over time
        - Inconsistent force application if fulcrum position not properly maintained
        requirement_coverage:
          satisfied:
          - R1 (500 N force achievable with lever advantage)
          - R2 (3-4 mm stroke possible with optimized lever geometry)
          - R3 (adjustable jaws accommodate 250-400 mm range)
          - R4 (clamping system handles 2 kg, 100 mm width)
          - R5 (10 mm clearance achievable with lever geometry)
          - R6 (15 mm lining thickness accommodated)
          - R7 (hand-operated lever mechanism)
          - R8 (ergonomic design with force under 200 N)
          - R9 (simple mechanism with no wear-prone components)
          - R10 (modular design under 10 kg, 0.05 m³)
          - R11 (clamping base mounts to wooden worktop)
          - R12 (designed for one-man operation)
          - R13 (manufacturing cost under 400 CHF target)
          - R14 (simple design achievable within 3-4 months)
          - R15 (accepts 3-5 mm copper rivets)
          - R16 (capable of 10-16 rivets per shoe)
          - R17 (suitable for 70 rivets per day)
          - R18 (5-year service life with proper materials)
          partially_satisfied: []
          not_satisfied: []
        assumptions:
        - Lever mechanism can be optimized to provide sufficient stroke without multiple
          operations
        - Workshop facilities can produce precision lever components
        - Operators will receive training on proper fulcrum adjustment
        - Wooden worktop can withstand clamping forces without damage
      - id: CV2
        selected_principles:
          F1: WP3
          F2: WP3
          F3: WP3
          F4: WP6
          F5: WP7
        architecture_description: 'This concept utilizes a screw and nut mechanism
          for all three main functions (F1, F2, F3). The copper rivet reception and
