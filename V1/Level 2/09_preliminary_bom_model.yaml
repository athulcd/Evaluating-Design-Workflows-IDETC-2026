preliminary_bom:
  items:
  - item_id: B1
    module_id: M1
    name: Base/Frame Assembly
    quantity: 1
    key_specs:
    - spec: Frame stiffness
      target: Sufficient to maintain alignment under 500 N load
    - spec: Mounting interface
      target: Flat base plate with 4 mounting holes for vice or bench bolts
    tolerance_notes: Frame flatness within 0.1 mm over critical datum surfaces
    material: Mild steel plate (e.g., S275) or equivalent weldment
    process: Laser-cut + welded assembly or machined plate frame
    verification: Frame deflection test under 500 N load; flatness check
    traces_to:
      functions:
      - F9
      requirements:
      - R12
      - R15
  - item_id: B2
    module_id: M2
    name: Workholding Fixture
    quantity: 1
    key_specs:
    - spec: Work envelope
      target: Accommodate D=250–400 mm, B=80–400 mm, thickness 6–8 mm, stack <=45
        mm
    - spec: Datum alignment
      target: Repeatable positioning within 0.2 mm
    tolerance_notes: Fixture hole alignment within 0.1 mm; clamp repeatability
    material: Steel body with hardened tool steel inserts
    process: Machining + heat treatment of inserts
    verification: Datum repeatability test; clamp force test
    traces_to:
      functions:
      - F1
      - F3
      - F8
      requirements:
      - R2
      - R3
      - R4
      - R5
      - R15
  - item_id: B3
    module_id: M3
    name: Rivet Insertion Guide
    quantity: 1
    key_specs:
    - spec: Guide bore
      target: Accommodate rivet shank d=3–5 mm with clearance
    tolerance_notes: Guide bore tolerance to allow smooth insertion without excessive
      play
    material: Hardened steel or bronze bushing
    process: Turning + heat treatment or press-fit bushing
    verification: Insertion force test; alignment check
    traces_to:
      functions:
      - F2
      requirements:
      - R6
      - R7
  - item_id: B4
    module_id: M4
    name: Actuation Handle/Arm
    quantity: 1
    key_specs:
    - spec: Lever arm length
      target: Provide mechanical advantage MA >= 2.5 (hand) or >= 1.25 (foot)
    - spec: Ergonomic grip
      target: Comfortable hand grip or foot pedal interface
    tolerance_notes: Pivot bore tolerance to minimize friction; handle clearance for
      safe operation
    material: Steel tube or bar
    process: Machining + bending or welding
    verification: Force amplification test; ergonomic assessment
    traces_to:
      functions:
      - F4
      requirements:
      - R11
      - R17
  - item_id: B5
    module_id: M5
    name: Force Amplifier Linkage
    quantity: 1
    key_specs:
    - spec: Pivot bearings
      target: Low friction, high stiffness
    - spec: Linkage geometry
      target: Achieve required mechanical advantage
    tolerance_notes: Pivot alignment within 0.05 mm; linkage stiffness to avoid deflection
    material: Steel pins, bushings, and linkage arms
    process: Machining + heat treatment of pins/bushings
    verification: Linkage deflection test under load; friction test
    traces_to:
      functions:
      - F5
      requirements:
      - R8
      - R17
  - item_id: B6
    module_id: M6
    name: Riveting Head Set (Preform + Closure)
    quantity: 1
    key_specs:
    - spec: Head geometry
      target: Compatible with DIN 7338 rivets; closure head forms ~4 mm closure
    - spec: Alignment
      target: Concentricity within 0.05 mm
    tolerance_notes: Head face flatness; alignment bore tolerance
    material: Hardened tool steel (e.g., 1.2379)
    process: Precision turning + grinding + heat treatment
    verification: Head geometry check; alignment test
    traces_to:
      functions:
      - F7
      requirements:
      - R1
      - R6
      - R7
      - R9
  - item_id: B7
    module_id: M7
    name: Stroke/Force Control and Stop
    quantity: 1
    key_specs:
    - spec: Adjustable stop
      target: Resolution 0.1 mm; range covers 0–10 mm
    - spec: Lock mechanism
      target: Secure against drift under vibration/impact
    tolerance_notes: Thread pitch accuracy; locknut preload
    material: Steel adjuster screw + locknut
    process: Thread cutting + machining
    verification: Adjustment repeatability test; lock integrity test
    traces_to:
      functions:
      - F6
      requirements:
      - R9
      - R15
  - item_id: B8
    module_id: M8
    name: Safety Features (Guards + Labels)
    quantity: 1
    key_specs:
    - spec: Pinch point guards
      target: Cover linkage and head area with safe clearances
    - spec: Warning labels
      target: Clear hazard warnings and max force limits
    tolerance_notes: Guard mounting clearance; label adhesion
    material: Steel or plastic guards; adhesive labels
    process: Bending + welding or injection molding for guards; printing for labels
    verification: Guard coverage check; label legibility
    traces_to:
      functions:
      - F10
      requirements:
      - R18
  - item_id: B9
    module_id: M9
    name: Verification Aids (Gauge + Markings)
    quantity: 1
    key_specs:
    - spec: Closure gauge
      target: Simple go/no-go gauge for ~4 mm closure
    - spec: Reference scale
      target: Markings on adjuster for repeatable settings
    tolerance_notes: Gauge tolerance to detect out-of-spec closures
    material: Steel or plastic gauge; engraved markings
    process: Machining + engraving or molding
    verification: Gauge accuracy check; scale readability
    traces_to:
      functions:
      - F11
      requirements:
      - R15
  assumptions:
  - Component specifications are based on the embodiment layout CV3 (lever press with
    adjustable stop) and preliminary sizing results.
  - Material and process choices reflect small-batch workshop manufacturability.
  - Tolerances are placeholders; final values depend on detailed design and analysis.
  - Safety features assume no two-hand control is required but guards and warnings
    are provided.
  open_questions:
  - Confirm exact rivet material/hardness and required forming force across d=3–5
    mm.
  - Confirm acceptable closure tolerance band around 4 mm.
  - Confirm batch size and whether any casting is permissible for base/frame.
  - Confirm if any additional lubrication or cleaning functions are needed for workshop
    environment.
