manufacturing_plan:
  module_plans:
  - module_id: M1
    material_candidates:
    - material_id: M_STEEL_1020
      name: Mild steel (1020)
      properties:
        tensile_strength: 400-550 MPa
        yield_strength: 350 MPa
        hardness: 120-150 HB
        machinability: Good
        weldability: Good
        corrosion_resistance: Poor (requires coating)
      rationale: Provides adequate strength for frame and base; economical; easy to
        machine and weld.
      risks:
      - Corrosion in workshop environment (oil/dust)
      - Requires protective coating or painting
    - material_id: M_AL_6061
      name: Aluminum 6061-T6
      properties:
        tensile_strength: 310 MPa
        yield_strength: 276 MPa
        hardness: 95 HB
        machinability: Good
        weldability: Fair
        corrosion_resistance: Good
      rationale: Lighter weight for portability; good corrosion resistance; adequate
        strength for static loads.
      risks:
      - Lower stiffness than steel (potential deflection under load)
      - Higher cost than mild steel
    process_candidates:
    - process_id: P_WELDING
      name: Welding (MIG/TIG)
      rationale: Cost-effective for steel frames; provides rigid joints.
      risks:
      - Requires skilled operator
      - Potential distortion requiring post-weld machining
    - process_id: P_CASTING
      name: Sand casting (for aluminum)
      rationale: Can produce complex base shapes; good for aluminum.
      risks:
      - Higher tooling cost
      - Porosity control required
    - process_id: P_MACHINING
      name: CNC machining (for critical features)
      rationale: Ensures dimensional accuracy for mounting interfaces and alignment
        features.
      risks:
      - Higher cost for large parts
      - Material waste
    rationale: Base/frame must provide structural stiffness to minimize compliance
      during riveting (KDP1, KDP2). Mild steel offers best cost-to-strength ratio;
      aluminum preferred if weight is critical. Welding provides rigid joints; casting
      useful for complex aluminum bases.
    critical_characteristics:
    - structural_stiffness
    - dimensional_accuracy_of_mounting_faces
    - corrosion_protection
    risks:
    - Frame deflection causing closure variation (R9)
    - Corrosion reducing service life (R13)
  - module_id: M2
    material_candidates:
    - material_id: M_STEEL_1045
      name: Medium carbon steel (1045)
      properties:
        tensile_strength: 570-700 MPa
        yield_strength: 300-500 MPa
        hardness: 170-210 HB
        machinability: Fair
        weldability: Poor (requires pre/post heat)
        corrosion_resistance: Poor (requires coating)
      rationale: Higher strength for fixture jaws/clamps; resists wear from repeated
        use.
      risks:
      - Difficult to machine
      - Requires heat treatment for optimal properties
    - material_id: M_POM
      name: Polyoxymethylene (Acetal/Delrin)
      properties:
        tensile_strength: 60-70 MPa
        yield_strength: 55 MPa
        hardness: 80-90 Shore D
        machinability: Excellent
        wear_resistance: Good
        corrosion_resistance: Excellent
      rationale: Self-lubricating; won't damage brake shoe surface; good wear resistance.
      risks:
      - Lower strength than steel
      - Creep under sustained load
    process_candidates:
    - process_id: P_MACHINING
      name: CNC milling/machining
      rationale: Precise geometry for brake shoe fit; datum surfaces for alignment.
      risks:
      - High cost for complex shapes
      - Tolerance stack-up
    - process_id: P_INJECTION_MOLDING
      name: Injection molding (for polymer components)
      rationale: Cost-effective for high-volume polymer fixture parts.
      risks:
      - Limited to polymer materials
      - Mold cost
    rationale: Workholding fixture must accommodate size ranges (R2-R5) with precise
      alignment features. Steel provides strength and wear resistance; polymer prevents
      damage to brake components. Machining ensures dimensional accuracy; injection
      molding for polymer parts.
    critical_characteristics:
    - dimensional_accuracy_for_size_range
    - wear_resistance
    - non-marring_contact_surfaces
    risks:
    - Fixture wear causing alignment errors (R15)
    - Slippage damaging brake components (R18)
  - module_id: M3
    material_candidates:
    - material_id: M_STEEL_1045
      name: Medium carbon steel (1045)
      properties:
        tensile_strength: 570-700 MPa
        yield_strength: 300-500 MPa
        hardness: 170-210 HB
        machinability: Fair
        weldability: Poor (requires pre/post heat)
        corrosion_resistance: Poor (requires coating)
      rationale: High strength for rivet guide; resists deformation under load.
      risks:
      - Difficult to machine
      - Requires heat treatment
    - material_id: M_BEARING_STEEL
      name: Bearing steel (52100)
      properties:
        tensile_strength: 2000+ MPa (hardened)
        yield_strength: 1500+ MPa (hardened)
        hardness: 60-65 HRC
        machinability: Poor (requires grinding)
        wear_resistance: Excellent
        corrosion_resistance: Poor (requires coating)
      rationale: Maximum wear resistance for rivet guide holes; maintains precision.
      risks:
      - Expensive
      - Difficult to machine (grinding required)
    process_candidates:
    - process_id: P_MACHINING
      name: CNC machining with grinding
      rationale: Precise bore for rivet guidance; grinding ensures surface finish.
      risks:
      - High cost
      - Requires skilled operation
    - process_id: P_HARDENED_BUSHING
      name: Press-fit hardened bushing
      rationale: Replaceable wear surface; easier to maintain.
      risks:
      - Additional assembly step
      - Bushing retention under load
    rationale: Rivet insertion guide must maintain precise alignment (R6, R7) and
      resist wear. Steel provides strength; bearing steel offers maximum wear resistance.
      Machining with grinding ensures precision; hardened bushings allow replacement.
    critical_characteristics:
    - bore_diameter_tolerance
    - wear_resistance
    - alignment_with_forming_heads
    risks:
    - Guide wear causing rivet misalignment (R1)
    - Bore damage from repeated use
  - module_id: M4
    material_candidates:
    - material_id: M_STEEL_1020
      name: Mild steel (1020)
      properties:
        tensile_strength: 400-550 MPa
        yield_strength: 350 MPa
        hardness: 120-150 HB
        machinability: Good
        weldability: Good
        corrosion_resistance: Poor (requires coating)
      rationale: Adequate strength for handle; economical.
      risks:
      - Corrosion
      - Requires coating
    - material_id: M_AL_6061
      name: Aluminum 6061-T6
      properties:
        tensile_strength: 310 MPa
        yield_strength: 276 MPa
        hardness: 95 HB
        machinability: Good
        weldability: Fair
        corrosion_resistance: Good
      rationale: Lighter weight for operator comfort; good corrosion resistance.
      risks:
      - Lower strength than steel
      - Fatigue concerns
    process_candidates:
    - process_id: P_MACHINING
      name: CNC machining
      rationale: Precise ergonomic shape; comfortable grip.
      risks:
      - High cost for complex shapes
    - process_id: P_CASTING
      name: Investment casting
      rationale: Complex ergonomic shapes; good surface finish.
      risks:
      - Higher tooling cost
      - Porosity control
    - process_id: P_PLASTIC_INJECTION
      name: Plastic injection molding (for grip)
      rationale: Ergonomic grip material; corrosion resistant.
      risks:
      - Limited to polymer materials
      - Assembly required
    rationale: Actuation handle must provide ergonomic interface (R11, R17) with adequate
      strength. Steel offers strength; aluminum reduces weight. Machining ensures
      ergonomic shape; casting for complex forms; plastic for grip comfort.
    critical_characteristics:
    - ergonomic_shape
    - strength_under_operating_load
    - corrosion_resistance
    risks:
    - Handle failure under maximum force (R17)
    - Ergonomic issues causing operator fatigue
  - module_id: M5
    material_candidates:
    - material_id: M_STEEL_1045
      name: Medium carbon steel (1045)
      properties:
        tensile_strength: 570-700 MPa
        yield_strength: 300-500 MPa
        hardness: 170-210 HB
        machinability: Fair
        weldability: Poor (requires pre/post heat)
        corrosion_resistance: Poor (requires coating)
      rationale: High strength for force transmission; resists deformation.
      risks:
      - Difficult to machine
      - Requires heat treatment
    - material_id: M_STEEL_4140
      name: Alloy steel (4140)
      properties:
        tensile_strength: 655-1030 MPa
        yield_strength: 415-690 MPa
        hardness: 197-302 HB
        machinability: Fair
        weldability: Poor (requires pre/post heat)
        corrosion_resistance: Poor (requires coating)
      rationale: Higher strength than 1045; good for high-stress linkages.
      risks:
      - More expensive than 1045
      - Requires heat treatment
    process_candidates:
    - process_id: P_MACHINING
      name: CNC machining
      rationale: Precise pivot holes and bearing surfaces.
      risks:
      - High cost
      - Tolerance stack-up
    - process_id: P_WELDING
      name: Welding (for assembly)
      rationale: Cost-effective for steel linkages.
      risks:
      - Requires skilled operator
      - Potential distortion
    - process_id: P_BEARING_SELECTION
      name: Precision bearings
      rationale: Reduces friction; improves force transmission efficiency.
      risks:
      - Additional cost
      - Maintenance requirement
    rationale: Force amplifier linkage must transmit amplified force (KDP1) with minimal
      losses. Steel provides strength; alloy steel for higher loads. Machining ensures
      precision; bearings reduce friction.
    critical_characteristics:
    - strength_under_max_load
    - precision_of_pivot_points
    - friction_reduction
    risks:
    - Linkage failure under maximum force (R8)
    - Excessive friction reducing force transmission (R17)
  - module_id: M6
    material_candidates:
    - material_id: M_STEEL_1045
      name: Medium carbon steel (1045)
      properties:
        tensile_strength: 570-700 MPa
        yield_strength: 300-500 MPa
        hardness: 170-210 HB
        machinability: Fair
        weldability: Poor (requires pre/post heat)
        corrosion_resistance: Poor (requires coating)
      rationale: High strength for forming heads; resists deformation.
      risks:
      - Difficult to machine
      - Requires heat treatment
    - material_id: M_TOOL_STEEL
      name: Tool steel (A2/O1)
      properties:
        tensile_strength: 1900+ MPa (hardened)
        yield_strength: 1650+ MPa (hardened)
        hardness: 57-62 HRC
        machinability: Poor (requires grinding)
        wear_resistance: Excellent
        corrosion_resistance: Poor (requires coating)
      rationale: Maximum wear resistance for forming surfaces; maintains geometry.
      risks:
      - Expensive
      - Difficult to machine (grinding required)
    process_candidates:
    - process_id: P_MACHINING
      name: null
