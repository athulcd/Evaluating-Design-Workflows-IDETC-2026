    expected_benefits:
    - Lever amplification for adequate force
    - Adjustable stroke for range flexibility
    - Simple, robust design
    - Low cost
    key_risks:
    - Pinch hazards at lever pivot
    - Deflection may affect closure accuracy
    - Adjustable stop may be misadjusted
    requirement_coverage:
      satisfied:
      - R1, R8, R9, R15 (via WP7_1 and WP6_2)
      - R2, R3, R4, R5 (adjustable stop)
      - R11, R12 (vice mounting)
      - R17 (hand force)
      - R18 (safety)
      partially_satisfied:
