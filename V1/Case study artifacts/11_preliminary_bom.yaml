preliminary_bom:
  items:
    - item_id: B1
      module_id: M1
      name: "Base plate / frame"
      quantity: 1
      key_specs:
        - spec: "Mounting interface"
          target: "Vice mount or bolt pattern; stable on bench"
      tolerance_notes: "Flatness on head mounting faces; stiff frame"
      material: "Steel"
      process: "Plate + weldment + machining"
      verification: "Inspection + stiffness check"
      traces_to:
        functions: [F9]
        requirements: [R12, R15]
    - item_id: B2
      module_id: M4
      name: "Lever/handle"
      quantity: 1
      key_specs:
        - spec: "Length / ergonomic grip"
          target: "Sized to achieve MA target"
      tolerance_notes: "Adequate clearance and safe grip"
      material: "Steel + polymer grip"
      process: "Machining/bending + assembly"
      verification: "Force test"
      traces_to:
        functions: [F4, F5]
        requirements: [R17, R8]
    - item_id: B3
      module_id: M6
      name: "Rivet head set (preform + closure)"
      quantity: 1
      key_specs:
        - spec: "Head geometry"
          target: "Compatible with DIN 7338 rivets; closure ~4 mm"
      tolerance_notes: "Concentricity and surface finish critical"
      material: "Tool steel (hardened)"
      process: "Turning/grinding + heat treat"
      verification: "Inspection + trial riveting"
      traces_to:
        functions: [F7]
        requirements: [R1, R9, R7]
    - item_id: B4
      module_id: M7
      name: "Adjustable stroke stop assembly"
      quantity: 1
      key_specs:
        - spec: "Adjustment range"
          target: "Covers stack thickness range and closure setting"
      tolerance_notes: "Locknut/anti-loosen feature"
      material: "Steel"
      process: "Threaded hardware + machining"
      verification: "Functional test for repeatability"
      traces_to:
        functions: [F6]
        requirements: [R9, R15]
    - item_id: B5
      module_id: M2
      name: "Workholding fixture (shoe+lining clamp)"
      quantity: 1
      key_specs:
        - spec: "Envelope"
          target: "Supports D 250-400 mm; B 80-400 mm; thickness 6-8 mm"
      tolerance_notes: "Datums and clamp repeatability"
      material: "Steel with hardened inserts"
      process: "Machining"
      verification: "Fit check with gauge parts"
      traces_to:
        functions: [F1, F3, F8]
        requirements: [R2, R3, R4, R5, R15]
  assumptions:
    - "BOM is preliminary; the case includes dimensional layouts but not a full BOM listing."
  open_questions:
    - "Confirm whether the final case solution uses a welded frame vs machined plate vs cast base."
