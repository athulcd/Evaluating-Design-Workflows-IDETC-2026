embodiment_layouts:
  layout:
    - id: EL1
      module_breakdown:
        - module_id: M1
          name: "Base/Frame + Bench mounting"
          responsibilities: ["Provide structural stiffness", "Mount to bench/vice", "Ensure stability"]
          allocated_functions: [F9]
        - module_id: M2
          name: "Workholding fixture"
          responsibilities: ["Clamp shoe+lining", "Provide alignment features", "Allow repositioning for multiple rivets"]
          allocated_functions: [F1, F3, F8]
        - module_id: M3
          name: "Rivet insertion guide"
          responsibilities: ["Support rivet insertion and positioning"]
          allocated_functions: [F2]
        - module_id: M4
          name: "Actuation handle/lever"
          responsibilities: ["Accept human input", "Provide ergonomic interface"]
          allocated_functions: [F4]
        - module_id: M5
          name: "Force amplifier linkage"
          responsibilities: ["Amplify actuation to required force"]
          allocated_functions: [F5]
        - module_id: M6
          name: "Riveting head set (preform + closure)"
          responsibilities: ["Form rivet head", "Support opposite head", "Maintain alignment"]
          allocated_functions: [F7]
        - module_id: M7
          name: "Stroke/force control and stop"
          responsibilities: ["Set closure distance", "Limit end position", "Provide adjustability"]
          allocated_functions: [F6]
        - module_id: M8
          name: "Safety features"
          responsibilities: ["Guards, safe clearances, labels"]
          allocated_functions: [F10]
        - module_id: M9
          name: "Verification aids"
          responsibilities: ["Simple gauges/visual check for closure"]
          allocated_functions: [F11]
      interfaces:
        - id: IF1
          between: [M1, "Worktop/Vice"]
          type: mechanical
          description: "Mounting interface via vice clamp or bolted base plate"
          constraints: ["Stable on worktop (R12)"]
        - id: IF2
          between: [M4, "Operator hand/foot"]
          type: human
          description: "Lever/handle interface"
          constraints: ["Hand <=200 N or foot <=400 N (R17)"]
        - id: IF3
          between: [M2, "Brake shoe + lining"]
          type: mechanical
          description: "Fixture geometry accommodates size ranges"
          constraints: ["D 250-400 mm; B 80-400 mm; thickness ranges (R2-R5)"]
      key_design_parameters:
        - id: KDP1
          name: "Mechanical advantage"
          unit: "-"
          target_or_range: ">= (500 N)/(200 N) = 2.5 for hand mode (higher recommended)"
          linked_requirements: [R8, R17]
        - id: KDP2
          name: "Closure stroke (head closure)"
          unit: "mm"
          target_or_range: "~4 mm adjustable"
          linked_requirements: [R9]
        - id: KDP3
          name: "Work envelope / throat depth"
          unit: "mm"
          target_or_range: "Sufficient for brake shoe sizes (R2
          R5)"
          linked_requirements: [R2, R3, R4, R5]
      risks_and_mitigations:
        - id: RM1
          risk: "Misalignment causing poor rivet head formation"
          mitigation: "Add guided head alignment, hardened bushings, and fixture datums"
        - id: RM2
          risk: "Pinch/crush hazard at linkage and head area"
          mitigation: "Guarding and safe clearances; two-hand safety not required but consider hand clearance zones"
        - id: RM3
          risk: "Adjustment drift changes closure"
          mitigation: "Locknuts, detents, reference scale; verification gauge"
  assumptions:
    - "Embodiment corresponds to the 'layout sketches' and 'dimensional layouts' shown later in the case (pp. 16-19)."
  open_questions:
    - "Confirm whether the chosen case layout uses a lever press, screw press, or mixed mechanism."
  traceability:
    selected_concept_id: CV3
