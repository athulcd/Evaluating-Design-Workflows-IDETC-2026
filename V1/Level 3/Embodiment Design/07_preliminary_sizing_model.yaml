preliminary_sizing:
  load_cases:
  - id: LC1
    description: Maximum riveting force application with ergonomic limits
    related_requirements:
    - R8
    - R9
    - R17
    - R18
  - id: LC2
    description: Variable stack thickness accommodation
    related_requirements:
    - R2
    - R3
    - R4
    - R5
    - R9
  - id: LC3
    description: Workshop stability and safety during operation
    related_requirements:
    - R12
    - R18
    - R15
  sizing_results:
  - parameter_id: KDP1
    governing_case: LC2
    equation_or_model: 'Fixture adjustability range = max_width - min_width = 400
      mm - 80 mm = 320 mm

      Fixture diameter range = max_diameter - min_diameter = 400 mm - 250 mm = 150
      mm

      Thickness capacity = max_thickness - min_thickness = 8 mm - 6 mm = 2 mm (but
      must accommodate up to 45 mm total stack)'
    assumed_values:
      max_width: 400 mm
      min_width: 80 mm
      max_diameter: 400 mm
      min_diameter: 250 mm
      max_stack_thickness: 45 mm
      min_rivet_edge_distance: 4 mm
    result: 'Fixture must accommodate 80-400 mm width, 250-400 mm diameter, and up
      to 45 mm stack thickness

      Minimum fixture opening = max_width + 2*min_rivet_edge_distance = 400 + 2*4
      = 408 mm

      '
    margin_or_factor_of_safety: 1.1 (10% margin for wear and tolerances)
  - parameter_id: KDP3
    governing_case: LC1
    equation_or_model: 'Required mechanical advantage = F_output / F_input

      F_output >= 500 N (minimum riveting force)

      F_input <= 200 N (hand) or <= 400 N (foot)

      Lever ratio = L_effort / L_load'
    assumed_values:
      F_output_required: 500 N
      F_input_hand_max: 200 N
      F_input_foot_max: 400 N
    result: 'Minimum lever ratio for hand actuation = 500/200 = 2.5:1

      Minimum lever ratio for foot actuation = 500/400 = 1.25:1

      Recommended ratio = 3:1 (provides margin and accounts for friction losses)

      '
    margin_or_factor_of_safety: 1.2 (20% margin for friction and wear)
  - parameter_id: KDP5
    governing_case: LC2
    equation_or_model: 'Adjustable stop range = max_closure - min_closure

      max_closure = stack_thickness + 4 mm (target closure)

      min_closure = min_stack_thickness + 4 mm'
    assumed_values:
      target_closure: 4 mm
      min_stack_thickness: 6 mm
      max_stack_thickness: 45 mm
    result: 'Minimum stop adjustment range = (45 + 4) - (6 + 4) = 49 - 10 = 39 mm

      Recommended range = 40-50 mm to accommodate variations and provide margin

      '
    margin_or_factor_of_safety: 1.1 (10% margin for tolerance stack)
  - parameter_id: KDP7
    governing_case: LC3
    equation_or_model: 'Minimum safety clearance = max_operating_dimension + margin

      Pinch point clearance = critical_dimension + safety_margin'
    assumed_values:
      max_operating_dimension: 500 mm (approximate lever swing radius)
      critical_pinch_dimension: 50 mm (typical linkage opening)
      safety_margin: 10 mm
    result: 'Minimum safety clearance = 500 + 10 = 510 mm

      Minimum pinch point clearance = 50 + 10 = 60 mm

      '
    margin_or_factor_of_safety: 1.2 (20% margin for unexpected movements)
  - parameter_id: KDP9
    governing_case: LC3
    equation_or_model: 'Mass estimate = sum of component masses

      Base mass ≈ volume × material_density

      Actuation mass ≈ lever_arm_length × cross_section × material_density'
    assumed_values:
      material_density_steel: 7850 kg/m³
      base_dimensions: 300 × 200 × 50 mm
      lever_arm_length: 500 mm
      lever_cross_section: 20 × 10 mm
    result: 'Base mass ≈ 0.3 × 0.2 × 0.05 × 7850 = 23.6 kg

      Lever mass ≈ 0.5 × 0.02 × 0.01 × 7850 = 0.79 kg

      Estimated total mass ≈ 25-30 kg (portable but substantial)

      '
    margin_or_factor_of_safety: 1.1 (10% margin for additional components)
  assumptions:
  - Workshop environment includes typical contaminants; design should accommodate
    this
  - Tool is manually actuated (hand or foot as per requirements)
  - Standard DIN 7338 rivets are used as referenced
  - Brake shoe/lining assemblies are pre-drilled as per specification
  - Lever press with adjustable stop (CV3) is the selected concept
  - 10-20% margins are applied to account for wear, tolerances, and safety factors
  open_questions:
  - Confirm exact lever ratio needed to achieve 500 N output with ergonomic input
    forces
  - Verify if foot actuation is preferred over hand actuation or if both should be
    supported
  - Determine if any specific rivet head shape requirements exist beyond closure distance
  - Confirm if any additional safety features (e.g., emergency stop) are required
  - Verify if the 45 mm stack thickness includes the brake shoe, lining, and any backing
    material
