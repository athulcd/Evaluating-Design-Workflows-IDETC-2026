      concepts:
      - id: CV1
        selected_principles:
          F1: WP1_1
          F5: WP5_1
          F6: WP6_1
          F7: WP7_1
        architecture_description: Lever press with fixed hard stop; bench/vice mounted;
          standard two-head riveting.
        expected_benefits:
        - Low cost
        - Simple
        - Robust
        key_risks:
        - Limited adaptability to variable stack thickness
        - Pinch hazards at linkage
        requirement_coverage:
          satisfied:
          - R1
          - R8
          - R11
          - R12
          partially_satisfied:
          - R9
          - R10
          - R17
          - R18
          not_satisfied: []
        assumptions:
        - Stop set for typical closure ~4 mm; may require shims to adjust
      - id: CV2
        selected_principles:
          F1: WP1_1
          F5: WP5_2
          F6: WP6_2
          F7: WP7_1
        architecture_description: Screw/rack-driven press with adjustable stroke stop;
          bench/vice mounted.
        expected_benefits:
        - Fine control of closure
        - Adaptable across sizes
        key_risks:
        - More parts, potentially higher cost
        - Slower cycle time
        requirement_coverage:
          satisfied:
          - R1
          - R8
          - R9
          - R11
          - R12
          partially_satisfied:
          - R10
          - R17
          - R20
          not_satisfied: []
        assumptions: []
      - id: CV3
        selected_principles:
          F1: WP1_1
          F5: WP5_1
          F6: WP6_2
          F7: WP7_1
        architecture_description: Lever press with adjustable stop.
        expected_benefits:
        - Lower cost than screw press
        - Better adaptability than fixed stop
        key_risks:
        - Adjustment drift
        - Operator setup time
        requirement_coverage:
          satisfied:
          - R1
          - R8
          - R11
          - R12
          partially_satisfied:
          - R9
          - R10
          - R17
          - R18
          not_satisfied: []
        assumptions: []
      open_questions:
      - ''
      traceability:
        derived_from:
        - Concept sketches (pp. 12-13)
        - Concept evaluation table (p. 14)
